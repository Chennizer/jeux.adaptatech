<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Saint Patrick Mini Games (Switch)</title>
  <style>
    html, body{
      margin:0; padding:0; width:100%; height:100%;
      overflow:hidden; background:#07140b;
      touch-action:none; user-select:none; -webkit-user-select:none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    canvas{ display:block; }

    #overlay{
      position:fixed; inset:0;
      background:rgba(0,0,0,0.70);
      display:grid; place-items:center;
      z-index:10; padding:22px; text-align:center;
    }
    #panel{
      width:min(640px, 92vw);
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.18);
      border-radius:18px;
      padding:16px 16px 14px;
      box-shadow:0 14px 50px rgba(0,0,0,0.5);
      color:rgba(255,255,255,0.92);
      backdrop-filter: blur(4px);
    }
    #panel h1{ margin:0 0 10px; font-size:20px; font-weight:750; letter-spacing:0.2px; }
    #panel p{ margin:0 0 14px; font-size:14px; line-height:1.35; color:rgba(255,255,255,0.78); }
    .btnrow{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    button{
      appearance:none;
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.92);
      padding:10px 14px;
      border-radius:14px;
      font-size:14px;
      cursor:pointer;
      transition:transform 80ms ease, background 120ms ease;
    }
    button:hover{ background:rgba(255,255,255,0.16); }
    button:active{ transform:translateY(1px) scale(0.99); }
    .hint{ margin-top:10px; font-size:12px; color:rgba(255,255,255,0.62); }
  </style>
</head>

<body>
  <div id="hud" style="position:fixed;left:12px;top:12px;z-index:8;color:#f4ffe7;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 12px;font-size:14px;backdrop-filter:blur(2px)"></div>
  <div id="overlay" role="dialog" aria-modal="true">
    <div id="panel">
      <h1>Saint Patrick Mini Games</h1>
      <p>
        Press <b>Space</b> (switch) to interact. You can also tap/click.
        Play three Saint Patrick mini-games in sequence: clovers, rainbow, then gold coins.
        This screen appears once to enable sound and fullscreen.
      </p>
      <div class="btnrow">
        <button id="startBtn" type="button">Start</button>
        <button id="fsBtn" type="button">Fullscreen</button>
      </div>
      <div class="hint">Tip: Space also starts the game.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>

  <script>
    /******************************************************************
     * Updates requested:
     * - Hills less rugged: smoother curves (lower noise freq, larger step,
     *   extra smoothing pass over ridge points)
     * - Brighter, clearer palette: more vivid blues/greens
     ******************************************************************/

    // ===== CONFIG =====
    const CFG = {
      cloverImgPath: "../../images/arthur.jpg",
      chestImgPath: "../../images/zamboni.png",
      cloverCount: 14,
      spawnRatePerSec: 2.0,
      maxClovers: 26,
      minScale: 0.22,
      maxScale: 0.52,
      fallSpeedMin: 1.0,
      fallSpeedMax: 2.8,
      driftMax: 0.55,
      spinMax: 0.018,
      hitRadiusBoost: 1.25,
      flashSeconds: 0.35,
      rippleSeconds: 1.15,
      particlesPerPop: 46,
      rainbowTarget: 7,
      cloverTarget: 16,
      coinTarget: 14,
      coinDropSeconds: 1.6,
      reduceMotion: false
    };

    const PHASES = [
      { key: 'clover', title: 'Clover Shower', target: CFG.cloverTarget },
      { key: 'rainbow', title: 'Rainbow Builder', target: CFG.rainbowTarget },
      { key: 'coin', title: 'Gold Coin Rush', target: CFG.coinTarget }
    ];

    // ===== AUDIO (simple procedural pop) =====
    let audioCtx=null, masterGain=null, audioEnabled=false;
    function ensureAudio(){
      if (audioEnabled) return true;
      try{
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.24;
        masterGain.connect(audioCtx.destination);
        audioEnabled = true;
        return true;
      }catch(e){ audioEnabled=false; return false; }
    }
    function playPopSound(intensity=1){
      if (!audioEnabled || !audioCtx) return;
      const t0 = audioCtx.currentTime;
      const dur = 0.10 + 0.05*intensity;

      const osc1 = audioCtx.createOscillator(); osc1.type="sine";
      const osc2 = audioCtx.createOscillator(); osc2.type="triangle";
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.17*intensity, t0+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);

      const base = 560 + Math.random()*320;
      osc1.frequency.setValueAtTime(base, t0);
      osc1.frequency.exponentialRampToValueAtTime(base*0.55, t0+dur);
      osc2.frequency.setValueAtTime(base*0.78, t0);
      osc2.frequency.exponentialRampToValueAtTime(base*0.45, t0+dur);

      osc1.connect(g); osc2.connect(g); g.connect(masterGain);

      const noiseDur=0.03;
      const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate*noiseDur));
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
      const noise = audioCtx.createBufferSource(); noise.buffer = buffer;

      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.001, t0);
      ng.gain.exponentialRampToValueAtTime(0.07*intensity, t0+0.002);
      ng.gain.exponentialRampToValueAtTime(0.0001, t0+noiseDur);
      noise.connect(ng); ng.connect(masterGain);

      osc1.start(t0); osc2.start(t0); noise.start(t0);
      osc1.stop(t0+dur+0.02);
      osc2.stop(t0+dur+0.02);
      noise.stop(t0+noiseDur+0.01);
    }

    // ===== STATE =====
    let cloverImg=null, chestImg=null;
    let started=false;
    let phaseIndex=0;
    let phaseScore=0;
    let rainbowProgress=0;
    let chestScale=1;

    let tokens=[], particles=[], ripples=[];
    let coinDrops=[];
    let rainDrops=[];
    let flashHue=120, flashT=10;
    let pointerX=0, pointerY=0;

    let lastMs=0, spawnAcc=0;

    // background graphics (static scene)
    let bgGfx=null;
    let bgSeed=Math.random()*10000;

    // ===== ENTITIES =====
    class FallingToken{
      constructor(x,y,s,vy,vx,rot,rv,type){ this.x=x; this.y=y; this.s=s; this.vy=vy; this.vx=vx; this.rot=rot; this.rv=rv; this.type=type; this.wob=Math.random()*1000; }
      radius(){ return min(width,height)*0.12*this.s; }
      update(dt){
        const sp = CFG.reduceMotion ? 0.6 : 1.0;
        const t = millis()*0.001;
        const wob = Math.sin(t*1.2 + this.wob) * 0.35 * sp;
        this.x += (this.vx + wob) * dt;
        this.y += this.vy * dt * sp;
        this.rot += this.rv * dt * sp;

        const r=this.radius();
        if (this.y - r > height + 60){
          this.y = -r - 60;
          this.x = random(r, width-r);
          this.vy = random(CFG.fallSpeedMin, CFG.fallSpeedMax);
          this.vx = random(-CFG.driftMax, CFG.driftMax);
          this.rv = random(-CFG.spinMax, CFG.spinMax);
        }
        if (this.x < -r) this.x = width + r;
        if (this.x > width + r) this.x = -r;
      }
      contains(px,py){ return dist(px,py,this.x,this.y) <= this.radius()*CFG.hitRadiusBoost; }
      draw(){
        push();
        translate(this.x,this.y);
        rotate(this.rot);

        // subtle glow
        noStroke();
        const rr=this.radius();
        fill(this.type === 'coin' ? 45 : 120, 55, 85, 0.10);
        ellipse(0,0, rr*2.6, rr*2.1);
        const sz = rr*2.0;
        if (this.type === 'coin'){
          noStroke();
          fill(47, 75, 100, 0.98);
          ellipse(0, 0, sz, sz);
          fill(42, 55, 88, 0.65);
          ellipse(0, 0, sz*0.65, sz*0.65);
          stroke(38, 70, 78, 0.8);
          strokeWeight(max(2, sz*0.05));
          noFill();
          ellipse(0, 0, sz*0.88, sz*0.88);
        }else if (cloverImg){
          imageMode(CENTER);
          image(cloverImg, 0,0, sz,sz);
        }
        pop();
      }
    }

    class Particle{
      constructor(x,y,hue){
        this.x=x; this.y=y;
        const a=Math.random()*TWO_PI;
        const sp=2.5+Math.random()*9;
        this.vx=Math.cos(a)*sp;
        this.vy=Math.sin(a)*sp;
        this.life=1;
        this.hue=hue;
        this.size=2.5+Math.random()*7;
      }
      update(dt){
        const sp = CFG.reduceMotion ? 0.7 : 1.0;
        this.x += this.vx*dt*0.95*sp;
        this.y += this.vy*dt*0.95*sp;
        this.vx *= 0.98; this.vy *= 0.98;
        this.vy += 0.03*dt;
        this.life -= 0.02*dt;
      }
      draw(){
        if (this.life<=0) return;
        noStroke();
        fill(this.hue, 60, 98, constrain(this.life,0,1)*0.9);
        ellipse(this.x,this.y,this.size,this.size);
      }
    }

    class Ripple{
      constructor(x,y,hue){ this.x=x; this.y=y; this.hue=hue; this.t=0; }
      update(dt){ this.t += dt/60; }
      draw(){
        const p=constrain(this.t/CFG.rippleSeconds,0,1);
        if (p>=1) return;
        const rr=lerp(0, max(width,height)*0.85, p);
        const a=(1-p)*0.55;
        noFill();
        stroke(this.hue, 45, 100, a);
        strokeWeight(6*(1-p)+1);
        ellipse(this.x,this.y, rr*2, rr*2);
      }
      done(){ return this.t>=CFG.rippleSeconds; }
    }

    // ===== p5 preload/setup =====
    function preload(){
      cloverImg = loadImage(CFG.cloverImgPath);
      chestImg = loadImage(CFG.chestImgPath);
    }

    function setup(){
      createCanvas(window.innerWidth, window.innerHeight);
      colorMode(HSB, 360, 100, 100, 1);
      cursor();

      buildCleanSceneBackground();   // smoother + brighter
      resetTokens();
      updateHud();

      pointerX = width*0.5;
      pointerY = height*0.6;
      lastMs = millis();
    }

    function windowResized(){
      resizeCanvas(window.innerWidth, window.innerHeight);
      buildCleanSceneBackground();
      resetTokens();
      updateHud();
    }

    // ===== BACKGROUND =====
    function smoothArray(arr, passes=2){
      // simple neighbor averaging smoothing
      const out = arr.slice();
      for (let p=0;p<passes;p++){
        for (let i=1;i<out.length-1;i++){
          out[i] = (out[i-1] + out[i] + out[i+1]) / 3;
        }
      }
      return out;
    }

    function buildCleanSceneBackground(){
      const w=width, h=height;
      bgGfx = createGraphics(w, h);
      bgGfx.colorMode(HSB, 360, 100, 100, 1);
      bgGfx.noStroke();

      // --- SKY: brighter and more cartoony
      for (let y=0;y<h;y++){
        const t = y/h;
        const hue = lerp(210, 165, pow(t, 0.9));
        const sat = lerp(72, 42, t);
        const bri = lerp(62, 100, pow(t, 1.08));
        bgGfx.stroke(hue, sat, bri, 1);
        bgGfx.line(0, y, w, y);
      }
      bgGfx.noStroke();

      // --- SUN: clean disk + small halo
      const sunX = w*0.78, sunY = h*0.18;
      bgGfx.fill(52, 30, 100, 1);
      bgGfx.ellipse(sunX, sunY, w*0.075, w*0.075);
      for (let i=0;i<28;i++){
        const r = i/28;
        const a = 0.16*(1-r);
        bgGfx.fill(50, 25, 100, a);
        bgGfx.ellipse(sunX, sunY, r*w*0.36, r*w*0.36);
      }

      // --- CLOUDS: cleaner, slightly warmer whites
      function drawCloud(cx, cy, s){
        bgGfx.push();
        bgGfx.translate(cx, cy);
        bgGfx.scale(s);

        bgGfx.noStroke();
        bgGfx.fill(0, 0, 100, 0.95);
        bgGfx.ellipse(0, 0, 230, 86);
        bgGfx.ellipse(-78, -18, 130, 98);
        bgGfx.ellipse(  6, -40, 150, 118);
        bgGfx.ellipse( 92, -14, 132, 100);

        // gentle underside shade (still quite opaque)
        bgGfx.fill(45, 8, 96, 0.55);
        bgGfx.ellipse(0, 12, 220, 66);

        bgGfx.pop();
      }

      const clouds = [
        {x:w*0.20, y:h*0.18, s:0.78},
        {x:w*0.44, y:h*0.12, s:0.62},
        {x:w*0.60, y:h*0.22, s:0.84},
        {x:w*0.84, y:h*0.14, s:0.70}
      ];
      for (const c of clouds) drawCloud(c.x, c.y, c.s);

      // --- HILLS: round cartoony silhouettes
      function drawHillLayer(opts){
        const { baseY, amp, freq, hue, sat, bri, step, texDensity, texBriJitter, smoothPasses } = opts;

        const xs = [];
        const ys = [];
        for (let x=0; x<=w; x+=step){
          xs.push(x);
          // Use noise at lower frequency for round hills
          const n = noise(bgSeed + x*freq, baseY*0.01);
          const yy = baseY - (n-0.5)*2*amp;
          ys.push(yy);
        }

        const ysSmooth = smoothArray(ys, smoothPasses);

        // fill hill
        bgGfx.noStroke();
        bgGfx.fill(hue, sat, bri, 1);
        bgGfx.beginShape();
        bgGfx.vertex(0, h);
        for (let i=0;i<xs.length;i++) bgGfx.vertex(xs[i], ysSmooth[i]);
        bgGfx.vertex(w, h);
        bgGfx.endShape(CLOSE);

        // ridge highlight (slightly brighter)
        bgGfx.stroke(hue, max(0, sat-25), min(100, bri+16), 0.35);
        bgGfx.strokeWeight(2);
        bgGfx.noFill();
        bgGfx.beginShape();
        for (let i=0;i<xs.length;i++) bgGfx.vertex(xs[i], ysSmooth[i] + 1.5);
        bgGfx.endShape();
        bgGfx.noStroke();

        // texture: subtle dots + swaths, but keep it clean and opaque-ish
        const texCount = Math.floor(w*h*texDensity);
        for (let i=0;i<texCount;i++){
          const x = random(w);
          const idx = Math.floor((x / w) * (ysSmooth.length-1));
          const ridgeY = ysSmooth[idx];
          const y = random(ridgeY + 6, h);
          const t = (y - ridgeY) / (h - ridgeY + 0.0001);
          const dotSize = random(1.0, 2.2) * (0.55 + 0.75*t);
          const localBri = bri - (5 + random()*texBriJitter) * t;
          bgGfx.fill(hue + random(-2,2), sat + random(-5,4), localBri, 0.24);
          bgGfx.ellipse(x, y, dotSize, dotSize);
        }

        const swaths = 9;
        for (let i=0;i<swaths;i++){
          const x = random(w);
          const idx = Math.floor((x / w) * (ysSmooth.length-1));
          const ridgeY = ysSmooth[idx];
          const y = random(ridgeY + 22, h);
          const ww = random(w*0.14, w*0.30);
          const hh = random(h*0.03, h*0.085);
          bgGfx.fill(hue, sat, bri - random(3,7), 0.10);
          bgGfx.ellipse(x, y, ww, hh);
        }
      }

      // far hills
      drawHillLayer({
        baseY: h*0.55, amp: h*0.055, freq: 0.0016, // lower freq
        hue: 135, sat: 28, bri: 58,
        step: 14, texDensity: 0.000010, texBriJitter: 10,
        smoothPasses: 4
      });

      // mid hills (clearer green)
      drawHillLayer({
        baseY: h*0.67, amp: h*0.095, freq: 0.0022,
        hue: 122, sat: 48, bri: 52,
        step: 12, texDensity: 0.000016, texBriJitter: 12,
        smoothPasses: 4
      });

      // near meadow (vivid green)
      drawHillLayer({
        baseY: h*0.83, amp: h*0.155, freq: 0.0028,
        hue: 112, sat: 72, bri: 48,
        step: 10, texDensity: 0.000020, texBriJitter: 14,
        smoothPasses: 5
      });

      // foreground grass strokes
      bgGfx.stroke(112, 55, 58, 0.16);
      bgGfx.strokeWeight(1);
      const blades = Math.floor(w*h*0.00022);
      for (let i=0;i<blades;i++){
        const x = random(w);
        const y = random(h*0.72, h);
        const t = (y - h*0.72)/(h*0.28);
        const len = (8 + random()*22) * (0.5 + t);
        bgGfx.line(x, y, x + random(-2,2), y - len);
      }
      bgGfx.noStroke();

      // cartoony flowers
      for (let i=0;i<38;i++){
        const x = random(w);
        const y = random(h*0.72, h*0.98);
        const size = random(6, 12);
        bgGfx.fill(random([330, 20, 55, 290]), 70, 100, 0.8);
        for (let p=0;p<5;p++){
          const a = (TWO_PI/5)*p;
          bgGfx.ellipse(x + Math.cos(a)*size*0.6, y + Math.sin(a)*size*0.6, size*0.7, size*0.7);
        }
        bgGfx.fill(52, 70, 100, 0.95);
        bgGfx.ellipse(x, y, size*0.45, size*0.45);
      }

      // subtle vignette (lighter)
      for (let i=0;i<9;i++){
        const r=i/9;
        bgGfx.fill(0,0,0, 0.04*r);
        const m = i*22;
        bgGfx.rect(m, m, w-m*2, h-m*2, 60);
      }
    }

    // ===== GAME LOGIC =====
    const hud = document.getElementById('hud');

    function getPhase(){ return PHASES[phaseIndex]; }

    function updateHud(){
      const phase = getPhase();
      const total = phase.target;
      const done = phase.key === 'rainbow' ? rainbowProgress : phaseScore;
      hud.textContent = `${phase.title} · ${done}/${total}`;
    }

    function nextPhase(){
      const wasCoinPhase = getPhase().key === 'coin';
      if (wasCoinPhase){
        startNewCycle();
        return;
      }
      phaseIndex = (phaseIndex + 1) % PHASES.length;
      phaseScore = 0;
      rainbowProgress = 0;
      resetTokens();
      updateHud();
    }

    function startNewCycle(){
      phaseIndex = 0;
      phaseScore = 0;
      rainbowProgress = 0;
      chestScale = 1;
      tokens = [];
      particles = [];
      ripples = [];
      coinDrops = [];
      rainDrops = [];
      flashT = 10;
      spawnAcc = 0;
      pointerX = width * 0.5;
      pointerY = height * 0.6;
      resetTokens();
      updateHud();
    }

    function resetTokens(){
      tokens=[];
      particles=[];
      ripples=[];
      coinDrops=[];
      flashT=10;
      spawnAcc=0;
      const phase = getPhase();
      if (phase.key === 'rainbow'){
        rainDrops = Array.from({length:42}, () => ({ x: random(width), y: random(height), sp: random(3, 6), len: random(8, 14) }));
        return;
      }
      if (phase.key === 'coin'){
        chestScale = 1;
        return;
      }
      for (let i=0;i<CFG.cloverCount;i++) tokens.push(makeToken(phase.key, random(-height, 0)));
    }

    function spawnCoinDrop(){
      const chestY = height * 0.87;
      const chestX = width * 0.5;
      const startX = random(width * 0.1, width * 0.9);
      const coinSize = min(width, height) * 0.072;
      coinDrops.push({
        x: startX,
        y: -coinSize,
        targetX: chestX + random(-26, 26),
        size: coinSize,
        vy: max(4.5, (chestY + 30) / (CFG.coinDropSeconds * 60)),
        done: false
      });
    }

    function drawChest(){
      const cx = width * 0.5;
      const cy = height * 0.87;
      const baseW = min(width, height) * 0.23 * chestScale;
      const baseH = baseW * 0.72;
      if (chestImg){
        imageMode(CENTER);
        image(chestImg, cx, cy, baseW, baseH);
      }else{
        noStroke();
        fill(30, 65, 45, 1);
        rectMode(CENTER);
        rect(cx, cy, baseW, baseH, 18);
      }
    }

    function updateCoinDrops(dt){
      const chestY = height * 0.87;
      const chestX = width * 0.5;
      for (const coin of coinDrops){
        if (coin.done) continue;
        coin.x = lerp(coin.x, coin.targetX, 0.035 * dt);
        coin.y += coin.vy * dt;
        if (coin.y >= chestY - coin.size*0.55){
          coin.done = true;
          phaseScore += 1;
          chestScale = 1 + phaseScore * 0.035;
          flashHue = 46;
          flashT = 0;
          for (let i=0;i<18;i++) particles.push(new Particle(chestX, chestY - 10, 48 + random(-4, 5)));
          if (phaseScore >= getPhase().target) setTimeout(nextPhase, 450);
          updateHud();
        }
      }
      coinDrops = coinDrops.filter(c => !c.done);
    }

    function drawCoinDrops(){
      for (const coin of coinDrops){
        const s = coin.size;
        noStroke();
        fill(44, 70, 40, 0.28);
        ellipse(coin.x + s*0.08, coin.y + s*0.15, s*0.95, s*0.95);

        fill(49, 78, 100, 1);
        ellipse(coin.x, coin.y, s, s);

        stroke(42, 80, 74, 0.95);
        strokeWeight(max(2, s*0.08));
        noFill();
        ellipse(coin.x, coin.y, s*0.85, s*0.85);

        noStroke();
        fill(50, 18, 100, 0.5);
        ellipse(coin.x - s*0.17, coin.y - s*0.2, s*0.27, s*0.19);
      }
    }

    function drawRainbowRain(dt){
      stroke(205, 35, 100, 0.35);
      strokeWeight(2);
      for (const d of rainDrops){
        line(d.x, d.y, d.x - 4, d.y + d.len);
        d.y += d.sp * dt;
        d.x -= 0.4 * dt;
        if (d.y > height + 10){
          d.y = random(-60, -10);
          d.x = random(width);
        }
      }
      noStroke();
    }

    function makeToken(type, yOverride=null){
      const s = random(CFG.minScale, CFG.maxScale);
      const vy = random(CFG.fallSpeedMin, CFG.fallSpeedMax);
      const vx = random(-CFG.driftMax, CFG.driftMax);
      const rot = random(TWO_PI);
      const rv  = random(-CFG.spinMax, CFG.spinMax);
      const r = min(width,height)*0.12*s;
      const x = random(r, width-r);
      const y = (yOverride!==null) ? yOverride : random(-height, -60);
      return new FallingToken(x,y,s,vy,vx,rot,rv,type);
    }

    function pickBestToken(){
      if (!tokens.length) return null;
      for (const c of tokens) if (c.contains(pointerX, pointerY)) return c;

      let best=tokens[0];
      let bestD=dist(pointerX,pointerY,best.x,best.y);
      for (const c of tokens){
        const d=dist(pointerX,pointerY,c.x,c.y);
        if (d<bestD){ bestD=d; best=c; }
      }
      if (bestD > min(width,height)*0.45) return random(tokens);
      return best;
    }

    function popToken(c){
      if (!c) return;
      const idx=tokens.indexOf(c);
      if (idx>=0) tokens.splice(idx,1);

      flashHue = 115;
      flashT = 0;

      ripples.push(new Ripple(c.x, c.y, 120));
      const n = CFG.reduceMotion ? Math.floor(CFG.particlesPerPop*0.65) : CFG.particlesPerPop;
      for (let i=0;i<n;i++) particles.push(new Particle(c.x,c.y, 112 + random(-10,10)));

      const intensity = constrain(map(c.s, CFG.minScale, CFG.maxScale, 0.9, 1.2), 0.8, 1.25);
      playPopSound(intensity);

      if (tokens.length < CFG.maxClovers){
        setTimeout(()=>tokens.push(makeToken(getPhase().key, random(-240,-60))), 120);
      }

      phaseScore += 1;
      if (phaseScore >= getPhase().target) nextPhase();
      else updateHud();
    }

    function drawRainbowChallenge(){
      const arcColors = [
        [0, 85, 98],
        [28, 82, 100],
        [52, 80, 100],
        [112, 65, 92],
        [198, 70, 96],
        [238, 64, 100],
        [292, 62, 98]
      ];
      const cx = width * 0.5;
      const cy = height * 1.02;
      const outerR = min(width * 0.48, height * 0.95);
      const thick = max(10, outerR * 0.09);
      const start = PI;
      const end = TWO_PI;
      for (let i = 0; i < arcColors.length; i++){
        const active = i < rainbowProgress;
        const [h,s,b] = arcColors[i];
        stroke(h, s, b, active ? 0.95 : 0.18);
        strokeWeight(thick);
        noFill();
        const r = outerR - i * thick * 0.88;
        arc(cx, cy, r*2, r*2, start, end);
      }
    }

    function drawCoinBackground(){
      const top = color(210, 48, 96, 1);
      const bottom = color(138, 42, 92, 1);
      for (let y=0;y<height;y++){
        const t = y / max(1, height - 1);
        stroke(lerpColor(top, bottom, t));
        line(0, y, width, y);
      }
      noStroke();
      fill(112, 60, 42, 1);
      rect(0, height*0.82, width, height*0.18);
    }

    function handleAction(){
      const phase = getPhase();
      if (phase.key === 'rainbow'){
        if (rainbowProgress < CFG.rainbowTarget){
          rainbowProgress += 1;
          flashHue = random(0, 360);
          flashT = 0;
          playPopSound(1);
          for (let i=0;i<28;i++) particles.push(new Particle(width*0.5, height*0.55, random(0, 360)));
          if (rainbowProgress >= phase.target) setTimeout(nextPhase, 350);
          updateHud();
        }
        return;
      }
      if (phase.key === 'coin'){
        spawnCoinDrop();
        playPopSound(0.9);
        return;
      }
      popToken(pickBestToken());
    }

    // ===== DRAW LOOP =====
    function draw(){
      const now=millis();
      let dt = (now-lastMs)/(1000/60);
      lastMs=now;
      dt = constrain(dt, 0.5, 2.5);

      if (getPhase().key === 'coin'){
        drawCoinBackground();
      } else {
        image(bgGfx, 0, 0);
      }

      if (getPhase().key === 'rainbow'){
        drawRainbowChallenge();
        drawRainbowRain(dt);
      }else if (getPhase().key === 'coin'){
        drawChest();
        updateCoinDrops(dt);
        drawCoinDrops();
      }else{
        spawnAcc += (dt/60) * CFG.spawnRatePerSec;
        if (spawnAcc >= 1){
          const k = floor(spawnAcc);
          spawnAcc -= k;
          for (let i=0;i<k;i++){
            if (tokens.length < CFG.maxClovers) tokens.push(makeToken(getPhase().key));
          }
        }

        for (const c of tokens) c.update(dt);
        for (const c of tokens) c.draw();
      }

      for (const r of ripples) r.update(dt);
      for (const r of ripples) r.draw();
      ripples = ripples.filter(r => !r.done());

      for (const p of particles) p.update(dt);
      for (const p of particles) p.draw();
      particles = particles.filter(p => p.life > 0);

      drawFlash(dt);

      // pointer hint ring
      noFill();
      stroke(120, 40, 100, started ? 0.10 : 0.06);
      strokeWeight(2);
      ellipse(pointerX, pointerY, 30, 30);
    }

    function drawFlash(dt){
      const p = constrain(flashT/CFG.flashSeconds, 0, 1);
      if (p>=1) return;
      const a = (1-p)*0.24;
      noStroke();
      fill(flashHue, 55, 95, a);
      rect(0,0,width,height);
      flashT += dt/60;
    }

    // ===== INPUT =====
    function keyPressed(){
      if (!started && (key===' ' || keyCode===ENTER)){
        startGame();
        return false;
      }
      if (key===' '){
        if (!audioEnabled) ensureAudio();
        handleAction();
        return false;
      }
    }
    function mouseMoved(){ pointerX=mouseX; pointerY=mouseY; }
    function mouseDragged(){ pointerX=mouseX; pointerY=mouseY; }
    function mousePressed(){
      pointerX=mouseX; pointerY=mouseY;
      if (!audioEnabled) ensureAudio();
      handleAction();
      return false;
    }
    function touchStarted(){
      if (touches && touches[0]){ pointerX=touches[0].x; pointerY=touches[0].y; }
      if (!audioEnabled) ensureAudio();
      handleAction();
      return false;
    }
    function touchMoved(){
      if (touches && touches[0]){ pointerX=touches[0].x; pointerY=touches[0].y; }
      return false;
    }

    // ===== OVERLAY =====
    const overlay=document.getElementById('overlay');
    const startBtn=document.getElementById('startBtn');
    const fsBtn=document.getElementById('fsBtn');

    function startGame(){
      ensureAudio();
      overlay.style.display='none';
      started=true;
      pointerX=width*0.5; pointerY=height*0.6;
      updateHud();
    }
    async function requestFullscreen(){
      const el=document.documentElement;
      try{
        if (!document.fullscreenElement && el.requestFullscreen) await el.requestFullscreen();
      }catch(_){}
    }
    startBtn.addEventListener('click', ()=>{ startGame(); requestFullscreen(); });
    fsBtn.addEventListener('click', ()=>{ ensureAudio(); requestFullscreen(); });
    overlay.addEventListener('pointerdown', (e)=>{
      if (e.target.tagName.toLowerCase()==='button') return;
      startGame(); requestFullscreen();
    }, {passive:true});

    // expose p5 hooks
    window.preload=preload;
    window.setup=setup;
    window.draw=draw;
    window.windowResized=windowResized;
    window.keyPressed=keyPressed;
    window.mouseMoved=mouseMoved;
    window.mouseDragged=mouseDragged;
    window.mousePressed=mousePressed;
    window.touchStarted=touchStarted;
    window.touchMoved=touchMoved;
  </script>
</body>
</html>
