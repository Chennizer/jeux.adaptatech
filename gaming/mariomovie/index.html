<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title class="translate" data-fr="MarioMovie" data-en="MarioMovie" data-ja="マリオムービー">MarioMovie</title>
    <link rel="stylesheet" href="../../css/control-panel.css">
    <link rel="stylesheet" href="../../css/games.css">
    <link rel="stylesheet" href="../../css/gaming.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/mariomovie-menu.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B45TJG4GBJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B45TJG4GBJ');
    </script>
</head>
<body
    class="mariomovie-page"
    style="--menu-backdrop-image: url('../../images/mariocard.png'); --menu-side-image: url('../../images/mariocard.png');"
    data-video-source="https://bucket.adaptatech.org/mariomovie.mp4"
>
    <button id="language-toggle" title="Changer de langue / Change language">FR / EN</button>

    <div id="control-panel">
        <div id="control-panel-options" class="control-panel-options">
            <div class="game-menu-layout simplified-game-menu-layout">
                <div class="game-menu-main">
                    <div id="options-title-bar">
                        <h2 id="options-main-title" class="translate" data-fr="MarioMovie" data-en="MarioMovie" data-ja="マリオムービー">MarioMovie</h2>
                    </div>

                    <p id="control-panel-instructions" class="control-panel-instructions translate"
                       data-fr="Regarde la vidéo, puis exécute l'action demandée à chaque pause avant de reprendre."
                       data-en="Watch the video, then perform the requested action at each pause before continuing."
                       data-ja="動画を見て、停止したら表示された動きをしてから再開してください。">
                    </p>

                    <div id="mode-divider"></div>

                    <div id="options-inline-container" class="simplified-options-inline-container">
                        <div class="option-item simplified-action-card">
                            <span class="teal-label translate" data-fr="Déroulement" data-en="How it works" data-ja="遊び方">Déroulement</span>
                            <p class="menu-helper-text translate"
                               data-fr="La vidéo s'arrête automatiquement à 7 moments. Une image d'action et son texte s'affichent dans la langue choisie."
                               data-en="The video pauses automatically at 7 moments. An action image and label appear in the selected language."
                               data-ja="動画は7回自動で止まり、選択した言語で動きの画像とラベルが表示されます。">
                            </p>
                        </div>
                    </div>

                    <div id="mode-divider"></div>

                    <div id="button-container" class="button-container simplified-button-container">
                        <a id="download-video-button"
                           class="button translate"
                           data-fr="Télécharger"
                           data-en="Download"
                           data-ja="ダウンロード"
                           href="https://bucket.adaptatech.org/mariomovie.mp4"
                           target="_blank"
                           rel="noopener noreferrer"
                           download>
                            Télécharger
                        </a>
                        <button id="control-panel-start-button" class="button translate" data-fr="Commencer" data-en="Start" data-ja="開始">Commencer</button>
                    </div>
                </div>

                <aside class="game-menu-art" aria-hidden="true">
                    <div class="game-menu-art-card">
                        <div class="game-menu-art-image"></div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <div id="video-container" class="video-container hidden" aria-live="off">
        <video id="video-player" class="video-player" preload="auto" playsinline>
            <source id="video-source" src="https://bucket.adaptatech.org/mariomovie.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div id="overlay-screen" class="overlay-screen hidden" aria-live="assertive">
        <div class="action-prompt-card">
            <img id="action-prompt-image" class="action-prompt-image" src="" alt="">
            <p id="action-prompt-label" class="action-prompt-label"></p>
            <p id="action-prompt-helper" class="action-prompt-helper translate"
               data-fr="Appuie sur Espace, Entrée ou touche l'écran après avoir fait le mouvement."
               data-en="Press Space, Enter, or tap the screen after doing the move."
               data-ja="動きをしたら、スペースキー・Enterキー、または画面タップで再開します。">
            </p>
        </div>
    </div>

    <div id="results-screen" class="hidden">
        <div class="results-panel simplified-results-panel">
            <h2 class="translate" data-fr="Partie terminée" data-en="Game complete" data-ja="ゲーム終了">Partie terminée</h2>
            <p id="results-summary" class="translate"
               data-fr="Tu as complété toutes les actions."
               data-en="You completed all actions."
               data-ja="すべてのアクションを完了しました。">
            </p>
            <button id="continue-button" class="button translate" data-fr="Recommencer" data-en="Restart" data-ja="もう一度">Recommencer</button>
        </div>
    </div>

    <script src="../../js/translationmain.js"></script>
    <script>
      document.getElementById('language-toggle')?.addEventListener('pointerup', toggleLanguage);
    </script>
    <script src="../../js/mariomovie-game.js"></script>
</body>
</html>
