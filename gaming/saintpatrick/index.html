<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Pop the Falling Clovers (Switch)</title>
  <style>
    html, body{
      margin:0; padding:0; width:100%; height:100%;
      overflow:hidden; background:#07140b;
      touch-action:none; user-select:none; -webkit-user-select:none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    canvas{ display:block; }

    #overlay{
      position:fixed; inset:0;
      background:rgba(0,0,0,0.70);
      display:grid; place-items:center;
      z-index:10; padding:22px; text-align:center;
    }
    #panel{
      width:min(640px, 92vw);
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.18);
      border-radius:18px;
      padding:16px 16px 14px;
      box-shadow:0 14px 50px rgba(0,0,0,0.5);
      color:rgba(255,255,255,0.92);
      backdrop-filter: blur(4px);
    }
    #panel h1{ margin:0 0 10px; font-size:20px; font-weight:750; letter-spacing:0.2px; }
    #panel p{ margin:0 0 14px; font-size:14px; line-height:1.35; color:rgba(255,255,255,0.78); }
    .btnrow{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    button{
      appearance:none;
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.92);
      padding:10px 14px;
      border-radius:14px;
      font-size:14px;
      cursor:pointer;
      transition:transform 80ms ease, background 120ms ease;
    }
    button:hover{ background:rgba(255,255,255,0.16); }
    button:active{ transform:translateY(1px) scale(0.99); }
    .hint{ margin-top:10px; font-size:12px; color:rgba(255,255,255,0.62); }
  </style>
</head>

<body>
  <div id="overlay" role="dialog" aria-modal="true">
    <div id="panel">
      <h1>Pop the Falling Clovers</h1>
      <p>
        Press <b>Space</b> (switch) to pop clovers. You can also tap/click a clover.
        This screen appears once to enable sound and fullscreen.
      </p>
      <div class="btnrow">
        <button id="startBtn" type="button">Start</button>
        <button id="fsBtn" type="button">Fullscreen</button>
      </div>
      <div class="hint">Tip: Space also starts the game.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>

  <script>
    /******************************************************************
     * Cleaner, more "illustrated" background:
     * - Opaque, smooth gradients (no translucent haze bands)
     * - Crisp layered hills with subtle, opaque texture (stippling + swaths)
     * - Simple, soft clouds with clearer silhouettes
     ******************************************************************/

    // ===== CONFIG =====
    const CFG = {
      cloverImgPath: "../../images/arthur.jpg",
      cloverCount: 14,
      spawnRatePerSec: 2.0,
      maxClovers: 26,
      minScale: 0.22,
      maxScale: 0.52,
      fallSpeedMin: 1.0,
      fallSpeedMax: 2.8,
      driftMax: 0.55,
      spinMax: 0.018,
      hitRadiusBoost: 1.25,
      flashSeconds: 0.35,
      rippleSeconds: 1.15,
      particlesPerPop: 46,
      reduceMotion: false
    };

    // ===== AUDIO (simple procedural pop) =====
    let audioCtx=null, masterGain=null, audioEnabled=false;
    function ensureAudio(){
      if (audioEnabled) return true;
      try{
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.24;
        masterGain.connect(audioCtx.destination);
        audioEnabled = true;
        return true;
      }catch(e){ audioEnabled=false; return false; }
    }
    function playPopSound(intensity=1){
      if (!audioEnabled || !audioCtx) return;
      const t0 = audioCtx.currentTime;
      const dur = 0.10 + 0.05*intensity;

      const osc1 = audioCtx.createOscillator(); osc1.type="sine";
      const osc2 = audioCtx.createOscillator(); osc2.type="triangle";
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.17*intensity, t0+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);

      const base = 560 + Math.random()*320;
      osc1.frequency.setValueAtTime(base, t0);
      osc1.frequency.exponentialRampToValueAtTime(base*0.55, t0+dur);
      osc2.frequency.setValueAtTime(base*0.78, t0);
      osc2.frequency.exponentialRampToValueAtTime(base*0.45, t0+dur);

      osc1.connect(g); osc2.connect(g); g.connect(masterGain);

      const noiseDur=0.03;
      const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate*noiseDur));
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
      const noise = audioCtx.createBufferSource(); noise.buffer = buffer;

      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.001, t0);
      ng.gain.exponentialRampToValueAtTime(0.07*intensity, t0+0.002);
      ng.gain.exponentialRampToValueAtTime(0.0001, t0+noiseDur);
      noise.connect(ng); ng.connect(masterGain);

      osc1.start(t0); osc2.start(t0); noise.start(t0);
      osc1.stop(t0+dur+0.02);
      osc2.stop(t0+dur+0.02);
      noise.stop(t0+noiseDur+0.01);
    }

    // ===== STATE =====
    let cloverImg=null;
    let started=false;

    let clovers=[], particles=[], ripples=[];
    let flashHue=120, flashT=10;
    let pointerX=0, pointerY=0;

    let lastMs=0, spawnAcc=0;

    // background graphics (static scene)
    let bgGfx=null;
    let bgSeed=Math.random()*10000;

    // ===== ENTITIES =====
    class FallingClover{
      constructor(x,y,s,vy,vx,rot,rv){ this.x=x; this.y=y; this.s=s; this.vy=vy; this.vx=vx; this.rot=rot; this.rv=rv; this.wob=Math.random()*1000; }
      radius(){ return min(width,height)*0.12*this.s; }
      update(dt){
        const sp = CFG.reduceMotion ? 0.6 : 1.0;
        const t = millis()*0.001;
        const wob = Math.sin(t*1.2 + this.wob) * 0.35 * sp;
        this.x += (this.vx + wob) * dt;
        this.y += this.vy * dt * sp;
        this.rot += this.rv * dt * sp;

        const r=this.radius();
        if (this.y - r > height + 60){
          this.y = -r - 60;
          this.x = random(r, width-r);
          this.vy = random(CFG.fallSpeedMin, CFG.fallSpeedMax);
          this.vx = random(-CFG.driftMax, CFG.driftMax);
          this.rv = random(-CFG.spinMax, CFG.spinMax);
        }
        if (this.x < -r) this.x = width + r;
        if (this.x > width + r) this.x = -r;
      }
      contains(px,py){ return dist(px,py,this.x,this.y) <= this.radius()*CFG.hitRadiusBoost; }
      draw(){
        if (!cloverImg) return;
        push();
        translate(this.x,this.y);
        rotate(this.rot);

        // soft sprite glow (kept subtle)
        noStroke();
        const rr=this.radius();
        fill(120, 55, 80, 0.10);
        ellipse(0,0, rr*2.6, rr*2.1);

        imageMode(CENTER);
        const sz = rr*2.0;
        image(cloverImg, 0,0, sz,sz);
        pop();
      }
    }

    class Particle{
      constructor(x,y,hue){
        this.x=x; this.y=y;
        const a=Math.random()*TWO_PI;
        const sp=2.5+Math.random()*9;
        this.vx=Math.cos(a)*sp;
        this.vy=Math.sin(a)*sp;
        this.life=1;
        this.hue=hue;
        this.size=2.5+Math.random()*7;
      }
      update(dt){
        const sp = CFG.reduceMotion ? 0.7 : 1.0;
        this.x += this.vx*dt*0.95*sp;
        this.y += this.vy*dt*0.95*sp;
        this.vx *= 0.98; this.vy *= 0.98;
        this.vy += 0.03*dt;
        this.life -= 0.02*dt;
      }
      draw(){
        if (this.life<=0) return;
        noStroke();
        fill(this.hue, 60, 98, constrain(this.life,0,1)*0.9);
        ellipse(this.x,this.y,this.size,this.size);
      }
    }

    class Ripple{
      constructor(x,y,hue){ this.x=x; this.y=y; this.hue=hue; this.t=0; }
      update(dt){ this.t += dt/60; }
      draw(){
        const p=constrain(this.t/CFG.rippleSeconds,0,1);
        if (p>=1) return;
        const rr=lerp(0, max(width,height)*0.85, p);
        const a=(1-p)*0.55;
        noFill();
        stroke(this.hue, 45, 100, a);
        strokeWeight(6*(1-p)+1);
        ellipse(this.x,this.y, rr*2, rr*2);
      }
      done(){ return this.t>=CFG.rippleSeconds; }
    }

    // ===== p5 preload/setup =====
    function preload(){ cloverImg = loadImage(CFG.cloverImgPath); }

    function setup(){
      createCanvas(window.innerWidth, window.innerHeight);
      colorMode(HSB, 360, 100, 100, 1);
      cursor();

      buildCleanSceneBackground();   // improved
      resetClovers();

      pointerX = width*0.5;
      pointerY = height*0.6;
      lastMs = millis();
    }

    function windowResized(){
      resizeCanvas(window.innerWidth, window.innerHeight);
      buildCleanSceneBackground();
      resetClovers();
    }

    // ===== CLEANER, OPAQUE SCENE BACKGROUND =====
    function buildCleanSceneBackground(){
      const w=width, h=height;
      bgGfx = createGraphics(w, h);
      bgGfx.colorMode(HSB, 360, 100, 100, 1);
      bgGfx.noStroke();

      // --- SKY: smooth opaque gradient + subtle warm horizon
      for (let y=0;y<h;y++){
        const t = y/h;
        const hue = lerp(205, 165, pow(t, 1.1));   // blue -> teal
        const sat = lerp(55, 35, t);
        const bri = lerp(30, 72, pow(t, 1.25));    // brighter near horizon
        bgGfx.stroke(hue, sat, bri, 1);
        bgGfx.line(0, y, w, y);
      }
      bgGfx.noStroke();

      // --- SUN: crisp disk + soft (still opaque-ish) halo
      const sunX = w*0.78, sunY = h*0.18;
      bgGfx.fill(50, 22, 100, 1);
      bgGfx.ellipse(sunX, sunY, w*0.055, w*0.055);

      // halo with low layers (clean)
      for (let i=0;i<40;i++){
        const r = i/40;
        const a = 0.18*(1-r);
        bgGfx.fill(50, 25, 100, a);
        bgGfx.ellipse(sunX, sunY, r*w*0.42, r*w*0.42);
      }

      // --- CLOUDS: cleaner shapes (opaque white/cream), very subtle shading
      function drawCloud(cx, cy, s){
        bgGfx.push();
        bgGfx.translate(cx, cy);
        bgGfx.scale(s);

        // base
        bgGfx.noStroke();
        bgGfx.fill(0, 0, 98, 0.95);
        bgGfx.ellipse(0, 0, 220, 80);
        bgGfx.ellipse(-70, -20, 120, 90);
        bgGfx.ellipse( 10, -35, 140, 110);
        bgGfx.ellipse( 85, -15, 120, 90);

        // underside shade (very light)
        bgGfx.fill(0, 0, 92, 0.55);
        bgGfx.ellipse(0, 12, 210, 62);

        // highlight
        bgGfx.fill(0, 0, 100, 0.45);
        bgGfx.ellipse(10, -28, 140, 80);

        bgGfx.pop();
      }

      const clouds = [
        {x:w*0.20, y:h*0.18, s:0.75},
        {x:w*0.42, y:h*0.12, s:0.60},
        {x:w*0.58, y:h*0.22, s:0.80},
        {x:w*0.82, y:h*0.14, s:0.68}
      ];
      for (const c of clouds) drawCloud(c.x, c.y, c.s);

      // --- HILLS: crisp layered silhouettes + opaque textures
      // Helper: draw a hill with smooth curve (noise), then add texture inside.
      function drawHillLayer(opts){
        const { baseY, amp, freq, hue, sat, bri, step, texDensity, texBriJitter } = opts;

        // build points
        const pts = [];
        for (let x=0; x<=w; x+=step){
          const n = noise(bgSeed + x*freq, baseY*0.01);
          const yy = baseY - (n-0.5)*2*amp;
          pts.push({x, y: yy});
        }

        // fill hill
        bgGfx.noStroke();
        bgGfx.fill(hue, sat, bri, 1);
        bgGfx.beginShape();
        bgGfx.vertex(0, h);
        for (const p of pts) bgGfx.vertex(p.x, p.y);
        bgGfx.vertex(w, h);
        bgGfx.endShape(CLOSE);

        // subtle ridge highlight (opaque but soft)
        bgGfx.stroke(hue, Math.max(0, sat-25), Math.min(100, bri+10), 0.35);
        bgGfx.strokeWeight(2);
        bgGfx.noFill();
        bgGfx.beginShape();
        for (const p of pts) bgGfx.vertex(p.x, p.y + 1.5);
        bgGfx.endShape();
        bgGfx.noStroke();

        // texture: opaque stipple + broad swaths (kept clean)
        // We keep this sparse and non-transparent-looking by using low alpha but not "mist".
        const texCount = Math.floor(w*h*texDensity);
        for (let i=0;i<texCount;i++){
          const x = random(w);
          // pick a y below the ridge: sample ridge y via nearest pt
          const idx = Math.floor((x / w) * (pts.length-1));
          const ridgeY = pts[idx].y;
          const y = random(ridgeY + 6, h);
          const t = (y - ridgeY) / (h - ridgeY + 0.0001);

          // small dots, slightly darker, mostly opaque-ish
          const dotSize = random(1.0, 2.2) * (0.6 + 0.7*t);
          const localBri = bri - (6 + random()*texBriJitter) * t;
          bgGfx.fill(hue + random(-2,2), sat + random(-6,4), localBri, 0.28);
          bgGfx.ellipse(x, y, dotSize, dotSize);
        }

        // broad swaths: a few big soft patches for depth (still clean)
        const swaths = 10;
        for (let i=0;i<swaths;i++){
          const x = random(w);
          const idx = Math.floor((x / w) * (pts.length-1));
          const ridgeY = pts[idx].y;
          const y = random(ridgeY + 20, h);
          const ww = random(w*0.12, w*0.26);
          const hh = random(h*0.03, h*0.08);
          bgGfx.fill(hue, sat, bri - random(3,8), 0.10);
          bgGfx.ellipse(x, y, ww, hh);
        }
      }

      // far hills
      drawHillLayer({
        baseY: h*0.54, amp: h*0.06, freq: 0.0030,
        hue: 128, sat: 28, bri: 40,
        step: 10, texDensity: 0.000010, texBriJitter: 10
      });

      // mid hills
      drawHillLayer({
        baseY: h*0.66, amp: h*0.10, freq: 0.0048,
        hue: 118, sat: 48, bri: 34,
        step: 8, texDensity: 0.000016, texBriJitter: 12
      });

      // near meadow
      drawHillLayer({
        baseY: h*0.82, amp: h*0.16, freq: 0.0066,
        hue: 112, sat: 70, bri: 28,
        step: 7, texDensity: 0.000020, texBriJitter: 14
      });

      // --- Foreground grass strokes (opaque, clean, not too busy)
      bgGfx.stroke(112, 60, 40, 0.18);
      bgGfx.strokeWeight(1);
      const blades = Math.floor(w*h*0.00025);
      for (let i=0;i<blades;i++){
        const x = random(w);
        const y = random(h*0.72, h);
        const t = (y - h*0.72)/(h*0.28);
        const len = (8 + random()*22) * (0.5 + t);
        bgGfx.line(x, y, x + random(-2,2), y - len);
      }
      bgGfx.noStroke();

      // --- Subtle vignette (kept clean)
      for (let i=0;i<10;i++){
        const r=i/10;
        bgGfx.fill(0,0,0, 0.05*r);
        const m = i*22;
        bgGfx.rect(m, m, w-m*2, h-m*2, 60);
      }
    }

    // ===== GAME LOGIC =====
    function resetClovers(){
      clovers=[];
      for (let i=0;i<CFG.cloverCount;i++){
        clovers.push(makeClover(random(-height, 0)));
      }
      particles=[]; ripples=[];
      flashT=10; spawnAcc=0;
    }

    function makeClover(yOverride=null){
      const s = random(CFG.minScale, CFG.maxScale);
      const vy = random(CFG.fallSpeedMin, CFG.fallSpeedMax);
      const vx = random(-CFG.driftMax, CFG.driftMax);
      const rot = random(TWO_PI);
      const rv  = random(-CFG.spinMax, CFG.spinMax);
      const r = min(width,height)*0.12*s;
      const x = random(r, width-r);
      const y = (yOverride!==null) ? yOverride : random(-height, -60);
      return new FallingClover(x,y,s,vy,vx,rot,rv);
    }

    function pickBestClover(){
      if (!clovers.length) return null;
      for (const c of clovers) if (c.contains(pointerX, pointerY)) return c;

      let best=clovers[0];
      let bestD=dist(pointerX,pointerY,best.x,best.y);
      for (const c of clovers){
        const d=dist(pointerX,pointerY,c.x,c.y);
        if (d<bestD){ bestD=d; best=c; }
      }
      if (bestD > min(width,height)*0.45) return random(clovers);
      return best;
    }

    function popClover(c){
      if (!c) return;
      const idx=clovers.indexOf(c);
      if (idx>=0) clovers.splice(idx,1);

      flashHue = 115;
      flashT = 0;

      ripples.push(new Ripple(c.x, c.y, 120));
      const n = CFG.reduceMotion ? Math.floor(CFG.particlesPerPop*0.65) : CFG.particlesPerPop;
      for (let i=0;i<n;i++) particles.push(new Particle(c.x,c.y, 112 + random(-10,10)));

      const intensity = constrain(map(c.s, CFG.minScale, CFG.maxScale, 0.9, 1.2), 0.8, 1.25);
      playPopSound(intensity);

      if (clovers.length < CFG.maxClovers){
        setTimeout(()=>clovers.push(makeClover(random(-240,-60))), 120);
      }
    }

    // ===== DRAW LOOP =====
    function draw(){
      const now=millis();
      let dt = (now-lastMs)/(1000/60);
      lastMs=now;
      dt = constrain(dt, 0.5, 2.5);

      image(bgGfx, 0, 0);

      spawnAcc += (dt/60) * CFG.spawnRatePerSec;
      if (spawnAcc >= 1){
        const k = floor(spawnAcc);
        spawnAcc -= k;
        for (let i=0;i<k;i++){
          if (clovers.length < CFG.maxClovers) clovers.push(makeClover());
        }
      }

      for (const c of clovers) c.update(dt);
      for (const c of clovers) c.draw();

      for (const r of ripples) r.update(dt);
      for (const r of ripples) r.draw();
      ripples = ripples.filter(r => !r.done());

      for (const p of particles) p.update(dt);
      for (const p of particles) p.draw();
      particles = particles.filter(p => p.life > 0);

      drawFlash(dt);

      // pointer hint ring (nice for gaze)
      noFill();
      stroke(120, 40, 100, started ? 0.10 : 0.06);
      strokeWeight(2);
      ellipse(pointerX, pointerY, 30, 30);
    }

    function drawFlash(dt){
      const p = constrain(flashT/CFG.flashSeconds, 0, 1);
      if (p>=1) return;
      const a = (1-p)*0.24;
      noStroke();
      fill(flashHue, 55, 95, a);
      rect(0,0,width,height);
      flashT += dt/60;
    }

    // ===== INPUT =====
    function keyPressed(){
      if (!started && (key===' ' || keyCode===ENTER)){
        startGame();
        return false;
      }
      if (key===' '){
        if (!audioEnabled) ensureAudio();
        popClover(pickBestClover());
        return false;
      }
    }
    function mouseMoved(){ pointerX=mouseX; pointerY=mouseY; }
    function mouseDragged(){ pointerX=mouseX; pointerY=mouseY; }
    function mousePressed(){
      pointerX=mouseX; pointerY=mouseY;
      if (!audioEnabled) ensureAudio();
      popClover(pickBestClover());
      return false;
    }
    function touchStarted(){
      if (touches && touches[0]){ pointerX=touches[0].x; pointerY=touches[0].y; }
      if (!audioEnabled) ensureAudio();
      popClover(pickBestClover());
      return false;
    }
    function touchMoved(){
      if (touches && touches[0]){ pointerX=touches[0].x; pointerY=touches[0].y; }
      return false;
    }

    // ===== OVERLAY =====
    const overlay=document.getElementById('overlay');
    const startBtn=document.getElementById('startBtn');
    const fsBtn=document.getElementById('fsBtn');

    function startGame(){
      ensureAudio();
      overlay.style.display='none';
      started=true;
      pointerX=width*0.5; pointerY=height*0.6;
    }
    async function requestFullscreen(){
      const el=document.documentElement;
      try{
        if (!document.fullscreenElement && el.requestFullscreen) await el.requestFullscreen();
      }catch(_){}
    }
    startBtn.addEventListener('click', ()=>{ startGame(); requestFullscreen(); });
    fsBtn.addEventListener('click', ()=>{ ensureAudio(); requestFullscreen(); });
    overlay.addEventListener('pointerdown', (e)=>{
      if (e.target.tagName.toLowerCase()==='button') return;
      startGame(); requestFullscreen();
    }, {passive:true});

    // expose p5 hooks
    window.preload=preload;
    window.setup=setup;
    window.draw=draw;
    window.windowResized=windowResized;
    window.keyPressed=keyPressed;
    window.mouseMoved=mouseMoved;
    window.mouseDragged=mouseDragged;
    window.mousePressed=mousePressed;
    window.touchStarted=touchStarted;
    window.touchMoved=touchMoved;
  </script>
</body>
</html>
