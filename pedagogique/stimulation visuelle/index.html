<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Stimulation visuelle</title>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css?family=Roboto:400,500&display=swap"
  />
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Roboto', sans-serif;
    }
    #tsparticles {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }
    #menu {
      position: fixed;
      top: 60px;
      right: -300px;
      width: 270px;
      background: rgba(0, 0, 0, 0.85);
      padding: 10px 15px;
      border-radius: 5px;
      z-index: 1000;
      transition: right 0.3s ease, opacity 0.3s ease;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      opacity: 0;
      color: #fff;
      overflow-y: auto;
      max-height: calc(100vh - 80px);
    }
    #menu.show {
      right: 10px;
      opacity: 1;
    }
    #menu h2, #menu h3 {
      margin-top: 15px;
      margin-bottom: 8px;
      color: #00bfff;
      font-weight: 500;
    }
    #menu h2 {
      font-size: 20px;
      text-align: center;
    }
    #menu h3 {
      font-size: 16px;
    }
    #menu label {
      display: flex;
      flex-direction: column;
      margin: 8px 0;
      font-size: 13px;
    }
    #menu label:hover {
      color: #00bfff;
    }
    #menu input[type="range"],
    #menu input[type="color"],
    #menu select,
    #menu input[type="text"],
    #menu input[type="checkbox"] {
      margin-top: 5px;
    }
    #menu input[type="checkbox"] {
      align-self: flex-start;
      transform: scale(1.1);
      cursor: pointer;
    }
    #menu input[type="text"] {
      padding: 4px;
      border: none;
      border-radius: 3px;
    }
    #menu select {
      padding: 4px;
      border: none;
      border-radius: 3px;
      background-color: #333;
      color: #fff;
    }
    #settings-icon {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      cursor: pointer;
      z-index: 1001;
      background-color: rgba(0, 0, 0, 0.7);
      transition: transform 0.3s ease, background-color 0.3s ease;
    }
    #settings-icon:hover {
      transform: rotate(90deg);
      background-color: rgba(0, 0, 0, 0.9);
    }
    #shapeOptions {
      margin-top: 10px;
    }
    #shapeOptions label {
      display: none;
    }
    #shapeOptions label.active {
      display: flex;
    }
    #fullscreen-btn, #pause-btn {
      position: fixed;
      top: 15px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      z-index: 1001;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    #fullscreen-btn:hover, #pause-btn:hover {
      background: rgba(0, 0, 0, 0.9);
    }
    #fullscreen-btn {
      right: 60px;
    }
    #pause-btn {
      right: 150px;
    }
    .custom-file-upload {
      display: inline-block;
      padding: 5px 10px;
      cursor: pointer;
      background-color: #00bfff;
      color: white;
      border-radius: 4px;
      margin-top: 5px;
      text-align: center;
      font-size: 12px;
    }
    .custom-file-upload:hover {
      background-color: #008fcc;
    }
    #fileName {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      color: #bbb;
    }
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }
    input[type="range"]:focus {
      outline: none;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      background: #555;
      border-radius: 5px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 16px;
      background: #00bfff;
      border-radius: 50%;
      margin-top: -5px;
    }
    input[type="range"]::-moz-range-thumb {
      height: 16px;
      width: 16px;
      background: #00bfff;
      border-radius: 50%;
    }
    input[type="range"]::-ms-thumb {
      height: 16px;
      width: 16px;
      background: #00bfff;
      border-radius: 50%;
    }
    /* Start Overlay Styles */
    #startOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      font-family: 'Roboto', sans-serif;
      z-index: 10;
      text-align: center;
      font-size: 20px;
    }
    #startButton {
      padding: 20px 40px;
      font-size: 24px;
      cursor: pointer;
      background-color: #0077be;
      border: none;
      border-radius: 10px;
      color: white;
      margin-top: 20px;
    }
    #startButton:hover {
      background-color: #0088cc;
    }
    #protocolIndicator {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 1002;
      padding: 8px 12px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-size: 13px;
      display: none;
      max-width: 360px;
    }
    #protocolStatus {
      color: #9ad9ff;
      font-weight: 500;
    }
    .protocol-buttons {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .protocol-buttons button {
      flex: 1;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      padding: 6px;
      color: #fff;
      background: #0077be;
      font-size: 12px;
    }
    .protocol-buttons button:hover {
      background: #008fcc;
    }
    .protocol-note {
      min-height: 60px;
      resize: vertical;
      border-radius: 4px;
      border: none;
      margin-top: 5px;
      padding: 6px;
      font-family: inherit;
    }
    .protocol-locked {
      opacity: 0.45;
      pointer-events: none;
    }
    /* End Overlay Styles */
  </style>
</head>

  <div id="menu">

          <option value="🚀">🚀</option>
          <option value="🍀">🍀</option>
          <option value="🌈">🌈</option>
          <option value="🍕">🍕</option>
          <option value="🎃">🎃</option>
          <option value="❄️">❄️</option>
          <option value="☀️">☀️</option>
          <option value="💎">💎</option>
          <option value="⚽">⚽</option>
          <option value="🎁">🎁</option>

          <option value="🐶">🐶</option>

    <label>

    <h3>Mode protocole (optionnel)</h3>
    <label>
      Activer le protocole:
      <input type="checkbox" id="protocolEnabledToggle">
    </label>
    <div id="protocolSettings">
      <label>
        Forme fixe:
        <select id="protocolShapeSelector">
          <option value="circle">Cercle</option>
          <option value="square">Carré</option>
          <option value="triangle">Triangle</option>
          <option value="polygon">Polygone</option>
          <option value="star">Étoile</option>
          <option value="character">Caractère</option>
          <option value="emoji">Emoji</option>
          <option value="image">Image</option>
        </select>
      </label>
      <label>
        Taille constante (0-100): <span id="protocolSizeValue">50</span>
        <input type="range" id="protocolSizeSlider" min="0" max="100" value="50">
      </label>
      <label>
        Vitesse constante (0-50): <span id="protocolSpeedValue">5</span>
        <input type="range" id="protocolSpeedSlider" min="0" max="50" value="5">

      <label>

        <input type="color" id="protocolBaseColorPicker" value="#ff0000">
      </label>
      <label>
        Durée par étape (secondes):
        <input type="number" id="protocolStepDuration" min="1" max="600" value="20">
      </label>
      <label>
        Observation pour l'étape courante:
        <textarea id="protocolStepNote" class="protocol-note" placeholder="Ex: fixation visuelle brève, poursuite horizontale..." ></textarea>
      </label>
      <div class="protocol-buttons">
        <button id="saveProtocolPresetBtn" type="button">Enregistrer preset JSON</button>
        <label class="custom-file-upload" style="margin-top:0;flex:1;">
          <input type="file" id="loadProtocolPresetInput" accept="application/json" style="display:none;">
          Charger preset JSON
        </label>
      </div>
    </div>
  </div>
  <div id="tsparticles"></div>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.1/tsparticles.bundle.min.js"></script>
  <script>
    const config = {
      particles: {
        number: { value: 100 },
        color: { value: "#ffffff" },
        shape: {
          type: "circle",
          options: {
            character: { value: "A" },
            emoji: { value: "😀" },
          },
        },
        size: { value: 5 },
        move: {
          enable: true,
          speed: 5,
          direction: "none",
          straight: true,
        },
      },
      background: { color: { value: "#000000" } },
    };

    let uploadedImageUrl = null;
    let inactivityTimer;
    const inactivityDuration = 10000;
    let particlesInstance;
    let started = false;
    let isPaused = false;
    let protocolStepTimer = null;
    let protocolCountdownInterval = null;

    const protocolState = {
      enabled: false,
      currentStepIndex: 0,
      steps: [],
      notes: {},
      stepDeadline: null,
      completed: false,
    };

    // Element references
    const shapeSelector = document.getElementById("shapeSelector");
    const characterOption = document.getElementById("characterOption");
    const characterInput = document.getElementById("characterInput");
    const emojiOption = document.getElementById("emojiOption");
    const emojiSelector = document.getElementById("emojiSelector");
    const sizeSlider = document.getElementById("sizeSlider");
    const sizeValue = document.getElementById("sizeValue");
    const speedSlider = document.getElementById("speedSlider");
    const speedValue = document.getElementById("speedValue");
    const colorPicker = document.getElementById("colorPicker");
    const randomColorToggle = document.getElementById("randomColorToggle");
    const backgroundColorPicker = document.getElementById("backgroundColorPicker");
    const numberSlider = document.getElementById("numberSlider");
    const numberValue = document.getElementById("numberValue");
    const directionSelector = document.getElementById("directionSelector");
    const straightToggle = document.getElementById("straightToggle");
    const trailToggle = document.getElementById("trailToggle");
    const imageUploader = document.getElementById("imageUploader");
    const menu = document.getElementById("menu");
    const settingsIcon = document.getElementById("settings-icon");
    const fullscreenBtn = document.getElementById("fullscreen-btn");
    const pauseBtn = document.getElementById("pause-btn");
    const fileNameDisplay = document.getElementById("fileName");
    const startButton = document.getElementById("startButton");
    const startOverlay = document.getElementById("startOverlay");
    const protocolIndicator = document.getElementById("protocolIndicator");
    const protocolStatus = document.getElementById("protocolStatus");
    const protocolTimer = document.getElementById("protocolTimer");
    const protocolEnabledToggle = document.getElementById("protocolEnabledToggle");
    const protocolSettings = document.getElementById("protocolSettings");
    const protocolShapeSelector = document.getElementById("protocolShapeSelector");
    const protocolSizeSlider = document.getElementById("protocolSizeSlider");
    const protocolSizeValue = document.getElementById("protocolSizeValue");
    const protocolSpeedSlider = document.getElementById("protocolSpeedSlider");
    const protocolSpeedValue = document.getElementById("protocolSpeedValue");
    const protocolBaseColorPicker = document.getElementById("protocolBaseColorPicker");
    const protocolStepDuration = document.getElementById("protocolStepDuration");
    const protocolStepNote = document.getElementById("protocolStepNote");
    const saveProtocolPresetBtn = document.getElementById("saveProtocolPresetBtn");
    const loadProtocolPresetInput = document.getElementById("loadProtocolPresetInput");

    const freePlayControlIds = [
      "shapeSelector",
      "characterInput",
      "emojiSelector",
      "sizeSlider",
      "colorPicker",
      "randomColorToggle",
      "numberSlider",
      "speedSlider",
      "directionSelector",
      "straightToggle",
      "trailToggle",
    ];

    startButton.addEventListener("click", startExperience);

    function startExperience() {
      startOverlay.remove();
      updateShapeOptions();
      setProtocolEnabled(protocolEnabledToggle.checked);
      updateConfig();
      loadParticles();
      started = true;
    }

    tsParticles.addShape("emoji", {
      draw: (context, particle, radius) => {
        const emoji = particle.shapeData?.value || "😀";
        context.font = `${radius * 2}px sans-serif`;
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.fillText(emoji, 0, 0);
      },
      init: (container, options) => {
        return { value: options?.particles?.shape?.options?.emoji?.value || "😀" };
      },
    });

    function updateShapeOptions() {
      characterOption.style.display = shapeSelector.value === "character" ? "flex" : "none";
      emojiOption.style.display = shapeSelector.value === "emoji" ? "flex" : "none";
    }

    function updateProtocolLabels() {
      protocolSizeValue.textContent = protocolSizeSlider.value;
      protocolSpeedValue.textContent = protocolSpeedSlider.value;
    }

    function hexToHsl(hex) {
      let r = 0;
      let g = 0;
      let b = 0;
      if (hex.length === 4) {
        r = Number(`0x${hex[1]}${hex[1]}`) / 255;
        g = Number(`0x${hex[2]}${hex[2]}`) / 255;
        b = Number(`0x${hex[3]}${hex[3]}`) / 255;
      } else {
        r = Number(`0x${hex[1]}${hex[2]}`) / 255;
        g = Number(`0x${hex[3]}${hex[4]}`) / 255;
        b = Number(`0x${hex[5]}${hex[6]}`) / 255;
      }

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const l = (max + min) / 2;
      let h = 0;
      let s = 0;

      if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r:
            h = (g - b) / d + (g < b ? 6 : 0);
            break;
          case g:
            h = (b - r) / d + 2;
            break;
          case b:
            h = (r - g) / d + 4;
            break;
          default:
            break;
        }
        h /= 6;
      }
      return { h: h * 360, s: s * 100, l: l * 100 };
    }

    function hslToHex(h, s, l) {
      const saturation = s / 100;
      const lightness = l / 100;
      const c = (1 - Math.abs(2 * lightness - 1)) * saturation;
      const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
      const m = lightness - c / 2;
      let r = 0;
      let g = 0;
      let b = 0;

      if (h >= 0 && h < 60) {
        r = c; g = x; b = 0;
      } else if (h >= 60 && h < 120) {
        r = x; g = c; b = 0;
      } else if (h >= 120 && h < 180) {
        r = 0; g = c; b = x;
      } else if (h >= 180 && h < 240) {
        r = 0; g = x; b = c;
      } else if (h >= 240 && h < 300) {
        r = x; g = 0; b = c;
      } else {
        r = c; g = 0; b = x;
      }

      const toHex = (value) => Math.round((value + m) * 255).toString(16).padStart(2, "0");
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function getColorFamilyName(hue) {
      if (hue < 20 || hue >= 340) return "Rouge";
      if (hue < 45) return "Orange";
      if (hue < 70) return "Jaune";
      if (hue < 170) return "Vert";
      if (hue < 220) return "Cyan";
      if (hue < 270) return "Bleu";
      if (hue < 320) return "Violet";
      return "Rose";
    }

    function generateProtocolSteps(baseColor) {
      const { h, l } = hexToHsl(baseColor);
      const colorFamily = getColorFamilyName(h);
      const saturationSteps = [100, 80, 60, 40, 20, 0];
      const steps = saturationSteps.map((saturation) => ({
        color: hslToHex(h, saturation, l),
        description: saturation === 0
          ? `${colorFamily} 0% saturation (gris coloré)`
          : `${colorFamily} ${saturation}% saturation`,
      }));

      steps.push({ color: "#ffffff", description: "Blanc" });
      steps.push({ color: "#9f9f9f", description: "Gris" });

      return steps;
    }

    function updateProtocolIndicator() {
      if (!protocolState.enabled) {
        protocolIndicator.style.display = "none";
        return;
      }

      protocolIndicator.style.display = "block";
      const total = protocolState.steps.length;
      const currentIndex = protocolState.currentStepIndex;
      const step = protocolState.steps[currentIndex];
      const stepNumber = Math.min(currentIndex + 1, total);

      if (protocolState.completed) {
        protocolStatus.textContent = `Protocole terminé: étape ${total}/${total} (${step?.description || ""})`;
        protocolTimer.textContent = "";
        return;
      }

      protocolStatus.textContent = `Étape ${stepNumber}/${total}: ${step?.description || ""}`;

      if (protocolState.stepDeadline) {
        const remainingSeconds = Math.max(0, Math.ceil((protocolState.stepDeadline - Date.now()) / 1000));
        protocolTimer.textContent = `Temps restant: ${remainingSeconds}s`;
      } else {
        protocolTimer.textContent = "";
      }
    }

    function refreshProtocolNoteField() {
      const currentIndex = protocolState.currentStepIndex;
      protocolStepNote.value = protocolState.notes[currentIndex] || "";
    }

    function saveCurrentProtocolNote() {
      if (!protocolState.enabled) {
        return;
      }
      protocolState.notes[protocolState.currentStepIndex] = protocolStepNote.value.trim();
    }

    function stopProtocolTimers() {
      if (protocolStepTimer) {
        clearTimeout(protocolStepTimer);
        protocolStepTimer = null;
      }
      if (protocolCountdownInterval) {
        clearInterval(protocolCountdownInterval);
        protocolCountdownInterval = null;
      }
      protocolState.stepDeadline = null;
    }

    function lockFreePlayControls(isLocked) {
      freePlayControlIds.forEach((id) => {
        const element = document.getElementById(id);
        if (!element) {
          return;
        }
        element.disabled = isLocked;
        const wrapperLabel = element.closest("label");
        if (wrapperLabel) {
          wrapperLabel.classList.toggle("protocol-locked", isLocked);
        }
      });
    }

    function applyProtocolStep(stepIndex) {
      if (!protocolState.steps.length) {
        return;
      }
      protocolState.currentStepIndex = stepIndex;
      refreshProtocolNoteField();
      updateConfig();
      loadParticles();
      updateProtocolIndicator();
    }

    function scheduleNextProtocolStep() {
      stopProtocolTimers();
      const durationSeconds = Math.max(1, parseInt(protocolStepDuration.value, 10) || 20);
      protocolState.stepDeadline = Date.now() + durationSeconds * 1000;
      protocolCountdownInterval = setInterval(updateProtocolIndicator, 500);

      protocolStepTimer = setTimeout(() => {
        saveCurrentProtocolNote();
        const nextStep = protocolState.currentStepIndex + 1;
        if (nextStep < protocolState.steps.length) {
          applyProtocolStep(nextStep);
          scheduleNextProtocolStep();
        } else {
          protocolState.completed = true;
          stopProtocolTimers();
          updateProtocolIndicator();
        }
      }, durationSeconds * 1000);
    }

    function restartProtocolSequence() {
      protocolState.steps = generateProtocolSteps(protocolBaseColorPicker.value);
      protocolState.currentStepIndex = 0;
      protocolState.completed = false;
      applyProtocolStep(0);
      scheduleNextProtocolStep();
    }

    function setProtocolEnabled(enabled) {
      protocolState.enabled = enabled;
      protocolSettings.classList.toggle("protocol-locked", !enabled);
      lockFreePlayControls(enabled);

      if (enabled) {
        restartProtocolSequence();
      } else {
        stopProtocolTimers();
        protocolState.completed = false;
        protocolIndicator.style.display = "none";
        updateConfig();
        loadParticles();
      }
    }

    function applyShapeConfig(selectedShape) {
      config.particles.shape.type = selectedShape;
      if (selectedShape === "image" && uploadedImageUrl) {
        config.particles.shape.options = { image: [{ src: uploadedImageUrl }] };
      } else if (selectedShape === "character") {
        config.particles.shape.options = { character: { value: characterInput.value || "A" } };
      } else if (selectedShape === "emoji") {
        config.particles.shape.options = { emoji: { value: emojiSelector.value } };
      } else {
        config.particles.shape.options = {};
      }
    }

    function sliderValueToParticleSize(sliderValue) {
      const minParticleSize = 5;
      const maxParticleSize = window.innerHeight / 2;
      const exponent = sliderValue / 100;
      return minParticleSize * Math.pow(maxParticleSize / minParticleSize, exponent);
    }

    function updateConfig() {
      config.background.color.value = backgroundColorPicker.value;

      if (protocolState.enabled) {
        const safeShape = protocolShapeSelector.value === "image" && !uploadedImageUrl
          ? "circle"
          : protocolShapeSelector.value;

        config.particles.number.value = 1;
        numberValue.textContent = "1";
        applyShapeConfig(safeShape);

        const currentStep = protocolState.steps[protocolState.currentStepIndex] || { color: protocolBaseColorPicker.value };
        config.particles.color.value = currentStep.color;

        const protocolSize = parseInt(protocolSizeSlider.value, 10);
        config.particles.size.value = sliderValueToParticleSize(protocolSize);
        sizeValue.textContent = protocolSizeSlider.value;

        const protocolSpeed = parseInt(protocolSpeedSlider.value, 10);
        config.particles.move.speed = protocolSpeed;
        speedValue.textContent = protocolSpeedSlider.value;

        config.particles.move.direction = "none";
        config.particles.move.straight = true;
        config.particles.move.trail = { enable: false };
        return;
      }

      config.particles.number.value = parseInt(numberSlider.value, 10);
      numberValue.textContent = numberSlider.value;
      config.particles.color.value = randomColorToggle.checked ? "random" : colorPicker.value;

      applyShapeConfig(shapeSelector.value);

      const sizeSliderValue = parseInt(sizeSlider.value, 10);
      config.particles.size.value = sliderValueToParticleSize(sizeSliderValue);
      sizeValue.textContent = sizeSlider.value;

      config.particles.move.speed = parseInt(speedSlider.value, 10);
      speedValue.textContent = speedSlider.value;
      config.particles.move.direction = directionSelector.value === "none" ? undefined : directionSelector.value;
      config.particles.move.straight = straightToggle.checked;

      if (trailToggle.checked) {
        config.particles.move.trail = {
          enable: true,
          length: 10,
          fillColor: {
            value: backgroundColorPicker.value,
          },
        };
      } else {
        config.particles.move.trail = {
          enable: false,
        };
      }
    }

    function loadParticles() {
      tsParticles.load("tsparticles", config).then((container) => {
        particlesInstance = container;
      });
    }

    function downloadProtocolPreset() {
      const payload = {
        fixedShape: protocolShapeSelector.value,
        fixedSize: parseInt(protocolSizeSlider.value, 10),
        fixedSpeed: parseInt(protocolSpeedSlider.value, 10),
        baseColor: protocolBaseColorPicker.value,
        stepDurationSeconds: Math.max(1, parseInt(protocolStepDuration.value, 10) || 20),
        notesByStep: protocolState.notes,
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const dateCode = new Date().toISOString().slice(0, 10);
      link.href = url;
      link.download = `stimulation-protocole-${dateCode}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function loadProtocolPreset(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (data.fixedShape) protocolShapeSelector.value = data.fixedShape;
          if (typeof data.fixedSize === "number") protocolSizeSlider.value = String(data.fixedSize);
          if (typeof data.fixedSpeed === "number") protocolSpeedSlider.value = String(data.fixedSpeed);
          if (data.baseColor) protocolBaseColorPicker.value = data.baseColor;
          if (typeof data.stepDurationSeconds === "number") {
            protocolStepDuration.value = String(Math.max(1, data.stepDurationSeconds));
          }
          protocolState.notes = data.notesByStep && typeof data.notesByStep === "object" ? data.notesByStep : {};
          updateProtocolLabels();

          if (protocolState.enabled) {
            restartProtocolSequence();
          }
        } catch (error) {
          alert("Preset invalide: impossible de lire ce fichier JSON.");
        }
      };
      reader.readAsText(file);
    }

    function startInactivityTimer() {
      clearInactivityTimer();
      inactivityTimer = setTimeout(() => {
        menu.classList.remove("show");
      }, inactivityDuration);
    }

    function clearInactivityTimer() {
      if (inactivityTimer) {
        clearTimeout(inactivityTimer);
        inactivityTimer = null;
      }
    }

    function resetInactivityTimer() {
      startInactivityTimer();
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch((err) => {
          console.error(`Error attempting to enable fullscreen mode: ${err.message} (${err.name})`);
        });
      } else {
        document.exitFullscreen();
      }
    }

    function togglePause() {
      if (particlesInstance) {
        if (!isPaused) {
          particlesInstance.pause();
          pauseBtn.textContent = "Reprendre";
        } else {
          particlesInstance.play();
          pauseBtn.textContent = "Pause";
        }
        isPaused = !isPaused;
      }
    }

    settingsIcon.addEventListener("click", () => {
      menu.classList.toggle("show");
      if (menu.classList.contains("show")) {
        startInactivityTimer();
      } else {
        clearInactivityTimer();
      }
    });

    menu.addEventListener("mousemove", resetInactivityTimer);
    menu.addEventListener("input", resetInactivityTimer);

    shapeSelector.addEventListener("change", () => {
      updateShapeOptions();
      if (started) {
        updateConfig();
        loadParticles();
      }
    });

    [
      characterInput,
      emojiSelector,
      sizeSlider,
      speedSlider,
      colorPicker,
      randomColorToggle,
      backgroundColorPicker,
      numberSlider,
      straightToggle,
      trailToggle,
    ].forEach((element) => {
      element.addEventListener(element === randomColorToggle || element === straightToggle || element === trailToggle ? "change" : "input", () => {
        if (started) {
          updateConfig();
          loadParticles();
        }
      });
    });

    directionSelector.addEventListener("change", () => {
      if (started) {
        updateConfig();
        loadParticles();
      }
    });

    imageUploader.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (file) {
        fileNameDisplay.textContent = file.name;
        const reader = new FileReader();
        reader.onload = (e) => {
          uploadedImageUrl = e.target.result;
          shapeSelector.value = "image";
          updateShapeOptions();
          if (started) {
            updateConfig();
            loadParticles();
          }
        };
        reader.readAsDataURL(file);
      } else {
        fileNameDisplay.textContent = "Aucun fichier choisi";
      }
    });

    protocolEnabledToggle.addEventListener("change", () => {
      saveCurrentProtocolNote();
      setProtocolEnabled(protocolEnabledToggle.checked);
    });

    [protocolShapeSelector, protocolBaseColorPicker, protocolStepDuration].forEach((element) => {
      element.addEventListener("change", () => {
        if (protocolState.enabled) {
          restartProtocolSequence();
        }
      });
    });

    [protocolSizeSlider, protocolSpeedSlider].forEach((element) => {
      element.addEventListener("input", () => {
        updateProtocolLabels();
        if (protocolState.enabled) {
          updateConfig();
          loadParticles();
        }
      });
    });

    protocolStepNote.addEventListener("input", saveCurrentProtocolNote);

    saveProtocolPresetBtn.addEventListener("click", () => {
      saveCurrentProtocolNote();
      downloadProtocolPreset();
    });

    loadProtocolPresetInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (file) {
        loadProtocolPreset(file);
      }
    });

    fullscreenBtn.addEventListener("click", toggleFullscreen);
    pauseBtn.addEventListener("click", togglePause);

    document.addEventListener("keydown", (event) => {
      if (event.key === "f" || event.key === "F") {
        toggleFullscreen();
      } else if (event.key === "p" || event.key === "P") {
        togglePause();
      }
    });

    updateShapeOptions();
    updateProtocolLabels();
    protocolSettings.classList.add("protocol-locked");
  </script>
</body>
</html>
