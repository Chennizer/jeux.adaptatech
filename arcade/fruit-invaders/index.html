<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title class="translate" data-fr="Fruit Invaders" data-en="Fruit Invaders" data-ja="フルーツインベーダー">Fruit Invaders</title>
  <link rel="stylesheet" href="../../css/control-panel.css">
  <link rel="stylesheet" href="../../css/games.css">
  <link rel="stylesheet" href="../../css/gaming.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/video-stop-action.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1d2b64 0%, #050516 70%);
      color: #fff;
      overflow: hidden;
    }

    #game-shell {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      padding: 1rem;
      box-sizing: border-box;
    }

    #game-shell.active {
      display: flex;
    }

    #hud {
      width: min(940px, 94vw);
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-family: 'Press Start 2P', system-ui, sans-serif;
      font-size: clamp(0.55rem, 1.1vw, 0.75rem);
      color: #6ff4ff;
      text-shadow: 0 0 10px rgba(42, 210, 255, 0.5);
    }

    #game-canvas {
      width: min(940px, 94vw);
      height: min(520px, 68vh);
      border: 2px solid rgba(89, 247, 255, 0.65);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(6, 11, 44, 0.95), rgba(2, 4, 21, 0.98));
      box-shadow: 0 0 35px rgba(78, 237, 255, 0.25), inset 0 0 60px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .target {
      position: absolute;
      width: 90px;
      height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.4));
      transition: transform 0.18s ease;
      pointer-events: none;
    }

    .target.hit {
      transform: scale(1.35) rotate(8deg);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      bottom: 42px;
      transform: translateX(-50%);
      width: 76px;
      height: 76px;
      border-radius: 999px;
      border: 2px solid rgba(255, 75, 116, 0.9);
      box-shadow: 0 0 18px rgba(255, 77, 122, 0.6);
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 75, 116, 0.95);
    }

    #crosshair::before {
      width: 2px;
      height: 100%;
      left: calc(50% - 1px);
      top: 0;
    }

    #crosshair::after {
      height: 2px;
      width: 100%;
      top: calc(50% - 1px);
      left: 0;
    }

    #helper-text {
      margin: 0;
      text-align: center;
      color: #dbe2ff;
      font-size: clamp(0.8rem, 1.6vw, 1.05rem);
    }
  </style>
</head>
<body
  class="video-stop-action-page"
  style="--menu-backdrop-image: url('../../images/arcade/mariomoviecover.png'); --menu-side-image: url('../../images/pictos/watermelon.png');"
>
  <button id="language-toggle" title="Changer de langue / Change language">FR / EN</button>

  <div id="control-panel">
    <div id="control-panel-options" class="control-panel-options">
      <div class="game-menu-layout stop-action-menu-layout">
        <div class="game-menu-main">
          <div id="options-title-bar">
            <h1 id="options-arcade-title">Arcade</h1>
            <h2 id="options-main-title" class="translate" data-fr="Fruit Invaders" data-en="Fruit Invaders" data-ja="フルーツインベーダー">Fruit Invaders</h2>
          </div>

          <p id="control-panel-instructions" class="control-panel-instructions translate"
             data-fr="Toutes les 10 secondes, un envahisseur fruité apparaît. Appuie sur Espace pour le détruire !"
             data-en="Every 10 seconds a fruit invader appears. Press Space to shoot it down!"
             data-ja="10秒ごとにフルーツの敵が出現します。スペースキーで撃ち落とそう！">
          </p>

          <div id="mode-divider"></div>

          <div id="options-inline-container" class="stop-action-options-inline-container">
            <div class="option-item stop-action-mode-card">
              <p class="stop-action-mode-description translate" data-fr="Type de contrôle" data-en="Input type" data-ja="入力タイプ">Type de contrôle</p>
              <div id="input-mode-segmented-control" role="tablist" aria-label="Input mode selector">
                <button type="button" class="stop-action-mode-btn input-mode-btn selected translate" aria-pressed="true" data-fr="Switch" data-en="Switch" data-ja="スイッチ">Switch</button>
              </div>
            </div>
            <div class="option-item stop-action-mode-card">
              <div id="stop-action-mode-segmented-control" role="tablist" aria-label="Mode selector">
                <button type="button" class="stop-action-mode-btn selected translate" aria-pressed="true" data-fr="Normal" data-en="Normal" data-ja="ノーマル">Normal</button>
              </div>
              <p class="stop-action-mode-description translate"
                 data-fr="Mode préparé : switch normal"
                 data-en="Prepared mode: normal switch"
                 data-ja="準備済みモード：通常スイッチ">
              </p>
            </div>
          </div>

          <div id="mode-divider"></div>

          <div id="button-container" class="button-container stop-action-button-container">
            <button id="control-panel-start-button" class="button translate" data-fr="Commencer" data-en="Start" data-ja="開始">Commencer</button>
          </div>
        </div>

        <aside class="game-menu-art" aria-hidden="true">
          <div class="game-menu-art-card">
            <div class="game-menu-art-image"></div>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <div id="game-shell" aria-live="polite">
    <div id="hud">
      <div id="score">Score: 0</div>
      <div id="next-wave">Next target: 10s</div>
      <div id="wave-count">Targets: 0</div>
    </div>
    <div id="game-canvas">
      <div id="crosshair" aria-hidden="true"></div>
    </div>
    <p id="helper-text" class="translate"
       data-fr="Appuie sur ESPACE pour tirer."
       data-en="Press SPACE to shoot."
       data-ja="スペースキーで発射。">
    </p>
  </div>

  <audio id="bg-music" src="../../songs/space/spacequest1.mp3" preload="auto" loop></audio>
  <script src="../../js/translationmain.js"></script>
  <script>
    (() => {
      const startButton = document.getElementById('control-panel-start-button');
      const controlPanel = document.getElementById('control-panel');
      const gameShell = document.getElementById('game-shell');
      const gameCanvas = document.getElementById('game-canvas');
      const scoreNode = document.getElementById('score');
      const waveNode = document.getElementById('wave-count');
      const nextWaveNode = document.getElementById('next-wave');
      const music = document.getElementById('bg-music');

      const FRUITS = [
        '../../images/pictos/apple.png',
        '../../images/pictos/orange.png',
        '../../images/pictos/pear.png',
        '../../images/pictos/watermelon.png',
        '../../images/pictos/strawberry.png',
        '../../images/pictos/grapes.png',
        '../../images/pictos/pineapple.png',
        '../../images/pictos/kiwi.png'
      ];

      const SPAWN_INTERVAL_MS = 10000;
      const ACTIVE_TIME_MS = 9000;
      let gameStarted = false;
      let score = 0;
      let waves = 0;
      let activeTarget = null;
      let spawnTimer = null;
      let countdownTimer = null;
      let nextSpawnAt = 0;

      function updateHud() {
        scoreNode.textContent = `Score: ${score}`;
        waveNode.textContent = `Targets: ${waves}`;
      }

      function clearActiveTarget() {
        if (!activeTarget) return;
        activeTarget.remove();
        activeTarget = null;
      }

      function createTarget() {
        clearActiveTarget();
        const img = document.createElement('img');
        img.className = 'target';
        img.alt = 'Fruit invader';
        img.src = FRUITS[Math.floor(Math.random() * FRUITS.length)];

        const canvasRect = gameCanvas.getBoundingClientRect();
        const maxX = Math.max(20, canvasRect.width - 110);
        const startX = 10 + Math.random() * maxX;
        img.style.left = `${startX}px`;
        img.style.top = `${Math.random() * (canvasRect.height * 0.5)}px`;

        gameCanvas.appendChild(img);
        activeTarget = img;
        waves += 1;
        updateHud();

        window.setTimeout(() => {
          if (activeTarget === img) {
            clearActiveTarget();
          }
        }, ACTIVE_TIME_MS);
      }

      function scheduleWaves() {
        createTarget();
        nextSpawnAt = Date.now() + SPAWN_INTERVAL_MS;

        spawnTimer = window.setInterval(() => {
          createTarget();
          nextSpawnAt = Date.now() + SPAWN_INTERVAL_MS;
        }, SPAWN_INTERVAL_MS);

        countdownTimer = window.setInterval(() => {
          const seconds = Math.max(0, Math.ceil((nextSpawnAt - Date.now()) / 1000));
          nextWaveNode.textContent = `Next target: ${seconds}s`;
        }, 200);
      }

      function fireShot() {
        if (!gameStarted || !activeTarget) return;
        const targetToRemove = activeTarget;
        targetToRemove.classList.add('hit');
        score += 1;
        updateHud();

        window.setTimeout(() => {
          if (targetToRemove === activeTarget) {
            clearActiveTarget();
          } else {
            targetToRemove.remove();
          }
        }, 220);
      }

      function startGame() {
        if (gameStarted) return;
        gameStarted = true;

        controlPanel.classList.add('hidden');
        gameShell.classList.add('active');
        updateHud();

        music.currentTime = 0;
        music.play().catch(() => {
          // Ignore autoplay restrictions; player can interact with space/start.
        });

        scheduleWaves();
      }

      startButton?.addEventListener('click', startGame);
      document.getElementById('language-toggle')?.addEventListener('pointerup', toggleLanguage);

      document.addEventListener('keydown', (event) => {
        if (event.code === 'Space') {
          event.preventDefault();
          if (!gameStarted) {
            startGame();
            return;
          }
          fireShot();
        }
      });

      window.addEventListener('beforeunload', () => {
        if (spawnTimer) window.clearInterval(spawnTimer);
        if (countdownTimer) window.clearInterval(countdownTimer);
      });
    })();
  </script>
</body>
</html>
