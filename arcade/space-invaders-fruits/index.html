<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title class="translate" data-fr="Arcade : Fruits de l'espace" data-en="Arcade: Space Fruit Blaster" data-ja="アーケード：スペースフルーツブラスター">Arcade: Space Fruit Blaster</title>
  <link rel="stylesheet" href="../../css/control-panel.css">
  <link rel="stylesheet" href="../../css/games.css">
  <link rel="stylesheet" href="../../css/gaming.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/video-stop-action.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B45TJG4GBJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);} 
    gtag('js', new Date());
    gtag('config', 'G-B45TJG4GBJ');
  </script>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #game-container { position: fixed; inset: 0; display: none; }
    #game-canvas { width: 100%; height: 100%; display: block; }

    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 30;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      font-size: 14px;
      line-height: 1.7;
      display: none;
    }

    #game-over {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 35;
      background: rgba(0,0,0,0.5);
    }

    #game-over .results-panel {
      font-family: 'Press Start 2P', cursive;
      text-align: center;
      max-width: min(90vw, 680px);
    }

    #game-over-score {
      color: #fff;
      margin: 18px 0;
      font-size: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body
  class="video-stop-action-page"
  style="--menu-backdrop-image: url('../../images/arcade/mariomoviecover.png'); --menu-side-image: url('../../images/arcade/mariomoviecover.png');"
  data-input-mode="switch"
>
  <button id="language-toggle" title="Changer de langue / Change language">FR / EN</button>

  <div id="control-panel">
    <div id="control-panel-options" class="control-panel-options">
      <div class="game-menu-layout stop-action-menu-layout">
        <div class="game-menu-main">
          <div id="options-title-bar">
            <h1 id="options-arcade-title">Arcade</h1>
            <h2 id="options-main-title" class="translate" data-fr="Fruits de l'espace" data-en="Space Fruit Blaster" data-ja="スペースフルーツブラスター">Fruits de l'espace</h2>
          </div>

          <p id="control-panel-instructions" class="control-panel-instructions translate"
             data-fr="Des aliens-fruits apparaissent toutes les 10 secondes. Appuie sur espace pour tirer et les détruire !"
             data-en="Fruit aliens appear every 10 seconds. Press space to shoot them down!"
             data-ja="10秒ごとにフルーツエイリアンが現れます。スペースキーで撃ち落とそう！">
          </p>

          <div id="mode-divider"></div>

          <div id="options-inline-container" class="stop-action-options-inline-container">
            <div class="option-item stop-action-mode-card">
              <p class="stop-action-mode-description translate" data-fr="Type de contrôle" data-en="Input type" data-ja="入力タイプ">Type de contrôle</p>
              <div id="input-mode-segmented-control" role="tablist" aria-label="Input mode selector">
                <button type="button" class="stop-action-mode-btn input-mode-btn translate selected" data-input-mode="switch" data-fr="Switch" data-en="Switch" data-ja="スイッチ" aria-pressed="true">Switch</button>
                <button type="button" class="stop-action-mode-btn input-mode-btn translate" data-input-mode="eyegaze" data-fr="Eyegaze" data-en="Eyegaze" data-ja="視線" aria-pressed="false">Eyegaze</button>
              </div>
            </div>
            <div class="option-item stop-action-mode-card">
              <div id="stop-action-mode-segmented-control" role="tablist" aria-label="Mode selector">
                <button type="button" class="stop-action-mode-btn selected translate" data-mode="normal" data-fr="Normal" data-en="Normal" data-ja="ノーマル" aria-pressed="true">Normal</button>
                <button type="button" class="stop-action-mode-btn translate" data-mode="hard" data-fr="Difficile" data-en="Hard" data-ja="ハード" aria-pressed="false">Difficile</button>
                <button type="button" class="stop-action-mode-btn translate" data-mode="competitive" data-fr="Maître" data-en="Master" data-ja="マスター" aria-pressed="false">Maître</button>
              </div>
              <p id="stop-action-mode-description" class="stop-action-mode-description"></p>
            </div>
          </div>

          <div id="mode-divider"></div>

          <div id="button-container" class="button-container stop-action-button-container">
            <button id="control-panel-start-button" class="button translate" data-fr="Commencer" data-en="Start" data-ja="開始">Commencer</button>
          </div>
        </div>

        <aside class="game-menu-art" aria-hidden="true">
          <div class="game-menu-art-card">
            <div class="game-menu-art-image"></div>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>

  <div id="hud" class="hud">
    <div id="hud-score">Score: 0</div>
    <div id="hud-lives">Lives: 3</div>
  </div>

  <div id="game-over" class="hidden">
    <div class="results-panel stop-action-results-panel">
      <h2 class="translate" data-fr="Partie terminée" data-en="Game over" data-ja="ゲームオーバー">Partie terminée</h2>
      <p id="game-over-score"></p>
      <button id="continue-button" class="button translate" data-fr="Recommencer" data-en="Restart" data-ja="もう一度">Recommencer</button>
    </div>
  </div>

  <audio id="bg-music" src="../../songs/space/spacequest1.mp3" preload="auto" loop></audio>

  <script src="../../js/translationmain.js"></script>
  <script>
    (() => {
      const controlPanel = document.getElementById('control-panel');
      const startButton = document.getElementById('control-panel-start-button');
      const gameContainer = document.getElementById('game-container');
      const hud = document.getElementById('hud');
      const gameOverScreen = document.getElementById('game-over');
      const restartButton = document.getElementById('continue-button');
      const music = document.getElementById('bg-music');
      const languageToggleButton = document.getElementById('language-toggle');

      const scoreNode = document.getElementById('hud-score');
      const livesNode = document.getElementById('hud-lives');
      const gameOverScore = document.getElementById('game-over-score');

      const canvas = document.getElementById('game-canvas');
      const ctx = canvas.getContext('2d');

      const enemySprites = [];
      const fruitPaths = [
        '../../images/pictos/apple.png',
        '../../images/pictos/orange.png',
        '../../images/pictos/banana.png',
        '../../images/pictos/strawberry.png',
        '../../images/pictos/kiwi.png',
        '../../images/pictos/grapes.png',
        '../../images/pictos/lemon.png',
        '../../images/pictos/pineapple.png'
      ];

      let inputMode = 'switch';
      let difficulty = 'normal';
      let running = false;
      let rafId = null;
      let score = 0;
      let lives = 3;
      let enemySpawnTimer = 0;
      let lastTs = 0;
      let motionTime = 0;

      const stars = [];
      const bullets = [];
      const enemies = [];
      let nextEnemyId = 1;
      const STAR_COUNT = 220;
      const ENEMY_INTERVAL = 10000;

      const player = {
        x: 0,
        y: 0,
        width: 72,
        height: 28,
        cooldown: 0
      };

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = canvas.height - 90;
        if (player.x === 0) player.x = canvas.width * 0.5;
      }

      function makeStars() {
        stars.length = 0;
        for (let i = 0; i < STAR_COUNT; i += 1) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            z: Math.random() * 1,
            size: 1 + Math.random() * 2.5
          });
        }
      }

      function updateStars(dt) {
        const speed = 160;
        for (const star of stars) {
          star.y += speed * (0.35 + star.z) * dt;
          if (star.y > canvas.height + 4) {
            star.y = -8;
            star.x = Math.random() * canvas.width;
            star.z = Math.random();
            star.size = 1 + Math.random() * 2.5;
          }
        }
      }

      function drawStars() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (const star of stars) {
          const alpha = 0.35 + star.z * 0.65;
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.fillRect(star.x, star.y, star.size, star.size);
        }
      }

      function loadSprites() {
        fruitPaths.forEach((path) => {
          const img = new Image();
          img.src = path;
          enemySprites.push(img);
        });
      }

      function spawnEnemy() {
        const image = enemySprites[Math.floor(Math.random() * enemySprites.length)] || null;
        const size = 48;
        enemies.push({
          id: nextEnemyId++,
          x: 30 + Math.random() * Math.max(60, canvas.width - 60),
          y: 70,
          size,
          speed: difficulty === 'competitive' ? 100 : difficulty === 'hard' ? 75 : 58,
          image
        });
      }

      function shoot() {
        if (!running || player.cooldown > 0) return;
        const muzzleX = player.x;
        const muzzleY = player.y - 16;
        const speed = 540;
        const target = findNearestEnemy(muzzleX, muzzleY);
        let vx = 0;
        let vy = -speed;
        let targetId = null;
        let homing = false;

        if (target) {
          targetId = target.id;
          homing = true;
          const arcDirection = target.x >= muzzleX ? 1 : -1;
          const launchAngle = (-Math.PI / 2) + arcDirection * 0.48;
          vx = Math.cos(launchAngle) * speed;
          vy = Math.sin(launchAngle) * speed;
        }

        bullets.push({
          x: muzzleX,
          y: muzzleY,
          vx,
          vy,
          speed,
          targetId,
          homing,
          turnRate: 3.2,
          r: 6,
          trail: []
        });
        player.cooldown = 1.0;
      }

      function updateGame(dt) {
        player.cooldown = Math.max(0, player.cooldown - dt);

        motionTime += dt;
        const centerX = canvas.width * 0.5;
        const horizontalRange = canvas.width / 12; // total sweep is 1/6th of the screen width
        player.x = centerX + Math.sin(motionTime * 0.6) * horizontalRange;

        enemySpawnTimer += dt * 1000;
        if (enemySpawnTimer >= ENEMY_INTERVAL) {
          enemySpawnTimer = 0;
          spawnEnemy();
        }

        for (let i = bullets.length - 1; i >= 0; i -= 1) {
          const b = bullets[i];
          b.trail.unshift({ x: b.x, y: b.y, life: 0.35 });
          if (b.trail.length > 10) b.trail.pop();
          for (const p of b.trail) p.life -= dt;
          b.trail = b.trail.filter((p) => p.life > 0);

          if (b.homing && b.targetId !== null) {
            const targetEnemy = findEnemyById(b.targetId);
            if (targetEnemy) {
              const desiredAngle = Math.atan2(targetEnemy.y - b.y, targetEnemy.x - b.x);
              const currentAngle = Math.atan2(b.vy, b.vx);
              let delta = desiredAngle - currentAngle;
              while (delta > Math.PI) delta -= Math.PI * 2;
              while (delta < -Math.PI) delta += Math.PI * 2;
              const maxTurn = b.turnRate * dt;
              const clampedTurn = Math.max(-maxTurn, Math.min(maxTurn, delta));
              const nextAngle = currentAngle + clampedTurn;
              b.vx = Math.cos(nextAngle) * b.speed;
              b.vy = Math.sin(nextAngle) * b.speed;
            }
          }

          b.x += b.vx * dt;
          b.y += b.vy * dt;
          if (b.y < -20 || b.y > canvas.height + 20 || b.x < -20 || b.x > canvas.width + 20) bullets.splice(i, 1);
        }

        for (let i = enemies.length - 1; i >= 0; i -= 1) {
          const e = enemies[i];
          e.y += e.speed * dt;

          if (e.y - e.size * 0.5 > canvas.height) {
            enemies.splice(i, 1);
            lives -= 1;
            updateHud();
            if (lives <= 0) {
              endGame();
              return;
            }
            continue;
          }

          for (let j = bullets.length - 1; j >= 0; j -= 1) {
            const b = bullets[j];
            const dx = b.x - e.x;
            const dy = b.y - e.y;
            if ((dx * dx + dy * dy) <= ((e.size * 0.45) * (e.size * 0.45))) {
              bullets.splice(j, 1);
              enemies.splice(i, 1);
              score += 10;
              updateHud();
              break;
            }
          }
        }
      }

      function drawPlayer() {
        const x = player.x;
        const y = player.y;

        ctx.save();
        ctx.translate(x, y);

        ctx.fillStyle = '#21e0ff';
        ctx.beginPath();
        ctx.moveTo(0, -26);
        ctx.lineTo(-22, 18);
        ctx.lineTo(22, 18);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#005d8e';
        ctx.fillRect(-34, 18, 68, 10);

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-8, -3, 16, 8);

        ctx.restore();
      }

      function drawBullets() {
        for (const b of bullets) {
          for (const p of b.trail) {
            const alpha = Math.max(0, p.life / 0.35) * 0.5;
            ctx.fillStyle = `rgba(255, 170, 60, ${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(1.5, b.r - 3), 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.fillStyle = '#ffd66b';
          ctx.save();
          ctx.translate(b.x, b.y);
          ctx.rotate(Math.atan2(b.vy, b.vx));
          ctx.fillStyle = '#ffc24b';
          ctx.beginPath();
          ctx.moveTo(b.r + 2, 0);
          ctx.lineTo(-b.r, -b.r * 0.7);
          ctx.lineTo(-b.r, b.r * 0.7);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = '#fff4c4';
          ctx.beginPath();
          ctx.ellipse(-b.r * 0.2, 0, b.r * 0.5, b.r * 0.3, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function findNearestEnemy(x, y) {
        if (!enemies.length) return null;
        let best = null;
        let bestDistSq = Infinity;
        for (const e of enemies) {
          const dx = e.x - x;
          const dy = e.y - y;
          const d2 = dx * dx + dy * dy;
          if (d2 < bestDistSq) {
            bestDistSq = d2;
            best = e;
          }
        }
        return best;
      }

      function findEnemyById(id) {
        for (const enemy of enemies) {
          if (enemy.id === id) return enemy;
        }
        return null;
      }

      function drawEnemies() {
        for (const e of enemies) {
          if (e.image && e.image.complete) {
            ctx.drawImage(e.image, e.x - e.size * 0.5, e.y - e.size * 0.5, e.size, e.size);
          } else {
            ctx.fillStyle = '#ff3b6b';
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size * 0.4, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      function updateHud() {
        scoreNode.textContent = `Score: ${score}`;
        livesNode.textContent = `Lives: ${lives}`;
      }

      function updateHudLanguage() {
        const lang = (typeof getStoredLanguage === 'function' ? getStoredLanguage() : (document.documentElement.lang || 'fr')) || 'fr';
        const scoreLabel = lang === 'fr' ? 'Score' : lang === 'ja' ? 'スコア' : 'Score';
        const livesLabel = lang === 'fr' ? 'Vies' : lang === 'ja' ? 'ライフ' : 'Lives';
        scoreNode.textContent = `${scoreLabel}: ${score}`;
        livesNode.textContent = `${livesLabel}: ${lives}`;
      }

      function tick(ts) {
        if (!running) return;
        const dt = Math.min(0.033, (ts - lastTs) / 1000 || 0.016);
        lastTs = ts;

        updateStars(dt);
        updateGame(dt);

        drawStars();
        drawEnemies();
        drawBullets();
        drawPlayer();

        rafId = requestAnimationFrame(tick);
      }

      function startGame() {
        controlPanel.style.display = 'none';
        gameContainer.style.display = 'block';
        hud.style.display = 'block';
        gameOverScreen.style.display = 'none';
        if (languageToggleButton) languageToggleButton.style.display = 'none';

        score = 0;
        lives = difficulty === 'competitive' ? 2 : difficulty === 'hard' ? 3 : 4;
        bullets.length = 0;
        enemies.length = 0;
        enemySpawnTimer = 0;
        motionTime = 0;
        player.x = canvas.width * 0.5;
        running = true;
        updateHudLanguage();

        spawnEnemy();
        try { music.currentTime = 0; music.play(); } catch (_) {}
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen?.().catch(() => {});
        }

        lastTs = performance.now();
        cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(tick);
      }

      function endGame() {
        running = false;
        cancelAnimationFrame(rafId);
        music.pause();
        gameOverScore.textContent = `Score final: ${score}`;
        gameOverScreen.style.display = 'flex';
      }

      function applyInputMode(mode) {
        inputMode = mode === 'eyegaze' ? 'eyegaze' : 'switch';
        document.body.setAttribute('data-input-mode', inputMode);

        const buttons = Array.from(document.querySelectorAll('.input-mode-btn'));
        buttons.forEach((button) => {
          const selected = button.dataset.inputMode === inputMode;
          button.classList.toggle('selected', selected);
          button.setAttribute('aria-pressed', selected ? 'true' : 'false');
        });
      }

      function applyDifficulty(mode) {
        difficulty = ['normal', 'hard', 'competitive'].includes(mode) ? mode : 'normal';
        const modeButtons = Array.from(document.querySelectorAll('#stop-action-mode-segmented-control .stop-action-mode-btn'));
        modeButtons.forEach((button) => {
          const selected = button.dataset.mode === difficulty;
          button.classList.toggle('selected', selected);
          button.setAttribute('aria-pressed', selected ? 'true' : 'false');
        });

        const desc = document.getElementById('stop-action-mode-description');
        if (!desc) return;
        if (difficulty === 'hard') {
          desc.dataset.fr = 'Les fruits descendent plus vite.';
          desc.dataset.en = 'Fruits move down faster.';
          desc.dataset.ja = 'フルーツの落下速度が上がります。';
        } else if (difficulty === 'competitive') {
          desc.dataset.fr = 'Très rapide et moins de vies.';
          desc.dataset.en = 'Very fast with fewer lives.';
          desc.dataset.ja = '非常に速く、ライフが少なくなります。';
        } else {
          desc.dataset.fr = 'Cadence équilibrée pour commencer.';
          desc.dataset.en = 'Balanced pace to get started.';
          desc.dataset.ja = '始めやすいバランス設定です。';
        }

        const lang = typeof getStoredLanguage === 'function' ? getStoredLanguage() : (document.documentElement.lang || 'fr');
        desc.textContent = lang === 'en' ? desc.dataset.en : lang === 'ja' ? desc.dataset.ja : desc.dataset.fr;
      }

      document.addEventListener('keydown', (event) => {
        if (event.key === ' ' || event.code === 'Space') {
          event.preventDefault();
          if (running) shoot();
        }
      });

      startButton.addEventListener('click', startGame);
      restartButton.addEventListener('click', startGame);

      document.getElementById('language-toggle')?.addEventListener('pointerup', () => {
        toggleLanguage();
        updateHudLanguage();
        applyDifficulty(difficulty);
      });

      Array.from(document.querySelectorAll('.input-mode-btn')).forEach((button) => {
        button.addEventListener('click', () => applyInputMode(button.dataset.inputMode));
      });

      Array.from(document.querySelectorAll('#stop-action-mode-segmented-control .stop-action-mode-btn')).forEach((button) => {
        button.addEventListener('click', () => applyDifficulty(button.dataset.mode));
      });

      window.addEventListener('resize', () => {
        resizeCanvas();
        if (!running) {
          drawStars();
          drawPlayer();
        }
      });

      resizeCanvas();
      loadSprites();
      makeStars();
      applyInputMode('switch');
      applyDifficulty('normal');
      updateHudLanguage();
      drawStars();
      drawPlayer();
    })();
  </script>
</body>
</html>
