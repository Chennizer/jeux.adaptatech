<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recettes adaptées</title>
  <style>
    :root {
      --accent: #009688;
      --line: #e6eaef;
      --bg-main: #f3f4f6;
      --text-muted: #667085;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      color: #111;
      background: var(--bg-main);
    }

    .app-container {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    #sidebar {
      width: 32vw;
      min-width: 290px;
      max-width: 560px;
      background: #fff;
      border-right: 4px solid var(--accent);
      padding: 1.2rem;
      overflow-y: auto;
    }

    #sidebar h1 {
      margin: 0;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--accent);
      color: var(--accent);
      text-align: center;
      font-size: 1.4rem;
    }

    .subtitle {
      margin: 0.55rem 0 0.2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.92rem;
    }

    .group {
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
      border-radius: 8px;
      padding: 0.95rem 1rem;
      margin-top: 0.9rem;
      background: #fff;
    }

    .group h2 {
      margin: 0 0 0.65rem;
      font-size: 1rem;
      color: #344054;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin: 0.5rem 0;
    }

    .field label {
      font-size: 0.88rem;
      color: #475467;
      font-weight: 600;
    }

    .field input,
    .field select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.62rem 0.74rem;
      font-size: 0.95rem;
      width: 100%;
      background: #fff;
    }

    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 150, 136, 0.15);
    }

    .row {
      display: flex;
      gap: 0.55rem;
      align-items: end;
    }

    .row > .field { flex: 1; }

    .picto-pill {
      display: flex;
      gap: 0.65rem;
      align-items: center;
      border: 1px solid #bfe7e1;
      background: #eefaf8;
      border-radius: 8px;
      padding: 0.45rem 0.6rem;
      margin-bottom: 0.5rem;
      min-height: 58px;
    }

    .picto-pill img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #d4e4df;
      padding: 3px;
    }

    .picto-pill .picto-label {
      font-size: 0.88rem;
      color: #344054;
    }

    .btn {
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: 7px;
      padding: 0.6rem 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .btn.alt {
      background: #fff;
      color: var(--accent);
      border: 2px solid var(--accent);
    }

    .btn.small {
      padding: 0.35rem 0.55rem;
      font-size: 0.78rem;
    }

    .btn:disabled { opacity: 0.55; cursor: default; }

    .inline-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      background: #eefaf8;
      border: 1px solid #bfe7e1;
      border-radius: 8px;
      padding: 0.55rem 0.65rem;
      margin-top: 0.5rem;
    }

    .inline-toggle input { accent-color: var(--accent); }

    .steps-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      max-height: 220px;
      overflow-y: auto;
    }

    .steps-list li {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.48rem 0.55rem;
      display: flex;
      gap: 0.45rem;
      align-items: center;
      justify-content: space-between;
      font-size: 0.86rem;
      background: #fafafa;
    }

    .steps-list .mini {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      min-width: 0;
      flex: 1;
    }

    .steps-list .mini img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .steps-list .mini span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      min-width: 0;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      background: #fff;
      border-radius: 10px;
      border: 1px solid #dbe2ea;
      box-shadow: 0 8px 22px rgba(2,8,20,0.09);
      padding: 0.8rem 1rem;
      margin-bottom: 0.8rem;
    }

    .preview-header h2 {
      margin: 0;
      font-size: 1.2rem;
      color: #0f172a;
    }

    #recipeCards {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      padding-right: 0.2rem;
    }

    .recipe-card {
      background: #fff;
      border: 1px solid #dde4ed;
      border-radius: 12px;
      box-shadow: 0 7px 20px rgba(2,8,20,0.08);
      padding: 0.95rem;
      display: grid;
      grid-template-columns: auto 108px 1fr;
      gap: 0.9rem;
      align-items: center;
    }


    .recipe-card {
      cursor: grab;
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    }

    .recipe-card:active {
      cursor: grabbing;
    }

    .recipe-card.dragging {
      opacity: 0.55;
      transform: scale(0.99);
    }

    .recipe-card.drop-target {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,150,136,0.18), 0 7px 20px rgba(2,8,20,0.08);
    }

    .recipe-card .step-badge {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 0.88rem;
      font-weight: 700;
      color: #0f766e;
      background: #e8f8f5;
      border: 1px solid #bfe7e1;
    }

    .recipe-card .picto {
      width: 108px;
      height: 108px;
      border-radius: 10px;
      background: #f9fafb;
      border: 1px solid #d7dee7;
      padding: 6px;
      object-fit: contain;
    }

    .recipe-card .main {
      display: grid;
      gap: 0.42rem;
    }

    .recipe-card .name {
      font-size: 1.28rem;
      font-weight: 700;
      margin: 0;
      color: #0f172a;
    }

    .recipe-card .instruction {
      margin: 0;
      color: #334155;
      font-size: 1.04rem;
      line-height: 1.35;
    }

    .recipe-card .instruction strong {
      color: #0f766e;
    }

    #emptyState {
      text-align: center;
      color: #667085;
      margin-top: 2rem;
    }

    body.simplified .recipe-card {
      grid-template-columns: auto 170px 1fr;
      padding: 1.2rem;
    }

    body.simplified .recipe-card .step-badge {
      width: 58px;
      height: 58px;
      font-size: 1.1rem;
    }

    body.simplified .recipe-card .picto {
      width: 170px;
      height: 170px;
    }

    body.simplified .recipe-card .name {
      font-size: 2rem;
    }

    body.simplified .recipe-card .instruction {
      font-size: 1.38rem;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: min(940px, 94vw);
      max-height: 88vh;
      border-radius: 12px;
      background: #fff;
      border: 2px solid var(--accent);
      box-shadow: 0 16px 40px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal header {
      padding: 0.65rem 0.9rem;
      border-bottom: 1px solid #e4e7ec;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .modal header h3 { margin: 0; color: #0f766e; }

    .modal-toolbar {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      width: 100%;
      align-items: center;
    }

    .modal-toolbar input,
    .modal-toolbar select {
      border: 1px solid #cfd8e3;
      border-radius: 7px;
      padding: 0.45rem 0.55rem;
      font-size: 0.9rem;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0.6rem;
      overflow: auto;
      padding: 0.75rem;
    }

    .picto-item {
      border: 1px solid #d6dee9;
      border-radius: 10px;
      background: #fff;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      cursor: pointer;
      padding: 0.4rem;
      font-size: 0.76rem;
      text-align: center;
    }

    .picto-item:hover,
    .picto-item.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,150,136,0.18);
    }

    .picto-item img {
      width: 78px;
      height: 78px;
      object-fit: contain;
    }

    @media (max-width: 1000px) {
      .app-container { flex-direction: column; }
      #sidebar {
        width: 100%;
        max-width: none;
        min-width: 0;
        border-right: 0;
        border-bottom: 4px solid var(--accent);
        max-height: 56vh;
      }
      #content { min-height: 44vh; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <aside id="sidebar">
      <h1>Recettes adaptées</h1>
      <p class="subtitle">Créer une recette visuelle étape par étape.</p>

      <section class="group">
        <h2>Recette</h2>
        <div class="field">
          <label for="recipeTitle">Titre de la recette</label>
          <input id="recipeTitle" type="text" placeholder="Ex. Salade de fruits" />
        </div>
        <div class="inline-toggle">
          <label for="simplifiedMode">Lecture simplifiée (cartes géantes)</label>
          <input id="simplifiedMode" type="checkbox" />
        </div>
      </section>

      <section class="group">
        <h2>Ajouter une étape</h2>
        <div class="picto-pill">
          <img id="selectedPictoPreview" alt="Pictogramme sélectionné" />
          <div class="picto-label" id="selectedPictoLabel">Aucun ingrédient sélectionné</div>
        </div>
        <div class="row">
          <button id="openPictoPicker" class="btn alt" type="button">Choisir un pictogramme</button>
        </div>

        <div class="field">
          <label for="ingredientLabel">Nom de l’ingrédient</label>
          <input id="ingredientLabel" type="text" placeholder="Ex. pomme" />
        </div>

        <div class="row">
          <div class="field">
            <label for="quantityInput">Quantité</label>
            <input id="quantityInput" type="number" min="0" step="0.5" placeholder="1" />
          </div>
          <div class="field">
            <label for="unitSelect">Unité</label>
            <select id="unitSelect">
              <option value="">(aucune)</option>
              <option>g</option><option>kg</option><option>ml</option><option>cl</option><option>l</option>
              <option>cuillère(s)</option><option>tasse(s)</option><option>pièce(s)</option>
              <option>pincée(s)</option><option>tranche(s)</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="actionSelect">Action</label>
          <select id="actionSelect">
            <option value="ajouter">ajouter</option>
            <option value="mélanger">mélanger</option>
            <option value="cuire">cuire</option>
            <option value="servir">servir</option>
            <option value="couper">couper</option>
            <option value="verser">verser</option>
            <option value="chauffer">chauffer</option>
          </select>
        </div>

        <button id="addStepBtn" class="btn" type="button">Ajouter l’étape</button>
      </section>

      <section class="group">
        <h2>Étapes enregistrées</h2>
        <ul id="stepsList" class="steps-list"></ul>
      </section>
    </aside>

    <main id="content">
      <div class="preview-header">
        <h2 id="previewTitle">Recette visuelle</h2>
        <button id="clearRecipeBtn" class="btn alt" type="button">Vider la recette</button>
      </div>
      <div id="recipeCards"></div>
      <p id="emptyState">Ajoutez une première étape pour créer la recette visuelle.</p>
    </main>
  </div>

  <div id="pictoModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-label="Choisir un ingrédient">
    <div class="modal">
      <header>
        <h3>Choisir un ingrédient</h3>
        <button id="closePictoPicker" class="btn small alt" type="button">Fermer</button>
        <div class="modal-toolbar">
          <input id="modalSearch" type="text" placeholder="Rechercher: pomme, bol, cuisine..." />
          <select id="modalCategory"></select>
          <button id="foodOnlyBtn" class="btn small" type="button">Filtre cuisine/aliments</button>
        </div>
      </header>
      <div id="modalGrid" class="modal-grid"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'pedagogique-recettes-adaptees-v1';
    const FOOD_KEYWORDS = ['aliment', 'fruit', 'legume', 'cuisine', 'vaisselle', 'food', 'kitchen', 'drink', 'boisson'];

    const state = {
      title: '',
      simplified: false,
      steps: [],
      selectedIngredient: null,
      pictos: [],
      categories: [],
      foodOnly: true,
      search: '',
      category: 'all',
      dragIndex: null
    };

    const el = {
      recipeTitle: document.getElementById('recipeTitle'),
      simplifiedMode: document.getElementById('simplifiedMode'),
      previewTitle: document.getElementById('previewTitle'),
      recipeCards: document.getElementById('recipeCards'),
      emptyState: document.getElementById('emptyState'),
      clearRecipeBtn: document.getElementById('clearRecipeBtn'),
      ingredientLabel: document.getElementById('ingredientLabel'),
      quantityInput: document.getElementById('quantityInput'),
      unitSelect: document.getElementById('unitSelect'),
      actionSelect: document.getElementById('actionSelect'),
      selectedPictoPreview: document.getElementById('selectedPictoPreview'),
      selectedPictoLabel: document.getElementById('selectedPictoLabel'),
      addStepBtn: document.getElementById('addStepBtn'),
      stepsList: document.getElementById('stepsList'),
      pictoModal: document.getElementById('pictoModal'),
      openPictoPicker: document.getElementById('openPictoPicker'),
      closePictoPicker: document.getElementById('closePictoPicker'),
      modalGrid: document.getElementById('modalGrid'),
      modalSearch: document.getElementById('modalSearch'),
      modalCategory: document.getElementById('modalCategory'),
      foodOnlyBtn: document.getElementById('foodOnlyBtn')
    };

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        title: state.title,
        simplified: state.simplified,
        steps: state.steps
      }));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        state.title = typeof parsed.title === 'string' ? parsed.title : '';
        state.simplified = !!parsed.simplified;
        state.steps = Array.isArray(parsed.steps) ? parsed.steps : [];
      } catch (err) {
        console.warn('Impossible de charger la recette sauvegardée.', err);
      }
    }

    function getIngredientName(pic) {
      return pic?.label?.fr?.word || pic?.name?.fr || pic?.file?.replace(/\.[^.]+$/, '') || 'ingrédient';
    }

    function getFilteredPictos() {
      const search = state.search.trim().toLowerCase();
      return state.pictos.filter(item => {
        if (state.category !== 'all' && item.category !== state.category) return false;
        if (state.foodOnly) {
          const hay = `${item.category} ${item.categoryLabel}`.toLowerCase();
          if (!FOOD_KEYWORDS.some(k => hay.includes(k))) return false;
        }
        if (!search) return true;
        const haystack = `${item.label} ${item.file} ${item.categoryLabel}`.toLowerCase();
        return haystack.includes(search);
      });
    }

    function renderModalGrid() {
      const list = getFilteredPictos();
      el.modalGrid.innerHTML = '';
      if (!list.length) {
        const p = document.createElement('p');
        p.textContent = 'Aucun pictogramme trouvé avec ces filtres.';
        p.style.padding = '0.8rem';
        el.modalGrid.appendChild(p);
        return;
      }

      const frag = document.createDocumentFragment();
      for (const item of list) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'picto-item';
        button.innerHTML = `<img src="${item.src}" alt="${item.label}"><span>${item.label}</span>`;
        if (state.selectedIngredient?.src === item.src) button.classList.add('selected');
        button.addEventListener('click', () => {
          state.selectedIngredient = item;
          el.selectedPictoPreview.src = item.src;
          el.selectedPictoLabel.textContent = item.label;
          if (!el.ingredientLabel.value.trim()) el.ingredientLabel.value = item.label;
          closeModal();
        });
        frag.appendChild(button);
      }
      el.modalGrid.appendChild(frag);
    }

    function renderCategoryOptions() {
      el.modalCategory.innerHTML = '';
      const all = document.createElement('option');
      all.value = 'all';
      all.textContent = 'Toutes les catégories';
      el.modalCategory.appendChild(all);

      for (const c of state.categories) {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.label;
        el.modalCategory.appendChild(opt);
      }
      el.modalCategory.value = state.category;
    }

    function formatQuantity(quantity, unit) {
      const qty = String(quantity || '').trim();
      const u = String(unit || '').trim();
      if (qty && u) return `${qty} ${u}`;
      if (qty) return qty;
      if (u) return u;
      return '';
    }

    function plainInstruction(step) {
      const q = formatQuantity(step.quantity, step.unit);
      if (!q) return `${step.action} ${step.ingredient}`;
      return `${step.action} ${q} de ${step.ingredient}`;
    }

    function richInstruction(step) {
      const q = formatQuantity(step.quantity, step.unit);
      if (!q) return `${step.action} ${step.ingredient}`;
      return `${step.action} <strong>${q}</strong> de ${step.ingredient}`;
    }

    function reorderSteps(fromIndex, toIndex) {
      if (fromIndex === toIndex) return;
      if (fromIndex < 0 || toIndex < 0) return;
      if (fromIndex >= state.steps.length || toIndex >= state.steps.length) return;
      const [moved] = state.steps.splice(fromIndex, 1);
      state.steps.splice(toIndex, 0, moved);
      saveState();
      renderRecipe();
    }

    function renderRecipe() {
      el.previewTitle.textContent = state.title.trim() || 'Recette visuelle';
      document.body.classList.toggle('simplified', state.simplified);
      el.simplifiedMode.checked = state.simplified;
      el.recipeCards.innerHTML = '';

      if (!state.steps.length) {
        el.emptyState.style.display = 'block';
      } else {
        el.emptyState.style.display = 'none';
      }

      const cardFrag = document.createDocumentFragment();
      const listFrag = document.createDocumentFragment();

      state.steps.forEach((step, idx) => {
        const card = document.createElement('article');
        card.className = 'recipe-card';
        card.draggable = true;
        card.dataset.index = String(idx);
        card.innerHTML = `
          <span class="step-badge">${idx + 1}</span>
          <img class="picto" src="${step.pictoSrc}" alt="${step.ingredient}">
          <div class="main">
            <p class="name">${step.ingredient}</p>
            <p class="instruction">${richInstruction(step)}</p>
          </div>
        `;

        card.addEventListener('dragstart', (event) => {
          state.dragIndex = idx;
          card.classList.add('dragging');
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', String(idx));
        });

        card.addEventListener('dragover', (event) => {
          event.preventDefault();
          card.classList.add('drop-target');
          event.dataTransfer.dropEffect = 'move';
        });

        card.addEventListener('dragleave', () => {
          card.classList.remove('drop-target');
        });

        card.addEventListener('drop', (event) => {
          event.preventDefault();
          card.classList.remove('drop-target');
          const from = state.dragIndex ?? Number(event.dataTransfer.getData('text/plain'));
          reorderSteps(Number(from), idx);
        });

        card.addEventListener('dragend', () => {
          state.dragIndex = null;
          card.classList.remove('dragging');
          document.querySelectorAll('.recipe-card.drop-target').forEach((el) => el.classList.remove('drop-target'));
        });

        cardFrag.appendChild(card);

        const row = document.createElement('li');
        row.innerHTML = `
          <div class="mini">
            <img src="${step.pictoSrc}" alt="${step.ingredient}">
            <span>${idx + 1}. ${plainInstruction(step)}</span>
          </div>
        `;
        const deleteBtn = document.createElement('button');
        deleteBtn.type = 'button';
        deleteBtn.className = 'btn small alt';
        deleteBtn.textContent = 'Supprimer';
        deleteBtn.addEventListener('click', () => {
          state.steps.splice(idx, 1);
          saveState();
          renderRecipe();
        });
        row.appendChild(deleteBtn);
        listFrag.appendChild(row);
      });

      el.recipeCards.appendChild(cardFrag);
      el.stepsList.innerHTML = '';
      el.stepsList.appendChild(listFrag);
    }

    function addStep() {
      if (!state.selectedIngredient) {
        alert('Choisissez d’abord un pictogramme d’ingrédient.');
        return;
      }
      const ingredient = el.ingredientLabel.value.trim() || state.selectedIngredient.label;
      const quantity = el.quantityInput.value.trim();
      const unit = el.unitSelect.value;
      const action = el.actionSelect.value;

      state.steps.push({
        ingredient,
        quantity,
        unit,
        action,
        pictoSrc: state.selectedIngredient.src
      });

      el.ingredientLabel.value = '';
      el.quantityInput.value = '';
      el.unitSelect.value = '';
      el.actionSelect.value = 'ajouter';

      saveState();
      renderRecipe();
    }

    function closeModal() { el.pictoModal.classList.remove('show'); }

    async function loadPictos() {
      const res = await fetch('../../images/pictos/index.json');
      const json = await res.json();
      const rawBase = typeof json.base === 'string' ? json.base : '../../images/pictos/';
      const base = new URL(rawBase, res.url).pathname;
      const categories = json.categories || {};
      state.categories = Object.entries(categories).map(([id, c]) => ({
        id,
        label: c.label?.fr || c.label?.en || id
      }));

      const pictos = [];
      for (const [id, cat] of Object.entries(categories)) {
        const catLabel = cat.label?.fr || cat.label?.en || id;
        for (const item of (cat.items || [])) {
          pictos.push({
            src: `${base}${item.file}`,
            file: item.file,
            category: id,
            categoryLabel: catLabel,
            label: getIngredientName(item)
          });
        }
      }
      state.pictos = pictos;
      renderCategoryOptions();
      renderModalGrid();
    }

    function bindEvents() {
      el.recipeTitle.addEventListener('input', (e) => {
        state.title = e.target.value;
        saveState();
        renderRecipe();
      });

      el.simplifiedMode.addEventListener('change', (e) => {
        state.simplified = e.target.checked;
        saveState();
        renderRecipe();
      });

      el.addStepBtn.addEventListener('click', addStep);
      el.clearRecipeBtn.addEventListener('click', () => {
        if (!confirm('Effacer toute la recette ?')) return;
        state.steps = [];
        saveState();
        renderRecipe();
      });

      el.openPictoPicker.addEventListener('click', () => {
        el.pictoModal.classList.add('show');
        renderModalGrid();
      });
      el.closePictoPicker.addEventListener('click', closeModal);
      el.pictoModal.addEventListener('click', (e) => {
        if (e.target === el.pictoModal) closeModal();
      });

      el.modalSearch.addEventListener('input', (e) => {
        state.search = e.target.value;
        renderModalGrid();
      });

      el.modalCategory.addEventListener('change', (e) => {
        state.category = e.target.value;
        renderModalGrid();
      });

      el.foodOnlyBtn.addEventListener('click', () => {
        state.foodOnly = !state.foodOnly;
        el.foodOnlyBtn.classList.toggle('alt', !state.foodOnly);
        el.foodOnlyBtn.textContent = state.foodOnly ? 'Filtre cuisine/aliments' : 'Tous les pictogrammes';
        renderModalGrid();
      });
    }

    async function init() {
      loadState();
      el.recipeTitle.value = state.title;
      bindEvents();
      await loadPictos();

      if (!state.selectedIngredient && state.pictos.length) {
        state.selectedIngredient = state.pictos.find(p => ['aliments', 'fruits', 'legumes', 'vaisselleCuisine'].includes(p.category)) || state.pictos[0];
      }

      if (state.selectedIngredient) {
        el.selectedPictoPreview.src = state.selectedIngredient.src;
        el.selectedPictoLabel.textContent = state.selectedIngredient.label;
      }

      renderRecipe();
    }

    init().catch(err => {
      console.error(err);
      alert('Erreur lors du chargement des pictogrammes.');
    });
  </script>
</body>
</html>
