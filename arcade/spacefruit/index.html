<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title class="translate" data-fr="Arcade spatial : Fruits envahisseurs" data-en="Space Arcade: Fruit Invaders" data-ja="スペースアーケード：フルーツインベーダー">Space Arcade: Fruit Invaders</title>
    <link rel="stylesheet" href="../../css/control-panel.css">
    <link rel="stylesheet" href="../../css/games.css">
    <link rel="stylesheet" href="../../css/gaming.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/video-stop-action.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B45TJG4GBJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);} 
      gtag('js', new Date());
      gtag('config', 'G-B45TJG4GBJ');
    </script>
    <style>
      body.space-fruit-arcade {
        overflow: hidden;
      }

      #game-screen {
        position: fixed;
        inset: 0;
        display: none;
        background: radial-gradient(circle at 50% 10%, #0b1638 0%, #050918 45%, #01030a 100%);
      }

      #game-screen.visible {
        display: block;
      }

      #spacefruit-canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .spacefruit-hud {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 6;
        color: #ffffff;
        font-family: 'Press Start 2P', system-ui, sans-serif;
        font-size: 12px;
        line-height: 1.8;
        text-shadow: 0 0 10px rgba(57, 220, 255, 0.75);
        pointer-events: none;
      }

      .spacefruit-message {
        position: fixed;
        left: 50%;
        top: 48%;
        transform: translate(-50%, -50%);
        z-index: 7;
        color: #f6ff71;
        text-align: center;
        font-family: 'Press Start 2P', system-ui, sans-serif;
        font-size: clamp(13px, 1.9vw, 24px);
        text-shadow: 0 0 16px rgba(246, 255, 113, 0.8);
        max-width: 90vw;
        display: none;
        pointer-events: none;
      }

      .spacefruit-message.visible {
        display: block;
      }
    </style>
</head>
<body
    class="video-stop-action-page space-fruit-arcade"
    style="--menu-backdrop-image: url('../../images/arcade/mariomoviecover.png'); --menu-side-image: url('../../images/arcade/mariomoviecover.png');"
>
    <button id="language-toggle" title="Changer de langue / Change language">FR / EN</button>

    <div id="control-panel">
        <div id="control-panel-options" class="control-panel-options">
            <div class="game-menu-layout stop-action-menu-layout">
                <div class="game-menu-main">
                    <div id="options-title-bar">
                        <h1 id="options-arcade-title">Arcade</h1>
                        <h2 id="options-main-title" class="translate" data-fr="Fruits envahisseurs" data-en="Fruit Invaders" data-ja="フルーツインベーダー">Fruit Invaders</h2>
                    </div>

                    <p id="control-panel-instructions" class="control-panel-instructions translate"
                       data-fr="Un fruit alien arrive toutes les 10 secondes. Tire avec ESPACE pour le détruire."
                       data-en="An alien fruit appears every 10 seconds. Shoot it down with SPACE."
                       data-ja="10秒ごとにエイリアンフルーツが出現。スペースキーで撃ち落とそう。">
                    </p>

                    <div id="mode-divider"></div>

                    <div id="options-inline-container" class="stop-action-options-inline-container">
                        <div class="option-item stop-action-mode-card">
                            <p class="stop-action-mode-description translate" data-fr="Type de contrôle" data-en="Input type" data-ja="入力タイプ">Type de contrôle</p>
                            <div id="input-mode-segmented-control" role="tablist" aria-label="Input mode selector">
                                <button type="button" class="stop-action-mode-btn input-mode-btn translate selected" data-input-mode="switch" data-fr="Switch" data-en="Switch" data-ja="スイッチ" aria-pressed="true">Switch</button>
                                <button type="button" class="stop-action-mode-btn input-mode-btn translate" data-input-mode="eyegaze" data-fr="Eyegaze" data-en="Eyegaze" data-ja="視線" aria-pressed="false">Eyegaze</button>
                            </div>
                        </div>
                        <div class="option-item stop-action-mode-card">
                            <div id="stop-action-mode-segmented-control" role="tablist" aria-label="Mode selector">
                                <button type="button" class="stop-action-mode-btn selected translate" data-mode="normal" data-fr="Normal" data-en="Normal" data-ja="ノーマル" aria-pressed="true">Normal</button>
                                <button type="button" class="stop-action-mode-btn translate" data-mode="hard" data-fr="Difficile" data-en="Hard" data-ja="ハード" aria-pressed="false">Difficile</button>
                                <button type="button" class="stop-action-mode-btn translate" data-mode="competitive" data-fr="Maître" data-en="Master" data-ja="マスター" aria-pressed="false">Maître</button>
                            </div>
                            <p id="stop-action-mode-description" class="stop-action-mode-description"></p>
                        </div>
                    </div>

                    <div id="mode-divider"></div>

                    <div id="button-container" class="button-container stop-action-button-container">
                        <button id="control-panel-start-button" class="button translate" data-fr="Commencer" data-en="Start" data-ja="開始">Commencer</button>
                    </div>
                </div>

                <aside class="game-menu-art" aria-hidden="true">
                    <div class="game-menu-art-card">
                        <div class="game-menu-art-image"></div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <div id="game-screen" aria-live="polite">
      <canvas id="spacefruit-canvas"></canvas>
    </div>

    <div id="spacefruit-hud" class="spacefruit-hud hidden"></div>
    <div id="spacefruit-message" class="spacefruit-message"></div>

    <script src="../../js/translationmain.js"></script>
    <script>
      (() => {
        const canvas = document.getElementById('spacefruit-canvas');
        const ctx = canvas.getContext('2d');
        const gameScreen = document.getElementById('game-screen');
        const menu = document.getElementById('control-panel');
        const startButton = document.getElementById('control-panel-start-button');
        const hud = document.getElementById('spacefruit-hud');
        const message = document.getElementById('spacefruit-message');

        const fruitPaths = [
          '../../images/pictos/apple.png',
          '../../images/pictos/banana.png',
          '../../images/pictos/strawberry.png',
          '../../images/pictos/watermelon.png',
          '../../images/pictos/pear.png',
          '../../images/pictos/blueberry.png',
          '../../images/pictos/pineapple.png'
        ];

        const ftlMusicPaths = [
          '../../songs/space/spacequest1.mp3',
          '../../songs/space/spacequest2.mp3',
          '../../songs/space/spacequest3.mp3'
        ];

        const modeText = {
          normal: {
            fr: 'Normal · vitesse standard',
            en: 'Normal · standard speed',
            ja: 'ノーマル・標準スピード'
          },
          hard: {
            fr: 'Difficile · cibles plus rapides',
            en: 'Hard · faster targets',
            ja: 'ハード・ターゲットが速い'
          },
          competitive: {
            fr: 'Maître · vitesse maximale',
            en: 'Master · maximum speed',
            ja: 'マスター・最高速度'
          }
        };

        const enemies = [];
        const bullets = [];
        const starsNear = [];
        const starsFar = [];

        const fruitImages = fruitPaths.map((src) => {
          const img = new Image();
          img.src = src;
          return img;
        });

        let width = window.innerWidth;
        let height = window.innerHeight;
        let isRunning = false;
        let score = 0;
        let shots = 0;
        let enemySpawned = 0;
        let missed = 0;
        let lastSpawnTime = 0;
        let lastFrameTime = 0;
        let selectedMode = 'normal';
        let music = null;
        let explosionTimer = 0;

        const player = {
          x: width / 2,
          y: height - 72,
          radius: 22
        };

        function resizeCanvas() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
          player.x = width / 2;
          player.y = height - 72;
        }

        function buildStars() {
          starsNear.length = 0;
          starsFar.length = 0;
          const nearCount = Math.max(160, Math.floor((width * height) / 10000));
          const farCount = Math.max(120, Math.floor((width * height) / 13000));

          for (let i = 0; i < nearCount; i += 1) {
            starsNear.push({
              x: Math.random() * width,
              y: Math.random() * height,
              size: Math.random() * 2 + 0.6,
              speed: Math.random() * 40 + 90
            });
          }

          for (let i = 0; i < farCount; i += 1) {
            starsFar.push({
              x: Math.random() * width,
              y: Math.random() * height,
              size: Math.random() * 1.3 + 0.5,
              speed: Math.random() * 30 + 40
            });
          }
        }

        function getCurrentLanguage() {
          if (typeof getStoredLanguage === 'function') return getStoredLanguage();
          return document.documentElement.lang || 'fr';
        }

        function t(dict) {
          const lang = getCurrentLanguage();
          if (lang === 'en') return dict.en;
          if (lang === 'ja') return dict.ja;
          return dict.fr;
        }

        function updateModeDescription() {
          const el = document.getElementById('stop-action-mode-description');
          if (!el) return;
          el.textContent = t(modeText[selectedMode]);
        }

        function showMessage(text, duration = 1200) {
          message.textContent = text;
          message.classList.add('visible');
          setTimeout(() => {
            message.classList.remove('visible');
          }, duration);
        }

        function pickSpeed() {
          if (selectedMode === 'hard') return 70;
          if (selectedMode === 'competitive') return 95;
          return 50;
        }

        function spawnEnemy(nowMs) {
          const image = fruitImages[Math.floor(Math.random() * fruitImages.length)];
          const size = 58;
          const margin = 60;
          enemies.push({
            x: margin + Math.random() * (width - margin * 2),
            y: -size,
            size,
            speed: pickSpeed(),
            image,
            spawnedAt: nowMs
          });
          enemySpawned += 1;
          lastSpawnTime = nowMs;
          showMessage(t({
            fr: 'Nouvelle cible !',
            en: 'New target!',
            ja: '新しいターゲット！'
          }), 900);
        }

        function shoot() {
          if (!isRunning) return;
          shots += 1;
          bullets.push({
            x: player.x,
            y: player.y - 26,
            radius: 5,
            speed: 520
          });
        }

        function updateStars(delta) {
          const updateLayer = (layer) => {
            layer.forEach((star) => {
              star.y += star.speed * delta;
              if (star.y > height + 2) {
                star.y = -2;
                star.x = Math.random() * width;
              }
            });
          };
          updateLayer(starsFar);
          updateLayer(starsNear);
        }

        function drawStars() {
          ctx.fillStyle = '#030816';
          ctx.fillRect(0, 0, width, height);

          ctx.save();
          starsFar.forEach((star) => {
            ctx.globalAlpha = 0.55;
            ctx.fillStyle = '#90caf9';
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
          });

          starsNear.forEach((star) => {
            ctx.globalAlpha = 0.95;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'rgba(137, 248, 255, 0.35)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(star.x, star.y - 6);
            ctx.lineTo(star.x, star.y + 14);
            ctx.stroke();
          });
          ctx.restore();
        }

        function drawPlayer() {
          ctx.save();
          ctx.translate(player.x, player.y);
          ctx.fillStyle = '#46f0ff';
          ctx.beginPath();
          ctx.moveTo(0, -30);
          ctx.lineTo(-20, 24);
          ctx.lineTo(20, 24);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = '#cfffff';
          ctx.fillRect(-4, -14, 8, 18);
          ctx.restore();
        }

        function drawEnemies(delta) {
          for (let i = enemies.length - 1; i >= 0; i -= 1) {
            const enemy = enemies[i];
            enemy.y += enemy.speed * delta;

            if (enemy.y - enemy.size > height) {
              enemies.splice(i, 1);
              missed += 1;
              continue;
            }

            if (enemy.image.complete) {
              ctx.drawImage(enemy.image, enemy.x - enemy.size / 2, enemy.y - enemy.size / 2, enemy.size, enemy.size);
            } else {
              ctx.fillStyle = '#ff9de2';
              ctx.beginPath();
              ctx.arc(enemy.x, enemy.y, enemy.size / 2, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }

        function drawBullets(delta) {
          for (let i = bullets.length - 1; i >= 0; i -= 1) {
            const bullet = bullets[i];
            bullet.y -= bullet.speed * delta;
            if (bullet.y + bullet.radius < 0) {
              bullets.splice(i, 1);
              continue;
            }

            ctx.fillStyle = '#ffe472';
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        function detectHits() {
          for (let e = enemies.length - 1; e >= 0; e -= 1) {
            const enemy = enemies[e];
            for (let b = bullets.length - 1; b >= 0; b -= 1) {
              const bullet = bullets[b];
              const dx = bullet.x - enemy.x;
              const dy = bullet.y - enemy.y;
              const hitRadius = (enemy.size / 2) + bullet.radius;
              if ((dx * dx + dy * dy) <= hitRadius * hitRadius) {
                enemies.splice(e, 1);
                bullets.splice(b, 1);
                score += 1;
                explosionTimer = 0.15;
                showMessage(t({ fr: 'Touché !', en: 'Hit!', ja: 'ヒット！' }), 500);
                break;
              }
            }
          }
        }

        function drawExplosionOverlay(delta) {
          if (explosionTimer <= 0) return;
          explosionTimer -= delta;
          const alpha = Math.max(0, explosionTimer / 0.15) * 0.35;
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
          ctx.fillRect(0, 0, width, height);
        }

        function updateHud() {
          const accuracy = shots > 0 ? Math.round((score / shots) * 100) : 0;
          hud.classList.remove('hidden');
          hud.innerHTML = [
            `SCORE: ${score}`,
            `${t({ fr: 'TIRS', en: 'SHOTS', ja: 'ショット' })}: ${shots}`,
            `${t({ fr: 'PRECISION', en: 'ACCURACY', ja: '命中率' })}: ${accuracy}%`,
            `${t({ fr: 'RATÉS', en: 'MISSED', ja: '見逃し' })}: ${missed}`
          ].join('<br>');
        }

        function loop(timestamp) {
          if (!isRunning) return;

          const now = timestamp || performance.now();
          if (!lastFrameTime) lastFrameTime = now;
          const delta = Math.min((now - lastFrameTime) / 1000, 0.05);
          lastFrameTime = now;

          if (!lastSpawnTime || now - lastSpawnTime >= 10000) {
            spawnEnemy(now);
          }

          updateStars(delta);
          drawStars();
          drawEnemies(delta);
          drawBullets(delta);
          detectHits();
          drawPlayer();
          drawExplosionOverlay(delta);
          updateHud();

          requestAnimationFrame(loop);
        }

        function resetGame() {
          enemies.length = 0;
          bullets.length = 0;
          score = 0;
          shots = 0;
          enemySpawned = 0;
          missed = 0;
          lastSpawnTime = 0;
          lastFrameTime = 0;
          explosionTimer = 0;
        }

        function startMusic() {
          if (music) {
            music.pause();
            music = null;
          }
          const pick = ftlMusicPaths[Math.floor(Math.random() * ftlMusicPaths.length)];
          music = new Audio(pick);
          music.loop = true;
          music.volume = 0.7;
          music.play().catch(() => {});
        }

        function startGame() {
          menu.classList.add('hidden');
          gameScreen.classList.add('visible');
          document.body.classList.add('game-running');
          resetGame();
          startMusic();
          isRunning = true;
          requestAnimationFrame(loop);
        }

        function bindMenuOptions() {
          const modeButtons = Array.from(document.querySelectorAll('.stop-action-mode-btn[data-mode]'));
          modeButtons.forEach((button) => {
            button.addEventListener('click', () => {
              selectedMode = button.dataset.mode || 'normal';
              modeButtons.forEach((btn) => {
                const selected = btn === button;
                btn.classList.toggle('selected', selected);
                btn.setAttribute('aria-pressed', selected ? 'true' : 'false');
              });
              updateModeDescription();
            });
          });

          const inputButtons = Array.from(document.querySelectorAll('.input-mode-btn'));
          inputButtons.forEach((button) => {
            button.addEventListener('click', () => {
              inputButtons.forEach((btn) => {
                const selected = btn === button;
                btn.classList.toggle('selected', selected);
                btn.setAttribute('aria-pressed', selected ? 'true' : 'false');
              });
            });
          });
        }

        window.addEventListener('resize', () => {
          resizeCanvas();
          buildStars();
        });

        document.addEventListener('keydown', (event) => {
          if (event.code === 'Space') {
            event.preventDefault();
            shoot();
          }
        });

        document.addEventListener('visibilitychange', () => {
          if (document.hidden && music) music.pause();
          if (!document.hidden && music && isRunning) music.play().catch(() => {});
        });

        document.getElementById('language-toggle')?.addEventListener('pointerup', () => {
          if (typeof toggleLanguage === 'function') {
            toggleLanguage();
            setTimeout(updateModeDescription, 0);
          }
        });

        startButton.addEventListener('click', startGame);

        resizeCanvas();
        buildStars();
        bindMenuOptions();
        updateModeDescription();
      })();
    </script>
</body>
</html>
