<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-fr="Portail arcade" data-en="Arcade portal" data-ja="アーケードポータル">Portail arcade</title>
  <link rel="stylesheet" href="../css/menu.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-B45TJG4GBJ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);} 
  gtag('js', new Date());
  gtag('config', 'G-B45TJG4GBJ');
</script>
<body class="menu">
  <nav class="top-menu">
    <div class="top-menu-title" data-fr="Adaptatech" data-en="Adaptatech" data-ja="Adaptatech">Portail de jeux adaptés</div>
    <ul>
      <li><a href="../index.html" data-fr="Accueil" data-en="Home" data-ja="ホーム">Accueil</a></li>
      <li><a href="../contact/index.html" data-fr="Contact" data-en="Contact" data-ja="お問い合わせ">Contact</a></li>
      <li><a href="#" id="language-toggle" onclick="toggleLanguage(); return false;"></a></li>
    </ul>
  </nav>

  <div class="hero-minimalist">
    <h1 data-fr="Jeux arcade" data-en="Arcade games" data-ja="アーケードゲーム">Jeux arcade</h1>
  </div>

  <div class="tile-container">
    <div class="tile">
      <a href="mariomovie/index.html">
        <img src="../images/arcade/mariomoviecover.png" alt="Mario arcade">
        <div class="tile-title">
          <h3
            data-fr="Mario Arcade — Défi Peach"
            data-en="Mario Arcade — Peach Challenge"
            data-ja="マリオアーケード — ピーチチャレンジ">
            Mario Arcade — Défi Peach
          </h3>
        </div>
      </a>
    </div>
    <div class="tile">
      <a href="fruit-invaders/index.html">
        <img src="../images/pictos/watermelon.png" alt="Fruit invaders placeholder">
        <div class="tile-title">
          <h3
            data-fr="Fruit Invaders — Mode Switch"
            data-en="Fruit Invaders — Switch mode"
            data-ja="フルーツインベーダー — スイッチモード">
            Fruit Invaders — Mode Switch
          </h3>
        </div>
      </a>
    </div>
  </div>

  <button id="langToggle" class="floating-button lang-toggle" title="Changer la langue / Switch language">EN</button>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      fetch('../footer.html')
        .then(response => response.text())
        .then(data => {
          document.body.insertAdjacentHTML('beforeend', data);
        });
    });
  </script>
  <script src="../js/translationmain.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const langBtn = document.getElementById('langToggle');
      if (!langBtn) return;
      langBtn.addEventListener('click', toggleLanguage);
    });
  </script>
  <script src="../js/home-button.js"></script>
</body>
</html>
