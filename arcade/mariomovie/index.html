<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title class="translate" data-fr="Mario : Défi Peach" data-en="Mario: Peach Challenge" data-ja="マリオ：ピーチチャレンジ">Mario: Peach Challenge</title>
    <link rel="stylesheet" href="../../css/control-panel.css">
    <link rel="stylesheet" href="../../css/games.css">
    <link rel="stylesheet" href="../../css/gaming.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/video-stop-action.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B45TJG4GBJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B45TJG4GBJ');
    </script>
</head>
<body
    class="video-stop-action-page"
    style="--menu-backdrop-image: url('../../images/arcade/mariomoviecover.png'); --menu-side-image: url('../../images/arcade/mariomoviecover.png');"
    data-video-source="https://bucket.adaptatech.org/mariomovie.mp4"
    data-pre-pause-duration="0.2"
    data-prompt-sound="../../sounds/arcade/arcadeprompt.mp3"
    data-success-sound="../../sounds/success3.mp3"
    data-hard-time-limit="10"
    data-hard-timeout-sound="../../sounds/arcade/arcadefail.mp3"
    data-hard-restart-sound="../../sounds/pagestart.mp3"
    data-hard-shrink-duration="5"
    data-menu-music="../../songs/marioarcademusic.mp3"
    data-wait-music="../../sounds/arcade/promptloop.mp3"
    data-wait-music-delay-ms="500"
    data-score-game="mario-peach-challenge"
    data-score-api-base="https://score-api-2.gui98789.workers.dev"
    data-score-top-limit="5"
    data-action-events='[
      {"time":5.0,"action":"jump"},
      {"time":10.0,"action":"dodge"},
      {"time":15.0,"action":"crouch"},
      {"time":20.2,"action":"jump"},
      {"time":25.5,"action":"land"},
      {"time":30.4,"action":"kick"},
      {"time":36.3,"action":"jump"}
    ]'
>
    <button id="language-toggle" title="Changer de langue / Change language">FR / EN</button>

    <div id="control-panel">
        <div id="control-panel-options" class="control-panel-options">
            <div class="game-menu-layout stop-action-menu-layout">
                <div class="game-menu-main">
                    <div id="options-title-bar">
                        <h1 id="options-arcade-title">Arcade</h1>
                        <h2 id="options-main-title" class="translate" data-fr="Mario : Défi Peach" data-en="Mario: Peach Challenge" data-ja="マリオ：ピーチチャレンジ">Mario: Peach Challenge</h2>
                    </div>

                    <p id="control-panel-instructions" class="control-panel-instructions translate"
                       data-fr="Aide Peach à terminer son parcours d'obstacles !"
                       data-en="Help Peach finish her obstacle course!"
                       data-ja="ピーチが障害物コースをクリアできるよう手伝ってね！">
                    </p>

                    <div id="mode-divider"></div>

                    <div id="options-inline-container" class="stop-action-options-inline-container">
                        <div class="option-item stop-action-mode-card">
                            <p class="stop-action-mode-description translate" data-fr="Type de contrôle" data-en="Input type" data-ja="入力タイプ">Type de contrôle</p>
                            <div id="input-mode-segmented-control" role="tablist" aria-label="Input mode selector">
                                <button type="button" class="stop-action-mode-btn input-mode-btn translate selected" data-input-mode="switch" data-fr="Switch" data-en="Switch" data-ja="スイッチ" aria-pressed="true">Switch</button>
                                <button type="button" class="stop-action-mode-btn input-mode-btn translate" data-input-mode="eyegaze" data-fr="Eyegaze" data-en="Eyegaze" data-ja="視線" aria-pressed="false">Eyegaze</button>
                            </div>
                        </div>
                        <div class="option-item stop-action-mode-card">
                            <div id="stop-action-mode-segmented-control" role="tablist" aria-label="Mode selector">
                                <button type="button" class="stop-action-mode-btn selected translate" data-mode="normal" data-fr="Normal" data-en="Normal" data-ja="ノーマル" aria-pressed="true">Normal</button>
                                <button type="button" class="stop-action-mode-btn translate" data-mode="hard" data-fr="Difficile" data-en="Hard" data-ja="ハード" aria-pressed="false">Difficile</button>
                                <button type="button" class="stop-action-mode-btn translate" data-mode="competitive" data-fr="Maître" data-en="Master" data-ja="マスター" aria-pressed="false">Maître</button>
                            </div>
                            <p id="stop-action-mode-description" class="stop-action-mode-description"></p>
                        </div>
                    </div>

                    <div id="mode-divider"></div>

                    <div id="button-container" class="button-container stop-action-button-container">
                        <div id="control-panel-loading-bar-container" class="loading-bar-container" data-status="Loading game..."><div id="control-panel-loading-bar" class="loading-bar"></div></div>
                        <button id="control-panel-start-button" class="button translate" data-fr="Commencer" data-en="Start" data-ja="開始">Commencer</button>
                    </div>
                </div>

                <aside class="game-menu-art" aria-hidden="true">
                    <div class="game-menu-art-card">
                        <div class="game-menu-art-image"></div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <div id="video-container" class="video-container hidden" aria-live="off">
        <video id="video-player" class="video-player" preload="auto" playsinline>
            <source id="video-source" src="https://bucket.adaptatech.org/mariomovie.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div id="overlay-screen" class="overlay-screen hidden" aria-live="assertive">
        <div id="action-prompt-tile" class="action-prompt-tile" role="button" aria-label="Action prompt tile">
            <div id="action-prompt-dwell-fill" class="action-prompt-dwell-fill" aria-hidden="true"></div>
            <img id="action-prompt-image" class="action-prompt-image" src="" alt="">
            <p id="action-prompt-label" class="action-prompt-label"></p>
        </div>
    </div>

    <div id="results-screen" class="hidden">
        <div class="results-panel stop-action-results-panel">
            <h2 class="translate" data-fr="Partie terminée" data-en="Game complete" data-ja="ゲーム終了">Partie terminée</h2>
            <div class="stop-action-results-layout">
                <section class="stop-action-results-column stop-action-results-column-score" aria-label="Score summary">
                    <p id="results-score" class="stop-action-results-metric"></p>
                    <p id="results-average-delay" class="stop-action-results-metric"></p>
                    <p id="results-false-positives" class="stop-action-results-metric"></p>
                    <div id="score-register-panel" class="score-register-panel hidden" aria-live="polite">
                        <p id="score-register-question" class="stop-action-results-metric"></p>
                        <div class="score-register-form">
                            <label id="score-player-name-label" for="score-player-name" class="score-player-name-label"></label>
                            <input id="score-player-name" class="score-player-name-input" type="text" maxlength="20" autocomplete="name" />
                            <button id="score-submit" type="button" class="button"></button>
                        </div>
                        <p id="score-register-status" class="score-register-status" role="status"></p>
                    </div>
                </section>
                <section id="leaderboard-panel" class="stop-action-results-column leaderboard-panel hidden" aria-live="polite" aria-label="Leaderboard">
                    <h3 id="leaderboard-title" class="leaderboard-title"></h3>
                    <ol id="leaderboard-list" class="leaderboard-list"></ol>
                </section>
            </div>
            <button id="continue-button" class="button translate" data-fr="Recommencer" data-en="Restart" data-ja="もう一度">Recommencer</button>
        </div>
    </div>

    <div id="gazePointer" aria-hidden="true"></div>

    <audio id="intro-jingle" src="../../sounds/spacewalk.mp3" preload="auto"></audio>

    <script src="../../js/translationmain.js"></script>
    <script>
      (function() {
        const storedMode = (localStorage.getItem('arcadeMarioInputMode') || '').toLowerCase();
        let inputMode = storedMode === 'eyegaze' ? 'eyegaze' : 'switch';
        let isEyegaze = inputMode === 'eyegaze';

        localStorage.setItem('arcadeMarioInputMode', inputMode);

        document.body.setAttribute('data-input-mode', inputMode);
        if (isEyegaze) {
          document.body.classList.add('video-stop-action-eyegaze');
          document.body.setAttribute('data-eyegaze-dwell-ms', '1500');
          document.body.setAttribute('data-hard-timeout-sound', '../../sounds/error.mp3');
          document.body.setAttribute('data-score-game', 'mario-peach-challenge-eyegaze');
        } else {
          document.body.classList.remove('video-stop-action-eyegaze');
          document.body.removeAttribute('data-eyegaze-dwell-ms');
          document.body.setAttribute('data-hard-timeout-sound', '../../sounds/arcade/arcadefail.mp3');
          document.body.setAttribute('data-score-game', 'mario-peach-challenge');
        }

        document.addEventListener('DOMContentLoaded', () => {
          document.getElementById('language-toggle')?.addEventListener('pointerup', toggleLanguage);
          const instructions = document.getElementById('control-panel-instructions');

          const updateInstructionCopy = () => {
            if (!instructions) return;
            if (isEyegaze) {
              instructions.dataset.fr = "Aide Peach à terminer son parcours d'obstacles ! Regarde la tuile de consigne pendant 1,5 seconde pour continuer.";
              instructions.dataset.en = 'Help Peach finish her obstacle course! Look at the prompt tile for 1.5 seconds to continue.';
              instructions.dataset.ja = 'ピーチが障害物コースをクリアできるよう手伝ってね！1.5秒間、指示タイルを見続けると進みます。';
            } else {
              instructions.dataset.fr = "Aide Peach à terminer son parcours d'obstacles !";
              instructions.dataset.en = 'Help Peach finish her obstacle course!';
              instructions.dataset.ja = 'ピーチが障害物コースをクリアできるよう手伝ってね！';
            }

            if (typeof window.currentLanguage === 'string' && window.currentLanguage === 'en') {
              instructions.textContent = instructions.dataset.en;
            } else if (typeof window.currentLanguage === 'string' && window.currentLanguage === 'ja') {
              instructions.textContent = instructions.dataset.ja;
            } else {
              instructions.textContent = instructions.dataset.fr;
            }
          };

          updateInstructionCopy();

          const buttons = Array.from(document.querySelectorAll('.input-mode-btn'));
          buttons.forEach((button) => {
            const selected = button.dataset.inputMode === inputMode;
            button.classList.toggle('selected', selected);
            button.setAttribute('aria-pressed', selected ? 'true' : 'false');

            button.addEventListener('click', () => {
              const chosen = button.dataset.inputMode;
              if (!chosen || chosen === inputMode) return;
              const didApply = typeof window.setStopActionInputMode === 'function'
                ? window.setStopActionInputMode(chosen)
                : false;
              if (!didApply) return;
              inputMode = chosen;
              isEyegaze = inputMode === 'eyegaze';
              localStorage.setItem('arcadeMarioInputMode', chosen);
              buttons.forEach((btn) => {
                const selected = btn.dataset.inputMode === chosen;
                btn.classList.toggle('selected', selected);
                btn.setAttribute('aria-pressed', selected ? 'true' : 'false');
              });
              updateInstructionCopy();
            });
          });
        });
      })();
    </script>
    <script src="../../js/video-stop-action.js"></script>
</body>
</html>
