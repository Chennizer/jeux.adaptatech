  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('config', 'G-B45TJG4GBJ');

  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #game-container { position: fixed; inset: 0; display: none; }
    #game-canvas { width: 100%; height: 100%; display: block; }

    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 30;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      font-size: 14px;
      line-height: 1.7;
      display: none;
    }
    .ammo-meter {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      z-index: 32;
    }
    .ammo-meter-track {
      width: 72px;
      height: 260px;
      margin: 0 auto;
      border: 2px solid rgba(220, 255, 255, 0.85);
      border-radius: 16px;
      overflow: hidden;
      background:
        repeating-linear-gradient(
          to top,
          rgba(255,255,255,0.12) 0 10%,
          rgba(255,255,255,0.03) 10% 20%
        ),
        rgba(0, 0, 0, 0.45);
      position: relative;
    }
    .ammo-meter-track::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.45);
    }
    .ammo-meter-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 100%;
      width: 100%;
      background: hsl(120 85% 52%);
      box-shadow: 0 0 14px rgba(120, 255, 140, 0.6);
      transition: height 80ms linear, background 120ms linear, box-shadow 120ms linear;
    }

    #game-over {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 35;
      background: rgba(0,0,0,0.5);
    }

    #game-over .results-panel {
      font-family: 'Press Start 2P', cursive;
      text-align: center;
      max-width: min(90vw, 680px);
    }

    #game-over-score {
      color: #fff;
      margin: 18px 0;
      font-size: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body

>

  <audio id="bg-music" src="../../songs/space/spacequest1.mp3" preload="auto" loop></audio>

  <script src="../../js/translationmain.js"></script>
  <script>
    (() => {
      const controlPanel = document.getElementById('control-panel');
      const startButton = document.getElementById('control-panel-start-button');
      const gameContainer = document.getElementById('game-container');
      const hud = document.getElementById('hud');
      const gameOverScreen = document.getElementById('game-over');
      const restartButton = document.getElementById('continue-button');
      const music = document.getElementById('bg-music');
      const languageToggleButton = document.getElementById('language-toggle');

      const scoreNode = document.getElementById('hud-score');
      const livesNode = document.getElementById('hud-lives');
      const gameOverScore = document.getElementById('game-over-score');
      const ammoMeter = document.getElementById('ammo-meter');
      const ammoMeterFill = document.getElementById('ammo-meter-fill');

      const canvas = document.getElementById('game-canvas');
      const ctx = canvas.getContext('2d');

      const enemySprites = [];
      const fruitPaths = [
        '../../images/pictos/apple.png',
        '../../images/pictos/orange.png',
        '../../images/pictos/banana.png',
        '../../images/pictos/strawberry.png',
        '../../images/pictos/kiwi.png',
        '../../images/pictos/grapes.png',
        '../../images/pictos/lemon.png',
        '../../images/pictos/pineapple.png'
      ];

      let inputMode = 'switch';
      let difficulty = 'normal';
      let running = false;
      let rafId = null;
      let score = 0;
      let lives = 3;
      let enemySpawnTimer = 0;
      let currentSpawnDelay = 10000;
      let lastTs = 0;
      let motionTime = 0;
      let ammoEnergy = 1;
      let gazeX = window.innerWidth * 0.5;
      let gazeY = window.innerHeight * 0.5;
      let hoveredEnemyId = null;
      let hoverStartAt = 0;
      const EYEGAZE_DWELL_MS = 1000;
      const EYEGAZE_ROW_STEP_MS = 10000;

      const stars = [];
      const bullets = [];
      const enemies = [];
      let nextEnemyId = 1;
      const STAR_COUNT = 220;

      const player = {
        x: 0,
        y: 0,
        width: 72,
        height: 28,
        cooldown: 0
      };

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = canvas.height - 90;
        if (player.x === 0) player.x = canvas.width * 0.5;
      }

      function makeStars() {
        stars.length = 0;
        for (let i = 0; i < STAR_COUNT; i += 1) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            z: Math.random() * 1,
            size: 1 + Math.random() * 2.5
          });
        }
      }

      function updateStars(dt) {
        const speed = 160;
        for (const star of stars) {
          star.y += speed * (0.35 + star.z) * dt;
          if (star.y > canvas.height + 4) {
            star.y = -8;
            star.x = Math.random() * canvas.width;
            star.z = Math.random();
            star.size = 1 + Math.random() * 2.5;
          }
        }
      }

      function drawStars() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (const star of stars) {
          const alpha = 0.35 + star.z * 0.65;
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.fillRect(star.x, star.y, star.size, star.size);
        }
      }

      function loadSprites() {
        fruitPaths.forEach((path) => {
          const img = new Image();
          img.src = path;
          enemySprites.push(img);
        });
      }

      function spawnEnemy() {
        const image = enemySprites[Math.floor(Math.random() * enemySprites.length)] || null;
        const size = 48;
        if (inputMode === 'eyegaze') {
          const tileSize = Math.min(window.innerWidth * 0.30, window.innerHeight * 0.30);
          const lanes = [0.2, 0.5, 0.8];
          const lane = lanes[Math.floor(Math.random() * lanes.length)];
          const rowY = getEyegazeRowY(0);
          enemies.push({
            id: nextEnemyId++,
            x: window.innerWidth * lane,
            y: rowY,
            size: tileSize,
            speed: 0,
            image,
            type: 'normal',
            hp: 1,
            eyegazeTile: true,
            resolved: false,
            spawnAt: performance.now()
          });
          return;
        }

        const isTank = (difficulty === 'hard' && Math.random() < 0.35)
          || (difficulty === 'competitive' && Math.random() < 0.5);
        const baseSpeed = 58;
        const speedMultiplier = difficulty === 'competitive' ? 1.5 : difficulty === 'hard' ? 1.25 : 1;
        const leftSafeZone = canvas.width * 0.1; // keep left 1/10 clear for UI (ammo column)
        const minX = Math.max(leftSafeZone + size * 0.5, 30 + size * 0.5);
        const maxX = Math.max(minX, canvas.width - 60);
        enemies.push({
          id: nextEnemyId++,
          x: minX + Math.random() * Math.max(0, maxX - minX),
          y: 70,
          size,
          speed: baseSpeed * speedMultiplier,
          image,
          type: isTank ? 'tank' : 'normal',
          hp: isTank ? 2 : 1
        });
      }

      function getSpawnDelayMs() {
        if (difficulty === 'hard') return 5000 + Math.random() * 3000;       // 5 to 8 sec
        if (difficulty === 'competitive') return 3000 + Math.random() * 1000; // 3 to 4 sec
        return 10000; // normal
      }

      function shoot() {
        if (!running || player.cooldown > 0) return;
        if (inputMode === 'eyegaze') return;
        if (usesAmmoMeter()) {
          const cost = getShotCost();
          if (ammoEnergy < cost) return;
          ammoEnergy = Math.max(0, ammoEnergy - cost);
          updateAmmoMeter();
        }

        const muzzleX = player.x;
        const muzzleY = player.y - 16;
        const speed = 540;
        const target = findNearestEnemy(muzzleX, muzzleY);
        let vx = 0;
        let vy = -speed;
        let targetId = null;
        let homing = false;

        if (target) {
          targetId = target.id;
          homing = true;
          const arcDirection = target.x >= muzzleX ? 1 : -1;
          const launchAngle = (-Math.PI / 2) + arcDirection * 0.48;
          vx = Math.cos(launchAngle) * speed;
          vy = Math.sin(launchAngle) * speed;
        }

        bullets.push({
          x: muzzleX,
          y: muzzleY,
          vx,
          vy,
          speed,
          targetId,
          homing,
          turnRate: 3.2,
          r: 6,
          trail: []
        });
        player.cooldown = usesAmmoMeter() ? 0.12 : 1.0;
      }

      function updateGame(dt) {
        player.cooldown = Math.max(0, player.cooldown - dt);
        if (usesAmmoMeter()) {
          ammoEnergy = Math.min(1, ammoEnergy + getAmmoRegenPerSecond() * dt);
          updateAmmoMeter();
        }

        motionTime += dt;
        const centerX = canvas.width * 0.5;
        const horizontalRange = canvas.width / 12; // total sweep is 1/6th of the screen width
        player.x = inputMode === 'eyegaze'
          ? centerX
          : centerX + Math.sin(motionTime * 0.6) * horizontalRange;

        enemySpawnTimer += dt * 1000;
        if (enemySpawnTimer >= currentSpawnDelay) {
          enemySpawnTimer = 0;
          spawnEnemy();
          currentSpawnDelay = getSpawnDelayMs();
        }

        for (let i = bullets.length - 1; i >= 0; i -= 1) {
          const b = bullets[i];
          b.trail.unshift({ x: b.x, y: b.y, life: 0.35 });
          if (b.trail.length > 10) b.trail.pop();
          for (const p of b.trail) p.life -= dt;
          b.trail = b.trail.filter((p) => p.life > 0);

          if (b.homing && b.targetId !== null) {
            const targetEnemy = findEnemyById(b.targetId);
            if (targetEnemy) {
              const desiredAngle = Math.atan2(targetEnemy.y - b.y, targetEnemy.x - b.x);
              const currentAngle = Math.atan2(b.vy, b.vx);
              let delta = desiredAngle - currentAngle;
              while (delta > Math.PI) delta -= Math.PI * 2;
              while (delta < -Math.PI) delta += Math.PI * 2;
              const maxTurn = b.turnRate * dt;
              const clampedTurn = Math.max(-maxTurn, Math.min(maxTurn, delta));
              const nextAngle = currentAngle + clampedTurn;
              b.vx = Math.cos(nextAngle) * b.speed;
              b.vy = Math.sin(nextAngle) * b.speed;
            }
          }

          b.x += b.vx * dt;
          b.y += b.vy * dt;
          if (b.y < -20 || b.y > canvas.height + 20 || b.x < -20 || b.x > canvas.width + 20) bullets.splice(i, 1);
        }

        for (let i = enemies.length - 1; i >= 0; i -= 1) {
          const e = enemies[i];
          if (e.eyegazeTile) {
            const elapsed = performance.now() - (e.spawnAt || 0);
            const row = Math.floor(elapsed / EYEGAZE_ROW_STEP_MS);
            if (row >= 3) {
              enemies.splice(i, 1);
              continue;
            }
            e.y = getEyegazeRowY(row);
          } else {
            e.y += e.speed * dt;
          }

          if (e.y - e.size * 0.5 > canvas.height) {
            enemies.splice(i, 1);
            lives -= 1;
            updateHud();
            if (lives <= 0) {
              endGame();
              return;
            }
            continue;
          }

          for (let j = bullets.length - 1; j >= 0; j -= 1) {
            const b = bullets[j];
            const dx = b.x - e.x;
            const dy = b.y - e.y;
            if ((dx * dx + dy * dy) <= ((e.size * 0.45) * (e.size * 0.45))) {
              bullets.splice(j, 1);
              if (e.eyegazeTile) {
                enemies.splice(i, 1);
                score += 10;
                updateHud();
                break;
              }
              e.hp -= 1;
              if (e.hp <= 0) {
                enemies.splice(i, 1);
                score += e.type === 'tank' ? 20 : 10;
                updateHud();
              }
              break;
            }
          }
        }

        if (inputMode === 'eyegaze') {
          updateEyegazeDwell();
        }
      }

      function getEyegazeRowY(rowIndex) {
        const top = canvas.height * 0.20;
        const middle = canvas.height * 0.46;
        const bottom = canvas.height * 0.72;
        if (rowIndex <= 0) return top;
        if (rowIndex === 1) return middle;
        return bottom;
      }

      function drawPlayer() {
        const x = player.x;
        const y = player.y;

        ctx.save();
        ctx.translate(x, y);

        ctx.fillStyle = '#21e0ff';
        ctx.beginPath();
        ctx.moveTo(0, -26);
        ctx.lineTo(-22, 18);
        ctx.lineTo(22, 18);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#005d8e';
        ctx.fillRect(-34, 18, 68, 10);

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-8, -3, 16, 8);

        ctx.restore();
      }

      function drawBullets() {
        for (const b of bullets) {
          for (const p of b.trail) {
            const alpha = Math.max(0, p.life / 0.35) * 0.5;
            ctx.fillStyle = `rgba(255, 170, 60, ${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(1.5, b.r - 3), 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.fillStyle = '#ffd66b';
          ctx.save();
          ctx.translate(b.x, b.y);
          ctx.rotate(Math.atan2(b.vy, b.vx));
          ctx.fillStyle = '#ffc24b';
          ctx.beginPath();
          ctx.moveTo(b.r + 2, 0);
          ctx.lineTo(-b.r, -b.r * 0.7);
          ctx.lineTo(-b.r, b.r * 0.7);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = '#fff4c4';
          ctx.beginPath();
          ctx.ellipse(-b.r * 0.2, 0, b.r * 0.5, b.r * 0.3, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function findNearestEnemy(x, y) {
        if (!enemies.length) return null;
        let best = null;
        let bestDistSq = Infinity;
        for (const e of enemies) {
          const dx = e.x - x;
          const dy = e.y - y;
          const d2 = dx * dx + dy * dy;
          if (d2 < bestDistSq) {
            bestDistSq = d2;
            best = e;
          }
        }
        return best;
      }

      function findEnemyById(id) {
        for (const enemy of enemies) {
          if (enemy.id === id) return enemy;
        }
        return null;
      }

      function drawEnemies() {
        for (const e of enemies) {
          if (e.eyegazeTile) {
            const x = e.x - e.size * 0.5;
            const y = e.y - e.size * 0.5;
            const hovered = !e.resolved && hoveredEnemyId === e.id;
            ctx.fillStyle = hovered ? 'rgba(40, 210, 255, 0.28)' : 'rgba(255,255,255,0.14)';
            ctx.strokeStyle = hovered ? '#7af6ff' : 'rgba(255,255,255,0.55)';
            ctx.lineWidth = hovered ? 5 : 3;
            ctx.fillRect(x, y, e.size, e.size);
            ctx.strokeRect(x, y, e.size, e.size);

            if (e.resolved) {
              ctx.fillStyle = 'rgba(255, 52, 52, 0.42)';
              ctx.fillRect(x, y, e.size, e.size);
              ctx.strokeStyle = 'rgba(255, 120, 120, 0.8)';
              ctx.lineWidth = 2;
              ctx.strokeRect(x, y, e.size, e.size);
            } else if (hovered && hoverStartAt) {
              const progress = Math.max(0, Math.min(1, (performance.now() - hoverStartAt) / EYEGAZE_DWELL_MS));
              const fillW = e.size * progress;
              const fillH = e.size * progress;
              const fillX = e.x - fillW * 0.5;
              const fillY = e.y - fillH * 0.5;
              ctx.fillStyle = 'rgba(255, 52, 52, 0.42)';
              ctx.fillRect(fillX, fillY, fillW, fillH);
              ctx.strokeStyle = 'rgba(255, 120, 120, 0.8)';
              ctx.lineWidth = 2;
              ctx.strokeRect(fillX, fillY, fillW, fillH);
            }

            if (e.image && e.image.complete) {
              ctx.drawImage(e.image, x + 6, y + 6, e.size - 12, e.size - 12);
            }
            continue;
          }

          if (e.image && e.image.complete) {
            ctx.drawImage(e.image, e.x - e.size * 0.5, e.y - e.size * 0.5, e.size, e.size);
            if (e.type === 'tank') {
              ctx.strokeStyle = 'rgba(255, 110, 110, 0.95)';
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.arc(e.x, e.y, e.size * 0.38, 0, Math.PI * 2);
              ctx.stroke();
            }
          } else {
            ctx.fillStyle = '#ff3b6b';
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size * 0.4, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      function updateEyegazeDwell() {
        const hovered = findEyegazeTarget();
        const now = performance.now();
        if (!hovered) {
          hoveredEnemyId = null;
          hoverStartAt = 0;
          return;
        }

        if (hoveredEnemyId !== hovered.id) {
          hoveredEnemyId = hovered.id;
          hoverStartAt = now;
          return;
        }

        if (hoverStartAt && now - hoverStartAt >= EYEGAZE_DWELL_MS) {
          launchEyegazeProjectile(hovered);
          hoveredEnemyId = null;
          hoverStartAt = 0;
        }
      }

      function findEyegazeTarget() {
        for (let i = enemies.length - 1; i >= 0; i -= 1) {
          const e = enemies[i];
          if (!e.eyegazeTile || e.resolved) continue;
          const half = e.size * 0.5;
          if (gazeX >= e.x - half && gazeX <= e.x + half && gazeY >= e.y - half && gazeY <= e.y + half) {
            return e;
          }
        }
        return null;
      }

      function launchEyegazeProjectile(target) {
        if (!target || target.resolved) return;
        target.resolved = true;
        const muzzleX = canvas.width * 0.5;
        const muzzleY = player.y - 16;
        const speed = 540;
        const dx = target.x - muzzleX;
        const dy = target.y - muzzleY;
        const dist = Math.hypot(dx, dy) || 1;
        bullets.push({
          x: muzzleX,
          y: muzzleY,
          vx: (dx / dist) * speed,
          vy: (dy / dist) * speed,
          speed,
          targetId: target.id,
          homing: true,
          turnRate: 3.2,
          r: 6,
          trail: []
        });
      }

      function updateHud() {
        scoreNode.textContent = `Score: ${score}`;
        livesNode.textContent = `Lives: ${lives}`;
      }

      function updateHudLanguage() {
        const lang = (typeof getStoredLanguage === 'function' ? getStoredLanguage() : (document.documentElement.lang || 'fr')) || 'fr';
        const scoreLabel = lang === 'fr' ? 'Score' : lang === 'ja' ? 'スコア' : 'Score';
        const livesLabel = lang === 'fr' ? 'Vies' : lang === 'ja' ? 'ライフ' : 'Lives';
        scoreNode.textContent = `${scoreLabel}: ${score}`;
        livesNode.textContent = `${livesLabel}: ${lives}`;
      }

      function usesAmmoMeter() {
        return (difficulty === 'hard' || difficulty === 'competitive') && inputMode !== 'eyegaze';
      }

      function updateCursorVisibility() {
        document.body.style.cursor = (inputMode === 'eyegaze' && running) ? 'none' : '';
      }

      function getShotCost() {
        return difficulty === 'competitive' ? 0.55 : 0.35;
      }

      function getAmmoRegenPerSecond() {
        return difficulty === 'competitive' ? 0.22 : 0.3;
      }

      function updateAmmoMeter() {
        if (!ammoMeter || !ammoMeterFill) return;
        ammoMeter.style.display = usesAmmoMeter() ? 'block' : 'none';
        const percent = Math.round(ammoEnergy * 100);
        const hue = Math.round(ammoEnergy * 120); // 0 red -> 120 green
        ammoMeterFill.style.height = `${percent}%`;
        ammoMeterFill.style.background = `hsl(${hue} 88% 52%)`;
        ammoMeterFill.style.boxShadow = `0 0 16px hsla(${hue} 95% 60% / 0.65)`;
      }

      function tick(ts) {
        if (!running) return;
        const dt = Math.min(0.033, (ts - lastTs) / 1000 || 0.016);
        lastTs = ts;

        updateStars(dt);
        updateGame(dt);

        drawStars();
        drawEnemies();
        drawBullets();
        drawPlayer();

        rafId = requestAnimationFrame(tick);
      }

      function startGame() {
        controlPanel.style.display = 'none';
        gameContainer.style.display = 'block';
        hud.style.display = 'block';
        gameOverScreen.style.display = 'none';
        if (languageToggleButton) languageToggleButton.style.display = 'none';

        score = 0;
        lives = difficulty === 'competitive' ? 2 : difficulty === 'hard' ? 5 : 4;
        bullets.length = 0;
        enemies.length = 0;
        enemySpawnTimer = 0;
        currentSpawnDelay = getSpawnDelayMs();
        motionTime = 0;
        ammoEnergy = 1;
        hoveredEnemyId = null;
        hoverStartAt = 0;
        player.x = canvas.width * 0.5;
        running = true;
        updateHudLanguage();
        updateAmmoMeter();
        updateCursorVisibility();

        spawnEnemy();
        try { music.currentTime = 0; music.play(); } catch (_) {}
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen?.().catch(() => {});
        }

        lastTs = performance.now();
        cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(tick);
      }

      function endGame() {
        running = false;
        cancelAnimationFrame(rafId);
        music.pause();
        updateCursorVisibility();
        if (gazePointer) gazePointer.style.opacity = '0';
        gameOverScore.textContent = `Score final: ${score}`;
        gameOverScreen.style.display = 'flex';
      }

      function applyInputMode(mode) {
        inputMode = mode === 'eyegaze' ? 'eyegaze' : 'switch';
        document.body.setAttribute('data-input-mode', inputMode);

        const buttons = Array.from(document.querySelectorAll('.input-mode-btn'));
        buttons.forEach((button) => {
          const selected = button.dataset.inputMode === inputMode;
          button.classList.toggle('selected', selected);
          button.setAttribute('aria-pressed', selected ? 'true' : 'false');
        });
        updateAmmoMeter();
        updateCursorVisibility();
      }

      function applyDifficulty(mode) {
        difficulty = ['normal', 'hard', 'competitive'].includes(mode) ? mode : 'normal';
        const modeButtons = Array.from(document.querySelectorAll('#stop-action-mode-segmented-control .stop-action-mode-btn'));
        modeButtons.forEach((button) => {
          const selected = button.dataset.mode === difficulty;
          button.classList.toggle('selected', selected);
          button.setAttribute('aria-pressed', selected ? 'true' : 'false');
        });

        const desc = document.getElementById('stop-action-mode-description');
        if (!desc) return;
        if (difficulty === 'hard') {
          desc.dataset.fr = 'Ennemis 25% plus rapides, apparition toutes les 5 à 8 secondes, ennemis blindés (2 coups), 5 vies, barre de recharge munitions.';
          desc.dataset.en = 'Enemies are 25% faster, spawn every 5 to 8 seconds, tank enemies need 2 hits, 5 lives, with an ammo recharge bar.';
          desc.dataset.ja = '敵は25%高速化、5〜8秒ごとに出現、2発必要なタンク敵、ライフ5、弾薬リチャージバーあり。';
        } else if (difficulty === 'competitive') {
          desc.dataset.fr = 'Mode Extrême : ennemis 50% plus rapides, apparition toutes les 3 à 4 secondes, ennemis blindés, 2 vies, tirs consomment davantage la barre.';
          desc.dataset.en = 'Extreme mode: enemies are 50% faster, spawn every 3 to 4 seconds, includes tank enemies, 2 lives, and shots consume more ammo charge.';
          desc.dataset.ja = 'エクストリーム：敵は50%高速、3〜4秒ごとに出現、タンク敵あり、ライフ2、射撃時の消費チャージが大きい。';
        } else {
          desc.dataset.fr = 'Cadence équilibrée pour commencer.';
          desc.dataset.en = 'Balanced pace to get started.';
          desc.dataset.ja = '始めやすいバランス設定です。';
        }

        const lang = typeof getStoredLanguage === 'function' ? getStoredLanguage() : (document.documentElement.lang || 'fr');
        desc.textContent = lang === 'en' ? desc.dataset.en : lang === 'ja' ? desc.dataset.ja : desc.dataset.fr;
        updateAmmoMeter();
      }

      document.addEventListener('keydown', (event) => {
        if (event.key === ' ' || event.code === 'Space') {
          event.preventDefault();
          if (running) shoot();
        }
      });

      const gazePointer = document.getElementById('gazePointer');
      function updateGazePointer(x, y) {
        gazeX = x;
        gazeY = y;
        if (inputMode !== 'eyegaze' || !running) {
          if (gazePointer) gazePointer.style.opacity = '0';
          return;
        }
        if (gazePointer) {
          gazePointer.style.display = 'block';
          gazePointer.style.opacity = '1';
          gazePointer.style.left = `${x}px`;
          gazePointer.style.top = `${y}px`;
        }
      }
      document.addEventListener('pointermove', (event) => {
        updateGazePointer(event.clientX, event.clientY);
      });

      startButton.addEventListener('click', startGame);
      restartButton.addEventListener('click', startGame);

      document.getElementById('language-toggle')?.addEventListener('pointerup', () => {
        toggleLanguage();
        updateHudLanguage();
        applyDifficulty(difficulty);
      });

      Array.from(document.querySelectorAll('.input-mode-btn')).forEach((button) => {
        button.addEventListener('click', () => applyInputMode(button.dataset.inputMode));
      });

      Array.from(document.querySelectorAll('#stop-action-mode-segmented-control .stop-action-mode-btn')).forEach((button) => {
        button.addEventListener('click', () => applyDifficulty(button.dataset.mode));
      });

      window.addEventListener('resize', () => {
        resizeCanvas();
        if (!running) {
          drawStars();
          drawPlayer();
        }
      });

      resizeCanvas();
      loadSprites();
      makeStars();
      applyInputMode('switch');
      applyDifficulty('normal');
      updateHudLanguage();
      updateAmmoMeter();
      drawStars();
      drawPlayer();
    })();
  </script>
</body>
</html>
