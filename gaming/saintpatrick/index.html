<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Saint Patrick Mini Games (Switch)</title>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#07140b; touch-action:none; user-select:none; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
    canvas { display:block; }
    #overlay { position:fixed; inset:0; background:rgba(0,0,0,.72); display:grid; place-items:center; z-index:10; padding:22px; text-align:center; }
    #panel { width:min(690px,92vw); background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.2); border-radius:18px; padding:16px 16px 14px; box-shadow:0 14px 50px rgba(0,0,0,.55); color:rgba(255,255,255,.94); backdrop-filter: blur(4px); }
    #panel h1 { margin:0 0 8px; font-size:20px; font-weight:760; }
    #panel p { margin:0 0 12px; font-size:14px; line-height:1.4; color:rgba(255,255,255,.8); }
    .btnrow { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    button { border:1px solid rgba(255,255,255,.24); background:rgba(255,255,255,.12); color:rgba(255,255,255,.92); padding:10px 14px; border-radius:14px; font-size:14px; cursor:pointer; }
    .hint { margin-top:10px; font-size:12px; color:rgba(255,255,255,.62); }
  </style>
</head>
<body>
  <div id="overlay" role="dialog" aria-modal="true">
    <div id="panel">
      <h1>Saint Patrick Mini Games</h1>
      <p>
        A themed sequence of 3 mini games:<br>
        <b>1)</b> Pop clovers, <b>2)</b> Build the rainbow, <b>3)</b> Collect gold coins.<br>
        Press <b>Space</b> (switch) to interact in each stage.
      </p>
      <div class="btnrow">
        <button id="startBtn" type="button">Start</button>
        <button id="fsBtn" type="button">Fullscreen</button>
      </div>
      <div class="hint">Space can also start from this screen.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
  <script>
    const CFG = {
      cloverImgPath: "../../images/arthur.jpg",
      cloverCount: 14,
      spawnRatePerSec: 2,
      maxClovers: 26,
      minScale: 0.22,
      maxScale: 0.52,
      fallSpeedMin: 1,
      fallSpeedMax: 2.8,
      driftMax: 0.55,
      spinMax: 0.018,
      hitRadiusBoost: 1.25,
      particlesPerBurst: 40,
      coinsTarget: 15,
      cloversTarget: 18
    };

    const STAGES = [
      { key: 'clover', label: 'Stage 1/3 · Clovers' },
      { key: 'rainbow', label: 'Stage 2/3 · Rainbow' },
      { key: 'coins', label: 'Stage 3/3 · Gold coins' }
    ];

    let audioCtx=null, masterGain=null, audioEnabled=false;
    function ensureAudio(){
      if (audioEnabled) return true;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.22;
        masterGain.connect(audioCtx.destination);
        audioEnabled = true;
        return true;
      } catch { return false; }
    }
    function playBlip(freq=620, len=.12, gain=.13){
      if (!audioEnabled || !audioCtx) return;
      const t0 = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type='triangle';
      osc.frequency.setValueAtTime(freq, t0);
      osc.frequency.exponentialRampToValueAtTime(freq*.65, t0+len);
      g.gain.setValueAtTime(.0001, t0);
      g.gain.exponentialRampToValueAtTime(gain, t0+.01);
      g.gain.exponentialRampToValueAtTime(.0001, t0+len);
      osc.connect(g); g.connect(masterGain); osc.start(t0); osc.stop(t0+len+.02);
    }

    let started=false;
    let currentStage=0;
    let stageMessage='';
    let stageMessageTimer=0;

    let cloverImg=null;
    let clovers=[], particles=[], ripples=[];
    let coins=[];
    let rainbowProgress=0;
    const rainbowColors = ['#ff4d4d','#ff8f1f','#ffd447','#4bc95a','#32b8ff','#4f6bff','#b145ff'];
    let cloverPopped=0, coinsCollected=0;

    let pointerX=0, pointerY=0;
    let lastMs=0, spawnAcc=0;

    class FallingClover {
      constructor(x,y,s,vy,vx,rot,rv){ Object.assign(this,{x,y,s,vy,vx,rot,rv,wob:Math.random()*1000}); }
      radius(){ return min(width,height)*0.12*this.s; }
      update(dt){
        const wob = Math.sin(millis()*0.0012 + this.wob) * 0.35;
        this.x += (this.vx + wob) * dt;
        this.y += this.vy * dt;
        this.rot += this.rv * dt;
        const r=this.radius();
        if (this.y-r > height+60){ this.y=-r-60; this.x=random(r,width-r); }
        if (this.x < -r) this.x = width+r;
        if (this.x > width+r) this.x = -r;
      }
      contains(px,py){ return dist(px,py,this.x,this.y) <= this.radius()*CFG.hitRadiusBoost; }
      draw(){
        if (!cloverImg) return;
        push(); translate(this.x,this.y); rotate(this.rot); imageMode(CENTER);
        const rr=this.radius();
        noStroke(); fill(120, 55, 85, .12); ellipse(0,0, rr*2.6, rr*2.1);
        image(cloverImg, 0,0, rr*2, rr*2); pop();
      }
    }

    class Particle {
      constructor(x,y,h,s){
        const a=Math.random()*TWO_PI, sp=2.5+Math.random()*8;
        Object.assign(this,{x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,h,size:s||2.5+Math.random()*6});
      }
      update(dt){ this.x+=this.vx*dt*.95; this.y+=this.vy*dt*.95; this.vx*=.98; this.vy=this.vy*.98+.03*dt; this.life-=.022*dt; }
      draw(){ if(this.life<=0)return; noStroke(); fill(this.h,70,100,constrain(this.life,0,1)*.9); ellipse(this.x,this.y,this.size,this.size); }
    }

    class Ripple { constructor(x,y,h){ Object.assign(this,{x,y,h,t:0}); } update(dt){ this.t+=dt/60; } done(){ return this.t>=1.1; }
      draw(){ const p=constrain(this.t/1.1,0,1); if(p>=1)return; noFill(); stroke(this.h,55,100,(1-p)*.5); strokeWeight(5*(1-p)+1); const rr=lerp(0,max(width,height)*.5,p); ellipse(this.x,this.y,rr*2,rr*2); }
    }

    function preload(){ cloverImg = loadImage(CFG.cloverImgPath); }
    function setup(){
      createCanvas(window.innerWidth, window.innerHeight);
      colorMode(HSB, 360, 100, 100, 1);
      pointerX=width*.5; pointerY=height*.6;
      resetStage(0);
      lastMs = millis();
    }
    function windowResized(){ resizeCanvas(window.innerWidth, window.innerHeight); resetStage(currentStage); }

    function resetStage(index){
      currentStage=index;
      particles=[]; ripples=[]; stageMessage=''; stageMessageTimer=0;
      if (STAGES[currentStage].key === 'clover') {
        clovers=[]; cloverPopped=0; spawnAcc=0;
        for (let i=0;i<CFG.cloverCount;i++) clovers.push(makeClover(random(-height,0)));
      } else if (STAGES[currentStage].key === 'rainbow') {
        rainbowProgress=0;
      } else {
        coinsCollected=0;
        spawnCoins(7);
      }
    }

    function nextStage(){
      const next = (currentStage + 1) % STAGES.length;
      setStageMessage(next === 0 ? 'Nice! Starting a new Saint Patrick cycle.' : 'Great! Next mini game...');
      setTimeout(() => resetStage(next), 700);
    }

    function setStageMessage(msg){ stageMessage = msg; stageMessageTimer = 150; }

    function makeClover(yOverride=null){
      const s=random(CFG.minScale, CFG.maxScale), r=min(width,height)*0.12*s;
      return new FallingClover(random(r,width-r), yOverride ?? random(-height,-60), s, random(CFG.fallSpeedMin,CFG.fallSpeedMax), random(-CFG.driftMax,CFG.driftMax), random(TWO_PI), random(-CFG.spinMax,CFG.spinMax));
    }
    function pickBestClover(){
      if (!clovers.length) return null;
      for (const c of clovers) if (c.contains(pointerX,pointerY)) return c;
      return clovers.reduce((best,c)=>dist(pointerX,pointerY,c.x,c.y)<dist(pointerX,pointerY,best.x,best.y)?c:best, clovers[0]);
    }

    function popClover(c){
      if (!c) return;
      clovers = clovers.filter(x => x !== c);
      cloverPopped += 1;
      ripples.push(new Ripple(c.x,c.y,120));
      for(let i=0;i<CFG.particlesPerBurst;i++) particles.push(new Particle(c.x,c.y,112+random(-10,10)));
      playBlip(620 + random(-80,120), .12, .15);
      if (clovers.length < CFG.maxClovers) setTimeout(()=>clovers.push(makeClover(random(-220,-60))), 100);
      if (cloverPopped >= CFG.cloversTarget) { setStageMessage('Clover stage complete!'); nextStage(); }
    }

    function drawRainbowStage(){
      for (let y=0; y<height; y++) {
        stroke(203, 70, map(y,0,height,88,55), 1); line(0,y,width,y);
      }
      noStroke(); fill(110, 52, 46); ellipse(width*.5, height*.92, width*1.3, height*.55);
      fill(40, 35, 95); ellipse(width*.82, height*.84, width*.13, width*.13);

      const cx=width*.5, cy=height*.9;
      const arcR=min(width,height)*.9;
      strokeWeight(max(10, width*.012)); noFill();
      for (let i=0;i<rainbowProgress;i++) {
        stroke(rainbowColors[i]);
        arc(cx, cy, arcR - i*26, arcR - i*26, PI, TWO_PI);
      }
    }

    function spawnCoins(n){
      coins=[];
      for(let i=0;i<n;i++) coins.push({x:random(width*.16,width*.84),y:random(height*.28,height*.78),r:random(22,34)});
    }
    function pickBestCoin(){
      if (!coins.length) return null;
      return coins.reduce((best,c)=>dist(pointerX,pointerY,c.x,c.y)<dist(pointerX,pointerY,best.x,best.y)?c:best, coins[0]);
    }
    function collectCoin(coin){
      if (!coin) return;
      coins = coins.filter(c => c !== coin);
      coinsCollected += 1;
      for(let i=0;i<34;i++) particles.push(new Particle(coin.x,coin.y,45+random(-5,8),2+random()*4));
      playBlip(900 + random(-60,80), .08, .14);
      if (!coins.length) spawnCoins(7);
      if (coinsCollected >= CFG.coinsTarget) { setStageMessage('Gold collected!'); nextStage(); }
    }

    function drawCoinsStage(){
      for (let y=0; y<height; y++){ stroke(42, 45, map(y,0,height,36,10), 1); line(0,y,width,y); }
      noStroke();
      fill(44, 70, 26); rect(0,height*.78,width,height*.22);
      fill(41, 88, 86); ellipse(width*.5,height*.92,width*.7,height*.28);
      for (const c of coins){
        fill(47, 88, 96); ellipse(c.x,c.y,c.r*2,c.r*2);
        fill(42, 70, 78); ellipse(c.x,c.y,c.r*1.25,c.r*1.25);
      }
    }

    function drawCloverStage(dt){
      for (let y=0; y<height; y++) { stroke(200, 45, map(y,0,height,72,45), 1); line(0,y,width,y); }
      noStroke(); fill(122, 55, 42); ellipse(width*.5,height*.9,width*1.25,height*.45);
      spawnAcc += (dt/60) * CFG.spawnRatePerSec;
      if (spawnAcc >= 1) {
        const k = floor(spawnAcc); spawnAcc -= k;
        for(let i=0;i<k;i++) if (clovers.length<CFG.maxClovers) clovers.push(makeClover());
      }
      for (const c of clovers) { c.update(dt); c.draw(); }
    }

    function draw(){
      const now=millis(); let dt=constrain((now-lastMs)/(1000/60), .5, 2.5); lastMs=now;
      background(0);

      const key = STAGES[currentStage].key;
      if (key === 'clover') drawCloverStage(dt);
      else if (key === 'rainbow') drawRainbowStage();
      else drawCoinsStage();

      for (const r of ripples){ r.update(dt); r.draw(); }
      ripples = ripples.filter(r=>!r.done());
      for (const p of particles){ p.update(dt); p.draw(); }
      particles = particles.filter(p=>p.life>0);

      drawHud();
    }

    function drawHud(){
      noStroke(); fill(0,0,0,.34); rect(14,14,min(430,width-28),84,14);
      fill(0,0,100,.95); textSize(20); textAlign(LEFT,TOP);
      text(STAGES[currentStage].label, 26, 24);
      textSize(16);
      if (STAGES[currentStage].key==='clover') text(`Popped: ${cloverPopped} / ${CFG.cloversTarget}`, 26, 54);
      if (STAGES[currentStage].key==='rainbow') text(`Segments: ${rainbowProgress} / 7`, 26, 54);
      if (STAGES[currentStage].key==='coins') text(`Coins: ${coinsCollected} / ${CFG.coinsTarget}`, 26, 54);
      if (stageMessageTimer > 0) {
        stageMessageTimer--;
        fill(0,0,100,.92); textAlign(CENTER,TOP); textSize(18); text(stageMessage, width*.5, 108);
      }
    }

    function interact(){
      if (!audioEnabled) ensureAudio();
      const key = STAGES[currentStage].key;
      if (key==='clover') popClover(pickBestClover());
      else if (key==='rainbow') {
        if (rainbowProgress < 7) {
          rainbowProgress += 1;
          const rx = width*.5 + random(-140,140), ry = height*.47 + random(-70,70);
          for (let i=0;i<26;i++) particles.push(new Particle(rx,ry,random(0,360),2+random()*4));
          playBlip(540 + rainbowProgress*60, .11, .12);
          if (rainbowProgress >= 7) { setStageMessage('Rainbow complete!'); nextStage(); }
        }
      } else {
        collectCoin(pickBestCoin());
      }
    }

    function keyPressed(){
      if (!started && (key===' ' || keyCode===ENTER)) { startGame(); return false; }
      if (key===' ') { interact(); return false; }
    }
    function mouseMoved(){ pointerX=mouseX; pointerY=mouseY; }
    function mouseDragged(){ pointerX=mouseX; pointerY=mouseY; }
    function mousePressed(){ pointerX=mouseX; pointerY=mouseY; interact(); return false; }
    function touchStarted(){ if (touches?.[0]) { pointerX=touches[0].x; pointerY=touches[0].y; } interact(); return false; }
    function touchMoved(){ if (touches?.[0]) { pointerX=touches[0].x; pointerY=touches[0].y; } return false; }

    const overlay=document.getElementById('overlay');
    const startBtn=document.getElementById('startBtn');
    const fsBtn=document.getElementById('fsBtn');
    function startGame(){ ensureAudio(); overlay.style.display='none'; started=true; }
    async function requestFullscreen(){ try{ if(!document.fullscreenElement) await document.documentElement.requestFullscreen?.(); }catch{} }
    startBtn.addEventListener('click', ()=>{ startGame(); requestFullscreen(); });
    fsBtn.addEventListener('click', ()=>{ ensureAudio(); requestFullscreen(); });
    overlay.addEventListener('pointerdown',(e)=>{ if(e.target.tagName.toLowerCase()==='button') return; startGame(); requestFullscreen(); },{passive:true});

    window.preload=preload; window.setup=setup; window.draw=draw; window.windowResized=windowResized;
    window.keyPressed=keyPressed; window.mouseMoved=mouseMoved; window.mouseDragged=mouseDragged; window.mousePressed=mousePressed;
    window.touchStarted=touchStarted; window.touchMoved=touchMoved;
  </script>
</body>
</html>
