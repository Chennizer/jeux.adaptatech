<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVI Sequencer</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #334155;
      --text: #e2e8f0;
      --accent: #22d3ee;
      --accent-2: #14b8a6;
      --danger: #ef4444;
      --ok: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #020617, var(--bg));
      color: var(--text);
    }

    header {
      padding: 1rem;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    h1 { margin: 0; font-size: 1.2rem; }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 1rem;
      padding: 1rem;
    }

    .panel {
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 0.75rem;
    }

    .section-title {
      font-size: 0.95rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      color: #67e8f9;
    }

    .controls-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    input, select, button, textarea {
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: var(--text);
      padding: 0.4rem 0.55rem;
      font-size: 0.88rem;
    }

    button {
      background: #0ea5e9;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover { filter: brightness(1.08); }
    button.secondary { background: #475569; }
    button.warn { background: var(--danger); }
    button.ok { background: var(--ok); color: #052e16; }

    .asset-list {
      max-height: 250px;
      overflow: auto;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.25rem;
      background: #020617;
    }

    .asset-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem;
      border-radius: 6px;
      margin-bottom: 0.3rem;
      background: #111827;
    }

    .asset-item img, .asset-item video {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 6px;
      background: #000;
    }

    .asset-item button {
      margin-left: auto;
      font-size: 0.75rem;
      padding: 0.25rem 0.4rem;
    }

    .playlist-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .playlist-table th, .playlist-table td {
      border-bottom: 1px solid #334155;
      padding: 0.35rem;
      text-align: left;
      vertical-align: top;
    }

    .playlist-wrap {
      max-height: 280px;
      overflow: auto;
      border: 1px solid #334155;
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }

    .playback {
      min-height: 400px;
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 1rem;
    }

    #stimulusStage {
      border: 1px solid #334155;
      border-radius: 12px;
      min-height: 380px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    #stimulusStage img, #stimulusStage video {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
      transition: opacity 0.35s ease;
    }

    .fade-out { opacity: 0; }
    .fade-in { opacity: 1; }

    .log-panel {
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 0.6rem;
      background: #020617;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    #eventStream {
      height: 220px;
      overflow: auto;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.4rem;
      font-size: 0.8rem;
      background: #111827;
    }

    .badge { border-radius: 999px; padding: 0.1rem 0.45rem; font-size: 0.75rem; font-weight: 700; }
    .preferred { background: #166534; color: #dcfce7; }
    .novel { background: #6b21a8; color: #f3e8ff; }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .playback { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>CVI Sequencer — listes de stimuli scriptées</h1>
    <div class="controls-row">
      <a href="../cvigenerator/index.html"><button type="button" class="secondary">↩ Générateur CVI</button></a>
      <a href="../stimulation visuelle/index.html"><button type="button" class="secondary">↩ Stimulation visuelle</button></a>
      <a href="../stimulation visuelle trace/index.html"><button type="button" class="secondary">↩ Stimulation tracée</button></a>
    </div>
  </header>

  <div class="layout">
    <section class="panel">
      <h2 class="section-title">1) Bibliothèque d'actifs</h2>
      <div class="controls-row">
        <select id="typeFilter">
          <option value="all">Tous</option>
          <option value="image">Images / icônes</option>
          <option value="video">Vidéos</option>
        </select>
        <input id="assetSearch" placeholder="Recherche...">
      </div>
      <div class="asset-list" id="assetList"></div>

      <div class="controls-row" style="margin-top:0.6rem;">
        <input type="file" id="localAssetInput" accept="image/*,video/*" multiple>
      </div>

      <h2 class="section-title" style="margin-top:0.9rem;">2) Pattern & paramètres globaux</h2>
      <div class="controls-row">
        <input id="patternInput" value="P-P-N-P" title="Ex: P-P-N-P">
        <button type="button" id="applyPatternBtn" class="secondary">Appliquer pattern</button>
      </div>
      <div class="controls-row">
        <label>Durée (s)
          <input id="defaultDuration" type="number" min="0.2" step="0.1" value="3.0">
        </label>
        <label>Transition
          <select id="defaultTransition">
            <option value="cut">cut</option>
            <option value="fade">fade</option>
            <option value="pause">pause</option>
          </select>
        </label>
      </div>
      <div class="controls-row">
        <button id="addEmptyItemBtn" type="button">+ Ajouter ligne vide</button>
        <button id="clearPlaylistBtn" type="button" class="warn">Vider</button>
      </div>

      <h2 class="section-title">3) Playlist</h2>
      <div class="playlist-wrap">
        <table class="playlist-table">
          <thead>
            <tr><th>#</th><th>Stimulus</th><th>Tag</th><th>Durée</th><th>Transition</th><th>Action</th></tr>
          </thead>
          <tbody id="playlistBody"></tbody>
        </table>
      </div>

      <h2 class="section-title">4) Modèles & exports</h2>
      <div class="controls-row">
        <input id="templateName" placeholder="Nom du modèle">
        <button id="saveTemplateBtn" class="ok" type="button">Sauver modèle</button>
      </div>
      <div class="controls-row">
        <select id="templateSelect"><option value="">Sélectionner un modèle</option></select>
        <button id="loadTemplateBtn" type="button" class="secondary">Charger</button>
      </div>
      <div class="controls-row">
        <button id="exportTemplateBtn" type="button" class="secondary">Exporter modèle (.json)</button>
        <input type="file" id="importTemplateInput" accept="application/json">
      </div>
      <div class="controls-row">
        <button id="exportLogBtn" type="button" class="secondary">Exporter log (.json)</button>
        <button id="exportCsvBtn" type="button" class="secondary">Exporter log (.csv)</button>
      </div>
    </section>

    <section class="panel">
      <h2 class="section-title">Lecture + observation</h2>
      <div class="controls-row">
        <button id="playBtn" type="button">▶ Lire</button>
        <button id="pausePlaybackBtn" type="button" class="secondary">⏸ Pause</button>
        <button id="stopBtn" type="button" class="warn">⏹ Stop</button>
        <span id="playbackStatus">Prêt.</span>
      </div>

      <div class="playback">
        <div id="stimulusStage"><span style="opacity:0.7;">Aucun stimulus actif</span></div>
        <div class="log-panel">
          <strong>Réactions rapides</strong>
          <div class="controls-row">
            <button class="reactionBtn" data-reaction="regard">👀 Regard</button>
            <button class="reactionBtn" data-reaction="sourire">🙂 Sourire</button>
            <button class="reactionBtn" data-reaction="évitement">↩ Évitement</button>
            <button class="reactionBtn" data-reaction="vocalisation">🗣️ Vocalisation</button>
          </div>
          <textarea id="noteInput" rows="2" placeholder="Note libre observateur..."></textarea>
          <button id="addNoteBtn" type="button" class="secondary">Ajouter note</button>
          <div id="eventStream"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="../../js/cviPngArray.js"></script>
  <script>
    const builtInAssets = [
      ...(window.PNG_ARRAY || []).slice(0, 40).map((item, idx) => ({ id: `cvi-${idx}`, name: item.name, src: item.file, type: 'image' })),
      { id: 'img-star', name: 'firefly icon', src: '../../images/fireflyicon.png', type: 'image' },
      { id: 'img-bolt', name: 'bolt', src: '../../images/bolt1.png', type: 'image' },
      { id: 'img-snow', name: 'snowflake', src: '../../images/snowflake.png', type: 'image' },
      { id: 'vid-eye', name: 'eyegaze animation', src: '../../animations/eyegaze.mp4', type: 'video' },
      { id: 'vid-ped', name: 'pedagogie intro', src: '../../animations/pedagogie.mp4', type: 'video' },
      { id: 'vid-pov', name: 'pov', src: '../../animations/pov.mp4', type: 'video' }
    ];

    const state = {
      assets: [...builtInAssets],
      playlist: [],
      currentIndex: -1,
      playing: false,
      paused: false,
      sessionStartMs: null,
      pendingTimer: null,
      logs: []
    };

    const el = {
      typeFilter: document.getElementById('typeFilter'),
      assetSearch: document.getElementById('assetSearch'),
      assetList: document.getElementById('assetList'),
      localAssetInput: document.getElementById('localAssetInput'),
      patternInput: document.getElementById('patternInput'),
      applyPatternBtn: document.getElementById('applyPatternBtn'),
      defaultDuration: document.getElementById('defaultDuration'),
      defaultTransition: document.getElementById('defaultTransition'),
      addEmptyItemBtn: document.getElementById('addEmptyItemBtn'),
      clearPlaylistBtn: document.getElementById('clearPlaylistBtn'),
      playlistBody: document.getElementById('playlistBody'),
      templateName: document.getElementById('templateName'),
      saveTemplateBtn: document.getElementById('saveTemplateBtn'),
      templateSelect: document.getElementById('templateSelect'),
      loadTemplateBtn: document.getElementById('loadTemplateBtn'),
      exportTemplateBtn: document.getElementById('exportTemplateBtn'),
      importTemplateInput: document.getElementById('importTemplateInput'),
      exportLogBtn: document.getElementById('exportLogBtn'),
      exportCsvBtn: document.getElementById('exportCsvBtn'),
      playBtn: document.getElementById('playBtn'),
      pausePlaybackBtn: document.getElementById('pausePlaybackBtn'),
      stopBtn: document.getElementById('stopBtn'),
      playbackStatus: document.getElementById('playbackStatus'),
      stimulusStage: document.getElementById('stimulusStage'),
      noteInput: document.getElementById('noteInput'),
      addNoteBtn: document.getElementById('addNoteBtn'),
      eventStream: document.getElementById('eventStream')
    };

    function normPath(src) {
      return src.startsWith('blob:') ? src : src.replace('../../', '/');
    }

    function getAssetById(id) {
      return state.assets.find(a => a.id === id);
    }

    function addPlaylistItem(assetId = '', tag = 'preferred') {
      state.playlist.push({
        assetId,
        tag,
        duration: Number(el.defaultDuration.value) || 3,
        transition: el.defaultTransition.value || 'cut'
      });
      renderPlaylist();
    }

    function renderAssetList() {
      const term = el.assetSearch.value.trim().toLowerCase();
      const filter = el.typeFilter.value;
      const filtered = state.assets.filter((asset) => {
        const typeOk = filter === 'all' || asset.type === filter;
        const searchOk = !term || asset.name.toLowerCase().includes(term);
        return typeOk && searchOk;
      });
      el.assetList.innerHTML = '';
      filtered.forEach((asset) => {
        const row = document.createElement('div');
        row.className = 'asset-item';
        if (asset.type === 'image') {
          row.innerHTML = `<img src="${normPath(asset.src)}" alt="${asset.name}">`;
        } else {
          row.innerHTML = `<video src="${normPath(asset.src)}" muted></video>`;
        }
        const text = document.createElement('span');
        text.textContent = asset.name;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = 'Ajouter';
        btn.addEventListener('click', () => addPlaylistItem(asset.id));
        row.appendChild(text);
        row.appendChild(btn);
        el.assetList.appendChild(row);
      });
    }

    function renderPlaylist() {
      el.playlistBody.innerHTML = '';
      state.playlist.forEach((item, idx) => {
        const tr = document.createElement('tr');
        const asset = getAssetById(item.assetId);
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>
            <select data-field="assetId" data-idx="${idx}">
              <option value="">-- choisir --</option>
              ${state.assets.map(a => `<option value="${a.id}" ${a.id === item.assetId ? 'selected' : ''}>${a.name}</option>`).join('')}
            </select>
            <div style="font-size:0.75rem; opacity:0.75;">${asset ? asset.type : ''}</div>
          </td>
          <td>
            <select data-field="tag" data-idx="${idx}">
              <option value="preferred" ${item.tag === 'preferred' ? 'selected' : ''}>preferred</option>
              <option value="novel" ${item.tag === 'novel' ? 'selected' : ''}>novel</option>
            </select>
          </td>
          <td><input type="number" min="0.2" step="0.1" data-field="duration" data-idx="${idx}" value="${item.duration}"></td>
          <td>
            <select data-field="transition" data-idx="${idx}">
              <option value="cut" ${item.transition === 'cut' ? 'selected' : ''}>cut</option>
              <option value="fade" ${item.transition === 'fade' ? 'selected' : ''}>fade</option>
              <option value="pause" ${item.transition === 'pause' ? 'selected' : ''}>pause</option>
            </select>
          </td>
          <td><button type="button" data-remove="${idx}" class="warn">✕</button></td>
        `;
        el.playlistBody.appendChild(tr);
      });
    }

    function parsePattern(str) {
      return str.split(/[-,\s]+/).map(v => v.trim().toUpperCase()).filter(Boolean)
        .map(v => (v.startsWith('N') ? 'novel' : 'preferred'));
    }

    function applyPattern() {
      const pattern = parsePattern(el.patternInput.value);
      if (!pattern.length || !state.playlist.length) return;
      state.playlist.forEach((item, idx) => {
        item.tag = pattern[idx % pattern.length];
      });
      renderPlaylist();
      logEvent('system', `Pattern appliqué: ${pattern.join('-')}`);
    }

    function logEvent(kind, label, details = {}) {
      const now = Date.now();
      const sinceStartMs = state.sessionStartMs ? now - state.sessionStartMs : 0;
      const entry = {
        atISO: new Date(now).toISOString(),
        elapsedMs: sinceStartMs,
        kind,
        label,
        ...details
      };
      state.logs.push(entry);
      const line = document.createElement('div');
      line.textContent = `${(sinceStartMs / 1000).toFixed(2)}s • ${kind} • ${label}`;
      el.eventStream.appendChild(line);
      el.eventStream.scrollTop = el.eventStream.scrollHeight;
    }

    function renderStimulus(item, done) {
      const asset = getAssetById(item.assetId);
      if (!asset) {
        el.playbackStatus.textContent = 'Stimulus manquant';
        done();
        return;
      }

      el.stimulusStage.innerHTML = '';
      let media;
      if (asset.type === 'video') {
        media = document.createElement('video');
        media.src = normPath(asset.src);
        media.autoplay = true;
        media.loop = true;
        media.muted = true;
      } else {
        media = document.createElement('img');
        media.src = normPath(asset.src);
        media.alt = asset.name;
      }
      media.className = 'fade-in';
      el.stimulusStage.appendChild(media);

      el.playbackStatus.innerHTML = `Lecture ${state.currentIndex + 1}/${state.playlist.length} — <span class="badge ${item.tag}">${item.tag}</span> ${asset.name}`;
      logEvent('stimulus', asset.name, {
        tag: item.tag,
        transition: item.transition,
        durationS: item.duration
      });

      const runDone = () => {
        if (item.transition === 'fade') {
          media.classList.remove('fade-in');
          media.classList.add('fade-out');
          setTimeout(done, 330);
        } else if (item.transition === 'pause') {
          setTimeout(done, 500);
        } else {
          done();
        }
      };
      state.pendingTimer = setTimeout(runDone, item.duration * 1000);
    }

    function playNext() {
      if (!state.playing || state.paused) return;
      state.currentIndex += 1;
      if (state.currentIndex >= state.playlist.length) {
        stopPlayback();
        el.playbackStatus.textContent = 'Terminé.';
        logEvent('system', 'Séquence terminée');
        return;
      }
      renderStimulus(state.playlist[state.currentIndex], playNext);
    }

    function startPlayback() {
      if (!state.playlist.length) {
        alert('Ajoutez des stimuli à la playlist.');
        return;
      }
      clearTimeout(state.pendingTimer);
      state.currentIndex = -1;
      state.playing = true;
      state.paused = false;
      state.logs = [];
      el.eventStream.innerHTML = '';
      state.sessionStartMs = Date.now();
      logEvent('system', 'Lecture démarrée');
      playNext();
    }

    function pausePlayback() {
      if (!state.playing) return;
      state.paused = !state.paused;
      if (state.paused) {
        clearTimeout(state.pendingTimer);
        logEvent('system', 'Lecture en pause');
        el.playbackStatus.textContent = 'Pause';
      } else {
        logEvent('system', 'Reprise');
        playNext();
      }
    }

    function stopPlayback() {
      clearTimeout(state.pendingTimer);
      state.playing = false;
      state.paused = false;
      state.currentIndex = -1;
      el.stimulusStage.innerHTML = '<span style="opacity:0.7;">Aucun stimulus actif</span>';
      if (state.sessionStartMs) {
        logEvent('system', 'Lecture arrêtée');
      }
    }

    function exportJson(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportCsv() {
      const keys = ['atISO', 'elapsedMs', 'kind', 'label', 'tag', 'transition', 'durationS'];
      const rows = [keys.join(',')].concat(state.logs.map((row) => keys.map(k => JSON.stringify(row[k] ?? '')).join(',')));
      const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `cvi-session-${Date.now()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function templatePayload() {
      return {
        defaultDuration: Number(el.defaultDuration.value),
        defaultTransition: el.defaultTransition.value,
        pattern: el.patternInput.value,
        playlist: state.playlist
      };
    }

    function loadTemplatesMenu() {
      const keyPrefix = 'cvi-template:';
      const names = Object.keys(localStorage).filter(k => k.startsWith(keyPrefix)).map(k => k.slice(keyPrefix.length)).sort();
      el.templateSelect.innerHTML = '<option value="">Sélectionner un modèle</option>';
      names.forEach((name) => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        el.templateSelect.appendChild(opt);
      });
    }

    function applyTemplate(data) {
      el.defaultDuration.value = data.defaultDuration || 3;
      el.defaultTransition.value = data.defaultTransition || 'cut';
      el.patternInput.value = data.pattern || 'P-P-N-P';
      state.playlist = Array.isArray(data.playlist) ? data.playlist : [];
      renderPlaylist();
    }

    el.assetSearch.addEventListener('input', renderAssetList);
    el.typeFilter.addEventListener('change', renderAssetList);

    el.localAssetInput.addEventListener('change', (event) => {
      [...event.target.files].forEach((file) => {
        const id = `local-${crypto.randomUUID()}`;
        const type = file.type.startsWith('video/') ? 'video' : 'image';
        state.assets.unshift({ id, name: file.name, src: URL.createObjectURL(file), type, local: true });
      });
      renderAssetList();
      renderPlaylist();
    });

    el.addEmptyItemBtn.addEventListener('click', () => addPlaylistItem(''));
    el.clearPlaylistBtn.addEventListener('click', () => {
      state.playlist = [];
      renderPlaylist();
    });
    el.applyPatternBtn.addEventListener('click', applyPattern);

    el.playlistBody.addEventListener('change', (event) => {
      const target = event.target;
      const idx = Number(target.dataset.idx);
      const field = target.dataset.field;
      if (Number.isNaN(idx) || !field || !state.playlist[idx]) return;
      if (field === 'duration') {
        state.playlist[idx][field] = Number(target.value) || 1;
      } else {
        state.playlist[idx][field] = target.value;
      }
    });

    el.playlistBody.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-remove]');
      if (!button) return;
      const idx = Number(button.dataset.remove);
      state.playlist.splice(idx, 1);
      renderPlaylist();
    });

    el.playBtn.addEventListener('click', startPlayback);
    el.pausePlaybackBtn.addEventListener('click', pausePlayback);
    el.stopBtn.addEventListener('click', stopPlayback);

    document.querySelectorAll('.reactionBtn').forEach((btn) => {
      btn.addEventListener('click', () => {
        logEvent('reaction', btn.dataset.reaction, { stimulusIndex: state.currentIndex + 1 });
      });
    });

    el.addNoteBtn.addEventListener('click', () => {
      const note = el.noteInput.value.trim();
      if (!note) return;
      logEvent('note', note, { stimulusIndex: state.currentIndex + 1 });
      el.noteInput.value = '';
    });

    el.saveTemplateBtn.addEventListener('click', () => {
      const name = el.templateName.value.trim();
      if (!name) return;
      localStorage.setItem(`cvi-template:${name}`, JSON.stringify(templatePayload()));
      loadTemplatesMenu();
      logEvent('system', `Modèle sauvegardé: ${name}`);
    });

    el.loadTemplateBtn.addEventListener('click', () => {
      const name = el.templateSelect.value;
      if (!name) return;
      const raw = localStorage.getItem(`cvi-template:${name}`);
      if (!raw) return;
      applyTemplate(JSON.parse(raw));
      logEvent('system', `Modèle chargé: ${name}`);
    });

    el.exportTemplateBtn.addEventListener('click', () => {
      exportJson(`cvi-template-${Date.now()}.json`, templatePayload());
    });

    el.importTemplateInput.addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      applyTemplate(JSON.parse(text));
      logEvent('system', 'Modèle importé');
    });

    el.exportLogBtn.addEventListener('click', () => {
      exportJson(`cvi-log-${Date.now()}.json`, {
        createdAt: new Date().toISOString(),
        playlist: state.playlist,
        logs: state.logs
      });
    });
    el.exportCsvBtn.addEventListener('click', exportCsv);

    loadTemplatesMenu();
    renderAssetList();
    addPlaylistItem(state.assets[0]?.id || '', 'preferred');
