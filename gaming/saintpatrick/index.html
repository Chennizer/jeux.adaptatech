<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Saint Patrick Mini Games (Switch)</title>
  <style>
    html, body{
      margin:0; padding:0; width:100%; height:100%;
      overflow:hidden; background:#07140b;
      touch-action:none; user-select:none; -webkit-user-select:none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    canvas{ display:block; }

    #overlay, #phaseBanner{
      position:fixed; inset:0;
      display:grid; place-items:center;
      z-index:10; padding:22px; text-align:center;
    }

    #overlay{ background:rgba(0,0,0,0.70); }

    #phaseBanner{
      pointer-events:none;
      background:rgba(0,0,0,0.32);
      opacity:0;
      transition:opacity 280ms ease;
      z-index:9;
    }

    #phaseBanner.visible{ opacity:1; }

    #phaseText{
      width:min(760px, 94vw);
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.18);
      border-radius:18px;
      padding:16px;
      color:#fff;
      box-shadow:0 14px 50px rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      font-weight:700;
      letter-spacing:0.3px;
    }

    #panel{
      width:min(680px, 92vw);
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.18);
      border-radius:18px;
      padding:16px 16px 14px;
      box-shadow:0 14px 50px rgba(0,0,0,0.5);
      color:rgba(255,255,255,0.92);
      backdrop-filter: blur(4px);
    }

    #panel h1{ margin:0 0 10px; font-size:20px; font-weight:750; }
    #panel p{ margin:0 0 14px; font-size:14px; line-height:1.35; color:rgba(255,255,255,0.78); }
    .btnrow{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }

    button{
      appearance:none;
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.92);
      padding:10px 14px;
      border-radius:14px;
      font-size:14px;
      cursor:pointer;
      transition:transform 80ms ease, background 120ms ease;
    }

    button:hover{ background:rgba(255,255,255,0.16); }
    button:active{ transform:translateY(1px) scale(0.99); }
    .hint{ margin-top:10px; font-size:12px; color:rgba(255,255,255,0.62); }
  </style>
</head>

<body>
  <div id="overlay" role="dialog" aria-modal="true">
    <div id="panel">
      <h1>Saint Patrick Mini Games</h1>
      <p>
        3 short games in a row: <b>clovers</b>, <b>rainbow gems</b>, and <b>gold coins</b>.<br>
        Press <b>Space</b> (switch) to pop/collect the closest target, or tap/click directly.
      </p>
      <div class="btnrow">
        <button id="startBtn" type="button">Start</button>
        <button id="fsBtn" type="button">Fullscreen</button>
      </div>
      <div class="hint">Tip: Space also starts the game.</div>
    </div>
  </div>

  <div id="phaseBanner" aria-hidden="true">
    <div id="phaseText"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>

  <script>
    const CFG = {
      cloverCount: 13,
      spawnRatePerSec: 2.2,
      maxTargets: 28,
      minScale: 0.22,
      maxScale: 0.52,
      fallSpeedMin: 1.0,
      fallSpeedMax: 2.8,
      driftMax: 0.55,
      spinMax: 0.018,
      hitRadiusBoost: 1.25,
      flashSeconds: 0.35,
      rippleSeconds: 1.15,
      particlesPerHit: 38,
      reduceMotion: false,
      phasePopGoal: 12
    };

    const PHASES = [
      { id:'clover', title:'Phase 1/3 • Pop the Clovers', colorHue:120 },
      { id:'rainbow', title:'Phase 2/3 • Catch Rainbow Gems', colorHue:300 },
      { id:'gold', title:'Phase 3/3 • Collect Gold Coins', colorHue:44 }
    ];

    let audioCtx=null, masterGain=null, audioEnabled=false;
    function ensureAudio(){
      if (audioEnabled) return true;
      try{
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.24;
        masterGain.connect(audioCtx.destination);
        audioEnabled = true;
        return true;
      }catch(e){ audioEnabled=false; return false; }
    }

    function playPopSound(intensity=1, bright=0){
      if (!audioEnabled || !audioCtx) return;
      const t0 = audioCtx.currentTime;
      const dur = 0.08 + 0.05*intensity;

      const osc1 = audioCtx.createOscillator(); osc1.type = bright > 0.5 ? 'triangle' : 'sine';
      const osc2 = audioCtx.createOscillator(); osc2.type = bright > 0.5 ? 'square' : 'triangle';
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime((0.14 + bright*0.04) * intensity, t0+0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);

      const base = 460 + Math.random()*300 + bright*220;
      osc1.frequency.setValueAtTime(base, t0);
      osc1.frequency.exponentialRampToValueAtTime(base*0.62, t0+dur);
      osc2.frequency.setValueAtTime(base*1.15, t0);
      osc2.frequency.exponentialRampToValueAtTime(base*0.70, t0+dur);

      osc1.connect(g); osc2.connect(g); g.connect(masterGain);
      osc1.start(t0); osc2.start(t0);
      osc1.stop(t0+dur+0.02); osc2.stop(t0+dur+0.02);
    }

    let started=false;
    let targets=[], particles=[], ripples=[];
    let flashHue=120, flashT=10;
    let pointerX=0, pointerY=0;
    let lastMs=0, spawnAcc=0;
    let bgGfx=null;
    let bgSeed=Math.random()*10000;

    let phaseIndex=0;
    let phaseHits=0;

    class FallingTarget{
      constructor(kind, x,y,s,vy,vx,rot,rv){
        this.kind=kind;
        this.x=x; this.y=y; this.s=s;
        this.vy=vy; this.vx=vx;
        this.rot=rot; this.rv=rv;
        this.wob=Math.random()*1000;
        this.rainbowHue=Math.random()*360;
      }

      radius(){ return min(width,height)*0.12*this.s; }

      update(dt){
        const sp = CFG.reduceMotion ? 0.65 : 1;
        const t = millis()*0.001;
        const wob = Math.sin(t*1.2 + this.wob) * 0.35 * sp;
        this.x += (this.vx + wob) * dt;
        this.y += this.vy * dt * sp;
        this.rot += this.rv * dt * sp;

        const r=this.radius();
        if (this.y - r > height + 60){
          this.y = -r - 60;
          this.x = random(r, width-r);
          this.vy = random(CFG.fallSpeedMin, CFG.fallSpeedMax);
          this.vx = random(-CFG.driftMax, CFG.driftMax);
          this.rv = random(-CFG.spinMax, CFG.spinMax);
        }
        if (this.x < -r) this.x = width + r;
        if (this.x > width + r) this.x = -r;
      }

      contains(px,py){ return dist(px,py,this.x,this.y) <= this.radius()*CFG.hitRadiusBoost; }

      draw(){
        push();
        translate(this.x,this.y);
        rotate(this.rot);
        const rr=this.radius();
        noStroke();

        if (this.kind === 'clover'){
          fill(120, 52, 82, 0.13);
          ellipse(0,0, rr*2.6, rr*2.1);
          drawClover(rr);
        } else if (this.kind === 'rainbow'){
          fill(this.rainbowHue, 40, 95, 0.18);
          ellipse(0, 0, rr*2.8, rr*2.3);
          drawRainbowGem(rr, this.rainbowHue);
        } else {
          fill(44, 72, 95, 0.16);
          ellipse(0,0, rr*2.8, rr*2.3);
          drawCoin(rr);
        }

        pop();
      }
    }

    class Particle{
      constructor(x,y,hue){
        this.x=x; this.y=y;
        const a=Math.random()*TWO_PI;
        const sp=2.5+Math.random()*9;
        this.vx=Math.cos(a)*sp;
        this.vy=Math.sin(a)*sp;
        this.life=1;
        this.hue=hue;
        this.size=2.5+Math.random()*7;
      }
      update(dt){
        const sp = CFG.reduceMotion ? 0.7 : 1;
        this.x += this.vx*dt*0.95*sp;
        this.y += this.vy*dt*0.95*sp;
        this.vx *= 0.98; this.vy *= 0.98;
        this.vy += 0.03*dt;
        this.life -= 0.02*dt;
      }
      draw(){
        if (this.life<=0) return;
        noStroke();
        fill(this.hue, 60, 98, constrain(this.life,0,1)*0.9);
        ellipse(this.x,this.y,this.size,this.size);
      }
    }

    class Ripple{
      constructor(x,y,hue){ this.x=x; this.y=y; this.hue=hue; this.t=0; }
      update(dt){ this.t += dt/60; }
      draw(){
        const p=constrain(this.t/CFG.rippleSeconds,0,1);
        if (p>=1) return;
        const rr=lerp(0, max(width,height)*0.85, p);
        const a=(1-p)*0.55;
        noFill();
        stroke(this.hue, 45, 100, a);
        strokeWeight(6*(1-p)+1);
        ellipse(this.x,this.y, rr*2, rr*2);
      }
      done(){ return this.t>=CFG.rippleSeconds; }
    }

    function setup(){
      createCanvas(window.innerWidth, window.innerHeight);
      colorMode(HSB, 360, 100, 100, 1);
      cursor();
      buildCleanSceneBackground();
      resetPhase(0);
      pointerX = width*0.5;
      pointerY = height*0.6;
      lastMs = millis();
    }

    function windowResized(){
      resizeCanvas(window.innerWidth, window.innerHeight);
      buildCleanSceneBackground();
      resetPhase(phaseIndex, { keepBanner: true });
    }

    function smoothArray(arr, passes=2){
      const out = arr.slice();
      for (let p=0;p<passes;p++){
        for (let i=1;i<out.length-1;i++) out[i] = (out[i-1] + out[i] + out[i+1]) / 3;
      }
      return out;
    }

    function buildCleanSceneBackground(){
      const w=width, h=height;
      bgGfx = createGraphics(w, h);
      bgGfx.colorMode(HSB, 360, 100, 100, 1);
      bgGfx.noStroke();

      for (let y=0;y<h;y++){
        const t = y/h;
        const hue = lerp(205, 175, pow(t, 1.05));
        const sat = lerp(65, 35, t);
        const bri = lerp(45, 92, pow(t, 1.25));
        bgGfx.stroke(hue, sat, bri, 1);
        bgGfx.line(0, y, w, y);
      }
      bgGfx.noStroke();

      const sunX = w*0.78, sunY = h*0.18;
      bgGfx.fill(50, 22, 100, 1);
      bgGfx.ellipse(sunX, sunY, w*0.055, w*0.055);
      for (let i=0;i<28;i++){
        const r = i/28;
        const a = 0.16*(1-r);
        bgGfx.fill(50, 25, 100, a);
        bgGfx.ellipse(sunX, sunY, r*w*0.36, r*w*0.36);
      }

      function drawCloud(cx, cy, s){
        bgGfx.push();
        bgGfx.translate(cx, cy);
        bgGfx.scale(s);
        bgGfx.fill(0, 0, 100, 0.95);
        bgGfx.ellipse(0, 0, 230, 86);
        bgGfx.ellipse(-78, -18, 130, 98);
        bgGfx.ellipse(6, -40, 150, 118);
        bgGfx.ellipse(92, -14, 132, 100);
        bgGfx.fill(45, 8, 96, 0.55);
        bgGfx.ellipse(0, 12, 220, 66);
        bgGfx.pop();
      }

      [{x:w*0.20, y:h*0.18, s:0.78},{x:w*0.44, y:h*0.12, s:0.62},{x:w*0.60, y:h*0.22, s:0.84},{x:w*0.84, y:h*0.14, s:0.70}]
        .forEach(c => drawCloud(c.x, c.y, c.s));

      function drawHillLayer(opts){
        const { baseY, amp, freq, hue, sat, bri, step, texDensity, texBriJitter, smoothPasses } = opts;
        const xs = [], ys = [];
        for (let x=0; x<=w; x+=step){
          xs.push(x);
          const n = noise(bgSeed + x*freq, baseY*0.01);
          ys.push(baseY - (n-0.5)*2*amp);
        }

        const ysSmooth = smoothArray(ys, smoothPasses);
        bgGfx.fill(hue, sat, bri, 1);
        bgGfx.beginShape();
        bgGfx.vertex(0, h);
        for (let i=0;i<xs.length;i++) bgGfx.vertex(xs[i], ysSmooth[i]);
        bgGfx.vertex(w, h);
        bgGfx.endShape(CLOSE);

        bgGfx.stroke(hue, max(0, sat-25), min(100, bri+16), 0.35);
        bgGfx.strokeWeight(2);
        bgGfx.noFill();
        bgGfx.beginShape();
        for (let i=0;i<xs.length;i++) bgGfx.vertex(xs[i], ysSmooth[i] + 1.5);
        bgGfx.endShape();
        bgGfx.noStroke();

        const texCount = Math.floor(w*h*texDensity);
        for (let i=0;i<texCount;i++){
          const x = random(w);
          const idx = Math.floor((x / w) * (ysSmooth.length-1));
          const ridgeY = ysSmooth[idx];
          const y = random(ridgeY + 6, h);
          const t = (y - ridgeY) / (h - ridgeY + 0.0001);
          const dotSize = random(1.0, 2.2) * (0.55 + 0.75*t);
          const localBri = bri - (5 + random()*texBriJitter) * t;
          bgGfx.fill(hue + random(-2,2), sat + random(-5,4), localBri, 0.24);
          bgGfx.ellipse(x, y, dotSize, dotSize);
        }
      }

      drawHillLayer({ baseY:h*0.55, amp:h*0.055, freq:0.0016, hue:135, sat:28, bri:58, step:14, texDensity:0.000010, texBriJitter:10, smoothPasses:4 });
      drawHillLayer({ baseY:h*0.67, amp:h*0.095, freq:0.0022, hue:122, sat:48, bri:52, step:12, texDensity:0.000016, texBriJitter:12, smoothPasses:4 });
      drawHillLayer({ baseY:h*0.83, amp:h*0.155, freq:0.0028, hue:112, sat:72, bri:48, step:10, texDensity:0.000020, texBriJitter:14, smoothPasses:5 });
    }

    function drawClover(rr){
      fill(118, 72, 58, 1);
      for (let i=0;i<4;i++){
        const a = i * HALF_PI;
        ellipse(Math.cos(a)*rr*0.42, Math.sin(a)*rr*0.42, rr*0.94, rr*0.88);
      }
      fill(118, 65, 72, 0.75);
      ellipse(0,0, rr*0.72, rr*0.68);
      stroke(90, 60, 45, 1);
      strokeWeight(max(1.2, rr*0.08));
      line(rr*0.02, rr*0.38, rr*0.55, rr*1.06);
      noStroke();
    }

    function drawRainbowGem(rr, hueSeed){
      const bands = [0, 30, 55, 120, 200, 260, 320];
      for (let i=0;i<bands.length;i++){
        const ring = (i+1)/bands.length;
        fill((bands[i] + hueSeed*0.16) % 360, 85, 95, 0.95);
        ellipse(0,0, rr*1.9*(1.1-ring*0.11), rr*1.9*(1.1-ring*0.11));
      }
      fill(0,0,100,0.45);
      ellipse(-rr*0.25, -rr*0.25, rr*0.65, rr*0.45);
    }

    function drawCoin(rr){
      fill(46, 82, 97, 1);
      ellipse(0,0, rr*1.9, rr*1.9);
      fill(42, 70, 86, 1);
      ellipse(0,0, rr*1.42, rr*1.42);
      fill(50, 36, 100, 0.35);
      ellipse(-rr*0.16, -rr*0.16, rr*0.85, rr*0.6);
      stroke(44, 88, 58, 0.55);
      strokeWeight(max(1.1, rr*0.07));
      line(-rr*0.36, 0, rr*0.36, 0);
      line(0, -rr*0.36, 0, rr*0.36);
      noStroke();
    }

    function getPhase(){ return PHASES[phaseIndex] || PHASES[0]; }

    function resetPhase(index, options={}){
      phaseIndex = constrain(index, 0, PHASES.length - 1);
      phaseHits = 0;
      targets = [];
      for (let i=0;i<CFG.cloverCount;i++) targets.push(makeTarget(random(-height, 0)));
      particles=[]; ripples=[];
      flashT=10; spawnAcc=0;
      if (!options.keepBanner) showPhaseBanner(getPhase().title);
    }

    function makeTarget(yOverride=null){
      const s = random(CFG.minScale, CFG.maxScale);
      const vy = random(CFG.fallSpeedMin, CFG.fallSpeedMax);
      const vx = random(-CFG.driftMax, CFG.driftMax);
      const rot = random(TWO_PI);
      const rv  = random(-CFG.spinMax, CFG.spinMax);
      const r = min(width,height)*0.12*s;
      const x = random(r, width-r);
      const y = (yOverride!==null) ? yOverride : random(-height, -60);
      return new FallingTarget(getPhase().id, x,y,s,vy,vx,rot,rv);
    }

    function pickBestTarget(){
      if (!targets.length) return null;
      for (const t of targets) if (t.contains(pointerX, pointerY)) return t;
      let best=targets[0];
      let bestD=dist(pointerX,pointerY,best.x,best.y);
      for (const t of targets){
        const d=dist(pointerX,pointerY,t.x,t.y);
        if (d<bestD){ bestD=d; best=t; }
      }
      return bestD > min(width,height)*0.45 ? random(targets) : best;
    }

    function hitTarget(t){
      if (!t) return;
      const idx=targets.indexOf(t);
      if (idx>=0) targets.splice(idx,1);

      const phase = getPhase();
      flashHue = phase.colorHue;
      flashT = 0;
      phaseHits += 1;

      ripples.push(new Ripple(t.x, t.y, phase.colorHue));
      const n = CFG.reduceMotion ? Math.floor(CFG.particlesPerHit*0.65) : CFG.particlesPerHit;
      for (let i=0;i<n;i++) particles.push(new Particle(t.x, t.y, phase.colorHue + random(-16,16)));

      const intensity = constrain(map(t.s, CFG.minScale, CFG.maxScale, 0.9, 1.22), 0.8, 1.28);
      const bright = phase.id === 'gold' ? 0.7 : phase.id === 'rainbow' ? 1 : 0.3;
      playPopSound(intensity, bright);

      if (targets.length < CFG.maxTargets) setTimeout(()=>targets.push(makeTarget(random(-240,-60))), 120);

      if (phaseHits >= CFG.phasePopGoal){
        if (phaseIndex < PHASES.length - 1){
          resetPhase(phaseIndex + 1);
        } else {
          resetPhase(0);
          showPhaseBanner('Great! Starting again from clovers.');
        }
      }
    }

    function drawPhaseDecor(){
      const phase = getPhase();
      if (phase.id === 'rainbow'){
        push();
        translate(width*0.12, height*0.88);
        const radii = [0.52,0.47,0.42,0.37,0.32,0.27,0.22];
        const hues = [0, 28, 50, 116, 200, 255, 310];
        for (let i=0;i<radii.length;i++){
          noFill();
          stroke(hues[i], 80, 98, 0.78);
          strokeWeight(max(10, width*0.010));
          arc(0,0, width*radii[i], width*radii[i], PI, TWO_PI);
        }
        noStroke();
        fill(0,0,100,0.85);
        ellipse(-width*0.12, 0, width*0.12, width*0.07);
        ellipse(width*0.38, 0, width*0.12, width*0.07);
        pop();
      }

      if (phase.id === 'gold'){
        fill(44, 90, 95, 0.15);
        rect(0, height*0.84, width, height*0.16);
      }
    }

    function drawHud(){
      const phase = getPhase();
      fill(0,0,0,0.24);
      rect(14, 14, 300, 70, 14);
      fill(0,0,100,0.95);
      textSize(20);
      textAlign(LEFT, TOP);
      text(phase.title, 26, 24);
      textSize(17);
      text(`Score: ${phaseHits}/${CFG.phasePopGoal}`, 26, 52);
    }

    function draw(){
      const now=millis();
      let dt = (now-lastMs)/(1000/60);
      lastMs=now;
      dt = constrain(dt, 0.5, 2.5);

      image(bgGfx, 0, 0);
      drawPhaseDecor();

      spawnAcc += (dt/60) * CFG.spawnRatePerSec;
      if (spawnAcc >= 1){
        const k = floor(spawnAcc);
        spawnAcc -= k;
        for (let i=0;i<k;i++) if (targets.length < CFG.maxTargets) targets.push(makeTarget());
      }

      for (const t of targets) t.update(dt);
      for (const t of targets) t.draw();

      for (const r of ripples) r.update(dt);
      for (const r of ripples) r.draw();
      ripples = ripples.filter(r => !r.done());

      for (const p of particles) p.update(dt);
      for (const p of particles) p.draw();
      particles = particles.filter(p => p.life > 0);

      drawFlash(dt);
      drawHud();

      noFill();
      stroke(getPhase().colorHue, 40, 100, started ? 0.14 : 0.08);
      strokeWeight(2);
      ellipse(pointerX, pointerY, 30, 30);
    }

    function drawFlash(dt){
      const p = constrain(flashT/CFG.flashSeconds, 0, 1);
      if (p>=1) return;
      const a = (1-p)*0.24;
      noStroke();
      fill(flashHue, 55, 95, a);
      rect(0,0,width,height);
      flashT += dt/60;
    }

    function showPhaseBanner(text){
      const banner = document.getElementById('phaseBanner');
      const txt = document.getElementById('phaseText');
      txt.textContent = text;
      banner.classList.add('visible');
      clearTimeout(showPhaseBanner.hideTimer);
      showPhaseBanner.hideTimer = setTimeout(() => banner.classList.remove('visible'), 1000);
    }

    function keyPressed(){
      if (!started && (key===' ' || keyCode===ENTER)){
        startGame();
        return false;
      }
      if (key===' '){
        if (!audioEnabled) ensureAudio();
        hitTarget(pickBestTarget());
        return false;
      }
    }

    function mouseMoved(){ pointerX=mouseX; pointerY=mouseY; }
    function mouseDragged(){ pointerX=mouseX; pointerY=mouseY; }

    function mousePressed(){
      pointerX=mouseX; pointerY=mouseY;
      if (!audioEnabled) ensureAudio();
      hitTarget(pickBestTarget());
      return false;
    }

    function touchStarted(){
      if (touches && touches[0]){ pointerX=touches[0].x; pointerY=touches[0].y; }
      if (!audioEnabled) ensureAudio();
      hitTarget(pickBestTarget());
      return false;
    }

    function touchMoved(){
      if (touches && touches[0]){ pointerX=touches[0].x; pointerY=touches[0].y; }
      return false;
    }

    const overlay=document.getElementById('overlay');
    const startBtn=document.getElementById('startBtn');
    const fsBtn=document.getElementById('fsBtn');

    function startGame(){
      ensureAudio();
      overlay.style.display='none';
      started=true;
      pointerX=width*0.5;
      pointerY=height*0.6;
      showPhaseBanner(getPhase().title);
    }

    async function requestFullscreen(){
      const el=document.documentElement;
      try{
        if (!document.fullscreenElement && el.requestFullscreen) await el.requestFullscreen();
      }catch(_){ }
    }

    startBtn.addEventListener('click', ()=>{ startGame(); requestFullscreen(); });
    fsBtn.addEventListener('click', ()=>{ ensureAudio(); requestFullscreen(); });
    overlay.addEventListener('pointerdown', (e)=>{
      if (e.target.tagName.toLowerCase()==='button') return;
      startGame();
      requestFullscreen();
    }, {passive:true});

    window.setup=setup;
    window.draw=draw;
    window.windowResized=windowResized;
    window.keyPressed=keyPressed;
    window.mouseMoved=mouseMoved;
    window.mouseDragged=mouseDragged;
    window.mousePressed=mousePressed;
    window.touchStarted=touchStarted;
    window.touchMoved=touchMoved;
  </script>
</body>
</html>
