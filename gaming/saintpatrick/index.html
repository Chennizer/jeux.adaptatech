<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Saint Patrick Adventure (Switch)</title>
  <style>
    html, body{
      margin:0; padding:0; width:100%; height:100%;
      overflow:hidden; background:#07140b;
      touch-action:none; user-select:none; -webkit-user-select:none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    canvas{ display:block; }

    #overlay{
      position:fixed; inset:0;
      background:rgba(0,0,0,0.70);
      display:grid; place-items:center;
      z-index:10; padding:22px; text-align:center;
    }
    #panel{
      width:min(640px, 92vw);
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.18);
      border-radius:18px;
      padding:16px 16px 14px;
      box-shadow:0 14px 50px rgba(0,0,0,0.5);
      color:rgba(255,255,255,0.92);
      backdrop-filter: blur(4px);
    }
    #panel h1{ margin:0 0 10px; font-size:20px; font-weight:750; letter-spacing:0.2px; }
    #panel p{ margin:0 0 14px; font-size:14px; line-height:1.35; color:rgba(255,255,255,0.78); }
    .btnrow{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    button{
      appearance:none;
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.92);
      padding:10px 14px;
      border-radius:14px;
      font-size:14px;
      cursor:pointer;
      transition:transform 80ms ease, background 120ms ease;
    }
    button:hover{ background:rgba(255,255,255,0.16); }
    button:active{ transform:translateY(1px) scale(0.99); }
    .hint{ margin-top:10px; font-size:12px; color:rgba(255,255,255,0.62); }
  </style>
</head>

<body>
  <div id="overlay" role="dialog" aria-modal="true">
    <div id="panel">
      <h1>Saint Patrick Adventure</h1>
      <p>
        Press <b>Space</b> (switch) to pop items. You can also tap/click.
        Play 3 phases in sequence: clovers, rainbow drops, then gold coins.
        This screen appears once to enable sound and fullscreen.
      </p>
      <div class="btnrow">
        <button id="startBtn" type="button">Start</button>
        <button id="fsBtn" type="button">Fullscreen</button>
      </div>
      <div class="hint">Tip: Space starts and plays. Each phase advances automatically after enough pops.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>

  <script>
    /******************************************************************
     * Saint Patrick multi-phase game:
     * 1) Pop clovers
     * 2) Pop rainbow drops
     * 3) Pop gold coins
     ******************************************************************/

    // ===== CONFIG =====
    const CFG = {
      cloverImgPath: "../../images/arthur.jpg",
      hitRadiusBoost: 1.25,
      flashSeconds: 0.35,
      rippleSeconds: 1.15,
      particlesPerPop: 46,
      reduceMotion: false
    };

    const PHASES = [
      { id:'clover', title:'Clover Rain', hue:118, spawnRate:2.0, maxItems:26, startCount:14, goal:16 },
      { id:'rainbow', title:'Rainbow Drops', hue:285, spawnRate:2.3, maxItems:24, startCount:12, goal:16 },
      { id:'gold', title:'Gold Coins', hue:46, spawnRate:2.6, maxItems:25, startCount:13, goal:18 }
    ];

    // ===== AUDIO (simple procedural pop) =====
    let audioCtx=null, masterGain=null, audioEnabled=false;
    function ensureAudio(){
      if (audioEnabled) return true;
      try{
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.24;
        masterGain.connect(audioCtx.destination);
        audioEnabled = true;
        return true;
      }catch(e){ audioEnabled=false; return false; }
    }
    function playPopSound(intensity=1){
      if (!audioEnabled || !audioCtx) return;
      const t0 = audioCtx.currentTime;
      const dur = 0.10 + 0.05*intensity;

      const osc1 = audioCtx.createOscillator(); osc1.type="sine";
      const osc2 = audioCtx.createOscillator(); osc2.type="triangle";
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.17*intensity, t0+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);

      const base = 560 + Math.random()*320;
      osc1.frequency.setValueAtTime(base, t0);
      osc1.frequency.exponentialRampToValueAtTime(base*0.55, t0+dur);
      osc2.frequency.setValueAtTime(base*0.78, t0);
      osc2.frequency.exponentialRampToValueAtTime(base*0.45, t0+dur);

      osc1.connect(g); osc2.connect(g); g.connect(masterGain);

      const noiseDur=0.03;
      const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate*noiseDur));
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
      const noise = audioCtx.createBufferSource(); noise.buffer = buffer;

      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.001, t0);
      ng.gain.exponentialRampToValueAtTime(0.07*intensity, t0+0.002);
      ng.gain.exponentialRampToValueAtTime(0.0001, t0+noiseDur);
      noise.connect(ng); ng.connect(masterGain);

      osc1.start(t0); osc2.start(t0); noise.start(t0);
      osc1.stop(t0+dur+0.02);
      osc2.stop(t0+dur+0.02);
      noise.stop(t0+noiseDur+0.01);
    }

    // ===== STATE =====
    let cloverImg=null;
    let started=false;

    let items=[], particles=[], ripples=[];
    let flashHue=120, flashT=10;
    let pointerX=0, pointerY=0;

    let stageIndex=0, stagePops=0, stageBannerT=0;
    let lastMs=0, spawnAcc=0;

    // background graphics (static scene)
    let bgGfx=null;
    let bgSeed=Math.random()*10000;

    class FallingItem{
      constructor(type,x,y,s,vy,vx,rot,rv){ this.type=type; this.x=x; this.y=y; this.s=s; this.vy=vy; this.vx=vx; this.rot=rot; this.rv=rv; this.wob=Math.random()*1000; this.colorIndex=Math.floor(random(6)); }
      radius(){ return min(width,height)*(this.type==='gold' ? 0.10 : 0.12)*this.s; }
      update(dt){
        const sp = CFG.reduceMotion ? 0.6 : 1.0;
        const t = millis()*0.001;
        const wob = Math.sin(t*1.2 + this.wob) * 0.35 * sp;
        this.x += (this.vx + wob) * dt;
        this.y += this.vy * dt * sp;
        this.rot += this.rv * dt * sp;

        const r=this.radius();
        if (this.y - r > height + 60){
          this.y = -r - 60;
          this.x = random(r, width-r);
          this.vy = random(1.0, this.type==='gold' ? 3.2 : 2.8);
          this.vx = random(-0.55, 0.55);
          this.rv = random(-0.018, 0.018);
        }
        if (this.x < -r) this.x = width + r;
        if (this.x > width + r) this.x = -r;
      }
      contains(px,py){ return dist(px,py,this.x,this.y) <= this.radius()*CFG.hitRadiusBoost; }
      draw(){
        push();
        translate(this.x,this.y);
        rotate(this.rot);
        const rr=this.radius();
        noStroke();
        if (this.type==='clover' && cloverImg){
          fill(120, 55, 85, 0.10);
          ellipse(0,0, rr*2.6, rr*2.1);
          imageMode(CENTER);
          image(cloverImg, 0,0, rr*2.0,rr*2.0);
        } else if (this.type==='rainbow'){
          const stripes = [0, 34, 60, 120, 210, 280];
          fill(0, 0, 100, 0.16);
          ellipse(0,0, rr*2.9, rr*2.9);
          for (let i=0;i<stripes.length;i++){
            fill(stripes[(i + this.colorIndex)%stripes.length], 85, 95, 0.95);
            arc(0,0, rr*2.0, rr*2.0, -HALF_PI + i*(TWO_PI/6), -HALF_PI + (i+1)*(TWO_PI/6), PIE);
          }
          fill(0,0,100,0.9);
          ellipse(-rr*0.2,-rr*0.25, rr*0.5, rr*0.35);
        } else {
          fill(44, 86, 100, 0.20);
          ellipse(0,0, rr*2.8, rr*2.8);
          fill(45, 82, 98, 1);
          ellipse(0,0, rr*2.0, rr*2.0);
          fill(38, 58, 82, 1);
          ellipse(0,0, rr*1.55, rr*1.55);
          stroke(50, 20, 100, 0.7);
          strokeWeight(max(1, rr*0.08));
          line(0, -rr*0.6, 0, rr*0.6);
          noStroke();
          fill(48, 18, 100, 0.85);
          textAlign(CENTER, CENTER);
          textSize(rr*0.95);
          text('€', 0, rr*0.06);
        }
        pop();
      }
    }

    class Particle{
      constructor(x,y,hue){ this.x=x; this.y=y; const a=Math.random()*TWO_PI; const sp=2.5+Math.random()*9; this.vx=Math.cos(a)*sp; this.vy=Math.sin(a)*sp; this.life=1; this.hue=hue; this.size=2.5+Math.random()*7; }
      update(dt){ const sp = CFG.reduceMotion ? 0.7 : 1.0; this.x += this.vx*dt*0.95*sp; this.y += this.vy*dt*0.95*sp; this.vx *= 0.98; this.vy *= 0.98; this.vy += 0.03*dt; this.life -= 0.02*dt; }
      draw(){ if (this.life<=0) return; noStroke(); fill(this.hue, 60, 98, constrain(this.life,0,1)*0.9); ellipse(this.x,this.y,this.size,this.size); }
    }

    class Ripple{
      constructor(x,y,hue){ this.x=x; this.y=y; this.hue=hue; this.t=0; }
      update(dt){ this.t += dt/60; }
      draw(){ const p=constrain(this.t/CFG.rippleSeconds,0,1); if (p>=1) return; const rr=lerp(0, max(width,height)*0.85, p); const a=(1-p)*0.55; noFill(); stroke(this.hue, 45, 100, a); strokeWeight(6*(1-p)+1); ellipse(this.x,this.y, rr*2, rr*2); }
      done(){ return this.t>=CFG.rippleSeconds; }
    }

    // ===== p5 preload/setup =====
    function preload(){ cloverImg = loadImage(CFG.cloverImgPath); }

    function setup(){
      createCanvas(window.innerWidth, window.innerHeight);
      colorMode(HSB, 360, 100, 100, 1);
      cursor();

      buildCleanSceneBackground();
      resetStageObjects();

      pointerX = width*0.5;
      pointerY = height*0.6;
      lastMs = millis();
    }

    function windowResized(){
      resizeCanvas(window.innerWidth, window.innerHeight);
      buildCleanSceneBackground();
      resetStageObjects();
    }

// ===== BACKGROUND =====
    function smoothArray(arr, passes=2){
      // simple neighbor averaging smoothing
      const out = arr.slice();
      for (let p=0;p<passes;p++){
        for (let i=1;i<out.length-1;i++){
          out[i] = (out[i-1] + out[i] + out[i+1]) / 3;
        }
      }
      return out;
    }

    function buildCleanSceneBackground(){
      const w=width, h=height;
      bgGfx = createGraphics(w, h);
      bgGfx.colorMode(HSB, 360, 100, 100, 1);
      bgGfx.noStroke();

      // --- SKY: brighter clear blue -> warm light near horizon
      for (let y=0;y<h;y++){
        const t = y/h;
        const hue = lerp(205, 175, pow(t, 1.05));  // clear blue -> teal-ish
        const sat = lerp(65, 35, t);
        const bri = lerp(45, 92, pow(t, 1.25));    // brighter overall
        bgGfx.stroke(hue, sat, bri, 1);
        bgGfx.line(0, y, w, y);
      }
      bgGfx.noStroke();

      // --- SUN: clean disk + small halo
      const sunX = w*0.78, sunY = h*0.18;
      bgGfx.fill(50, 22, 100, 1);
      bgGfx.ellipse(sunX, sunY, w*0.055, w*0.055);
      for (let i=0;i<28;i++){
        const r = i/28;
        const a = 0.16*(1-r);
        bgGfx.fill(50, 25, 100, a);
        bgGfx.ellipse(sunX, sunY, r*w*0.36, r*w*0.36);
      }

      // --- CLOUDS: cleaner, slightly warmer whites
      function drawCloud(cx, cy, s){
        bgGfx.push();
        bgGfx.translate(cx, cy);
        bgGfx.scale(s);

        bgGfx.noStroke();
        bgGfx.fill(0, 0, 100, 0.95);
        bgGfx.ellipse(0, 0, 230, 86);
        bgGfx.ellipse(-78, -18, 130, 98);
        bgGfx.ellipse(  6, -40, 150, 118);
        bgGfx.ellipse( 92, -14, 132, 100);

        // gentle underside shade (still quite opaque)
        bgGfx.fill(45, 8, 96, 0.55);
        bgGfx.ellipse(0, 12, 220, 66);

        bgGfx.pop();
      }

      const clouds = [
        {x:w*0.20, y:h*0.18, s:0.78},
        {x:w*0.44, y:h*0.12, s:0.62},
        {x:w*0.60, y:h*0.22, s:0.84},
        {x:w*0.84, y:h*0.14, s:0.70}
      ];
      for (const c of clouds) drawCloud(c.x, c.y, c.s);

      // --- HILLS: smoother, rounder silhouettes (lower freq + smoothing)
      function drawHillLayer(opts){
        const { baseY, amp, freq, hue, sat, bri, step, texDensity, texBriJitter, smoothPasses } = opts;

        const xs = [];
        const ys = [];
        for (let x=0; x<=w; x+=step){
          xs.push(x);
          // Use noise at lower frequency for round hills
          const n = noise(bgSeed + x*freq, baseY*0.01);
          const yy = baseY - (n-0.5)*2*amp;
          ys.push(yy);
        }

        const ysSmooth = smoothArray(ys, smoothPasses);

        // fill hill
        bgGfx.noStroke();
        bgGfx.fill(hue, sat, bri, 1);
        bgGfx.beginShape();
        bgGfx.vertex(0, h);
        for (let i=0;i<xs.length;i++) bgGfx.vertex(xs[i], ysSmooth[i]);
        bgGfx.vertex(w, h);
        bgGfx.endShape(CLOSE);

        // ridge highlight (slightly brighter)
        bgGfx.stroke(hue, max(0, sat-25), min(100, bri+16), 0.35);
        bgGfx.strokeWeight(2);
        bgGfx.noFill();
        bgGfx.beginShape();
        for (let i=0;i<xs.length;i++) bgGfx.vertex(xs[i], ysSmooth[i] + 1.5);
        bgGfx.endShape();
        bgGfx.noStroke();

        // texture: subtle dots + swaths, but keep it clean and opaque-ish
        const texCount = Math.floor(w*h*texDensity);
        for (let i=0;i<texCount;i++){
          const x = random(w);
          const idx = Math.floor((x / w) * (ysSmooth.length-1));
          const ridgeY = ysSmooth[idx];
          const y = random(ridgeY + 6, h);
          const t = (y - ridgeY) / (h - ridgeY + 0.0001);
          const dotSize = random(1.0, 2.2) * (0.55 + 0.75*t);
          const localBri = bri - (5 + random()*texBriJitter) * t;
          bgGfx.fill(hue + random(-2,2), sat + random(-5,4), localBri, 0.24);
          bgGfx.ellipse(x, y, dotSize, dotSize);
        }

        const swaths = 9;
        for (let i=0;i<swaths;i++){
          const x = random(w);
          const idx = Math.floor((x / w) * (ysSmooth.length-1));
          const ridgeY = ysSmooth[idx];
          const y = random(ridgeY + 22, h);
          const ww = random(w*0.14, w*0.30);
          const hh = random(h*0.03, h*0.085);
          bgGfx.fill(hue, sat, bri - random(3,7), 0.10);
          bgGfx.ellipse(x, y, ww, hh);
        }
      }

      // far hills (brighter green-blue, less saturated)
      drawHillLayer({
        baseY: h*0.55, amp: h*0.055, freq: 0.0016, // lower freq
        hue: 135, sat: 28, bri: 58,
        step: 14, texDensity: 0.000010, texBriJitter: 10,
        smoothPasses: 4
      });

      // mid hills (clearer green)
      drawHillLayer({
        baseY: h*0.67, amp: h*0.095, freq: 0.0022,
        hue: 122, sat: 48, bri: 52,
        step: 12, texDensity: 0.000016, texBriJitter: 12,
        smoothPasses: 4
      });

      // near meadow (vivid green)
      drawHillLayer({
        baseY: h*0.83, amp: h*0.155, freq: 0.0028,
        hue: 112, sat: 72, bri: 48,
        step: 10, texDensity: 0.000020, texBriJitter: 14,
        smoothPasses: 5
      });

      // foreground grass strokes (a bit brighter)
      bgGfx.stroke(112, 55, 58, 0.16);
      bgGfx.strokeWeight(1);
      const blades = Math.floor(w*h*0.00022);
      for (let i=0;i<blades;i++){
        const x = random(w);
        const y = random(h*0.72, h);
        const t = (y - h*0.72)/(h*0.28);
        const len = (8 + random()*22) * (0.5 + t);
        bgGfx.line(x, y, x + random(-2,2), y - len);
      }
      bgGfx.noStroke();

      // subtle vignette (lighter)
      for (let i=0;i<9;i++){
        const r=i/9;
        bgGfx.fill(0,0,0, 0.04*r);
        const m = i*22;
        bgGfx.rect(m, m, w-m*2, h-m*2, 60);
      }
    }

    // ===== GAME LOGIC =====
    function currentPhase(){ return PHASES[stageIndex % PHASES.length]; }

    function makeItem(type, yOverride=null){
      const s = random(0.22, type==='gold' ? 0.50 : 0.56);
      const vy = random(1.0, type==='gold' ? 3.2 : 2.8);
      const vx = random(-0.55, 0.55);
      const rot = random(TWO_PI);
      const rv  = random(-0.018, 0.018);
      const r = min(width,height)*(type==='gold' ? 0.10 : 0.12)*s;
      const x = random(r, width-r);
      const y = (yOverride!==null) ? yOverride : random(-height, -60);
      return new FallingItem(type,x,y,s,vy,vx,rot,rv);
    }

    function resetStageObjects(){
      const phase = currentPhase();
      items=[];
      for (let i=0;i<phase.startCount;i++) items.push(makeItem(phase.id, random(-height, 0)));
      particles=[];
      ripples=[];
      flashT=10;
      spawnAcc=0;
    }

    function pickBestItem(){
      if (!items.length) return null;
      for (const c of items) if (c.contains(pointerX, pointerY)) return c;

      let best=items[0];
      let bestD=dist(pointerX,pointerY,best.x,best.y);
      for (const c of items){
        const d=dist(pointerX,pointerY,c.x,c.y);
        if (d<bestD){ bestD=d; best=c; }
      }
      if (bestD > min(width,height)*0.45) return random(items);
      return best;
    }

    function advancePhase(){
      stageIndex = (stageIndex + 1) % PHASES.length;
      stagePops = 0;
      stageBannerT = 2.4;
      resetStageObjects();
    }

    function popItem(c){
      if (!c) return;
      const idx=items.indexOf(c);
      if (idx>=0) items.splice(idx,1);

      const phase = currentPhase();
      flashHue = phase.hue;
      flashT = 0;

      ripples.push(new Ripple(c.x, c.y, phase.hue));
      const n = CFG.reduceMotion ? Math.floor(CFG.particlesPerPop*0.65) : CFG.particlesPerPop;
      for (let i=0;i<n;i++) particles.push(new Particle(c.x,c.y, phase.hue + random(-12,12)));

      const intensity = constrain(map(c.s, 0.22, 0.56, 0.9, 1.2), 0.8, 1.25);
      playPopSound(intensity);

      stagePops += 1;
      if (stagePops >= phase.goal){
        advancePhase();
        return;
      }
      if (items.length < phase.maxItems){
        setTimeout(()=>items.push(makeItem(phase.id, random(-240,-60))), 120);
      }
    }

    function drawHud(dt){
      const phase = currentPhase();
      const remain = Math.max(0, phase.goal - stagePops);
      noStroke();
      fill(0,0,0,0.28);
      rect(14, 12, min(430, width-28), 58, 14);
      fill(0,0,100,0.94);
      textAlign(LEFT, TOP);
      textSize(18);
      text(`${phase.title} • Phase ${stageIndex+1}/3`, 26, 22);
      textSize(14);
      text(`Pops to next phase: ${remain}`, 26, 45);

      if (stageBannerT > 0){
        stageBannerT = Math.max(0, stageBannerT - dt/60);
        const a = constrain(stageBannerT/2.4, 0, 1);
        fill(phase.hue, 42, 100, 0.20*a);
        rect(0, 0, width, height);
        fill(0,0,100,a);
        textAlign(CENTER, CENTER);
        textSize(min(width*0.06, 48));
        text(phase.title, width*0.5, height*0.26);
      }
    }

    // ===== DRAW LOOP =====
    function draw(){
      const now=millis();
      let dt = (now-lastMs)/(1000/60);
      lastMs=now;
      dt = constrain(dt, 0.5, 2.5);

      image(bgGfx, 0, 0);

      const phase = currentPhase();
      spawnAcc += (dt/60) * phase.spawnRate;
      if (spawnAcc >= 1){
        const k = floor(spawnAcc);
        spawnAcc -= k;
        for (let i=0;i<k;i++) if (items.length < phase.maxItems) items.push(makeItem(phase.id));
      }

      for (const c of items) c.update(dt);
      for (const c of items) c.draw();

      for (const r of ripples) r.update(dt);
      for (const r of ripples) r.draw();
      ripples = ripples.filter(r => !r.done());

      for (const p of particles) p.update(dt);
      for (const p of particles) p.draw();
      particles = particles.filter(p => p.life > 0);

      drawFlash(dt);
      drawHud(dt);

      noFill();
      stroke(120, 40, 100, started ? 0.10 : 0.06);
      strokeWeight(2);
      ellipse(pointerX, pointerY, 30, 30);
    }

    function drawFlash(dt){
      const p = constrain(flashT/CFG.flashSeconds, 0, 1);
      if (p>=1) return;
      const a = (1-p)*0.24;
      noStroke();
      fill(flashHue, 55, 95, a);
      rect(0,0,width,height);
      flashT += dt/60;
    }

    // ===== INPUT =====
    function keyPressed(){
      if (!started && (key===' ' || keyCode===ENTER)){
        startGame();
        return false;
      }
      if (key===' '){
        if (!audioEnabled) ensureAudio();
        popItem(pickBestItem());
        return false;
      }
    }
    function mouseMoved(){ pointerX=mouseX; pointerY=mouseY; }
    function mouseDragged(){ pointerX=mouseX; pointerY=mouseY; }
    function mousePressed(){ pointerX=mouseX; pointerY=mouseY; if (!audioEnabled) ensureAudio(); popItem(pickBestItem()); return false; }
    function touchStarted(){ if (touches && touches[0]){ pointerX=touches[0].x; pointerY=touches[0].y; } if (!audioEnabled) ensureAudio(); popItem(pickBestItem()); return false; }
    function touchMoved(){ if (touches && touches[0]){ pointerX=touches[0].x; pointerY=touches[0].y; } return false; }

// ===== OVERLAY =====
    const overlay=document.getElementById('overlay');
    const startBtn=document.getElementById('startBtn');
    const fsBtn=document.getElementById('fsBtn');

    function startGame(){
      ensureAudio();
      overlay.style.display='none';
      started=true;
      stageIndex=0;
      stagePops=0;
      stageBannerT=2.2;
      resetStageObjects();
      pointerX=width*0.5; pointerY=height*0.6;
    }
    async function requestFullscreen(){
      const el=document.documentElement;
      try{
        if (!document.fullscreenElement && el.requestFullscreen) await el.requestFullscreen();
      }catch(_){}
    }
    startBtn.addEventListener('click', ()=>{ startGame(); requestFullscreen(); });
    fsBtn.addEventListener('click', ()=>{ ensureAudio(); requestFullscreen(); });
    overlay.addEventListener('pointerdown', (e)=>{
      if (e.target.tagName.toLowerCase()==='button') return;
      startGame(); requestFullscreen();
    }, {passive:true});

    // expose p5 hooks
    window.preload=preload;
    window.setup=setup;
    window.draw=draw;
    window.windowResized=windowResized;
    window.keyPressed=keyPressed;
    window.mouseMoved=mouseMoved;
    window.mouseDragged=mouseDragged;
    window.mousePressed=mousePressed;
    window.touchStarted=touchStarted;
    window.touchMoved=touchMoved;
  </script>
</body>
</html>
