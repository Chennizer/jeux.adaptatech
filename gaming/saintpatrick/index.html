<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title class="translate"
         data-fr="Mini-jeux Saint-Patrick (Switch)"
         data-en="Saint Patrick Mini Games (Switch)"
         data-ja="セント・パトリック ミニゲーム（スイッチ）">Saint Patrick Mini Games (Switch)</title>
  <style>
    html, body{
      margin:0; padding:0; width:100%; height:100%;
      overflow:hidden; background:#07140b;
      touch-action:none; user-select:none; -webkit-user-select:none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    canvas{ display:block; }

    #overlay{
      position:fixed; inset:0;
      background: rgba(18, 56, 24, 0.84);
      backdrop-filter: blur(8px);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:10; padding:22px; text-align:center;
    }
    #panel{
      width:min(640px, 92vw);
      background: rgba(214, 255, 214, 0.22);
      border: 2px solid rgba(143, 231, 143, 0.45);
      border-radius:18px;
      padding:16px 16px 14px;
      box-shadow: 0 14px 36px rgba(16, 88, 32, 0.35);
      color: #e9ffe8;
      backdrop-filter: blur(6px);
    }
    #panel h1{ margin:0 0 10px; font-size:20px; font-weight:750; letter-spacing:0.2px; color:#d6ffd0; }
    #panel p{ margin:0 0 14px; font-size:14px; line-height:1.35; color:#ecffe8; }
    .btnrow{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .modes{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:12px; }
    .modeBtn.active{ background:linear-gradient(135deg, #b8f17d, #57bf53); color:#113a12; font-weight:700; }
    button{
      appearance:none;
      border:1px solid rgba(154, 235, 147, 0.45);
      background:rgba(27, 107, 42, 0.45);
      color:#eaffea;
      padding:10px 14px;
      border-radius:14px;
      font-size:14px;
      cursor:pointer;
      transition:transform 80ms ease, background 120ms ease;
    }
    button:hover{ background:rgba(63, 145, 72, 0.65); }
    button:active{ transform:translateY(1px) scale(0.99); }

    #langToggle {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 12;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      border: 2px solid #9ae08b;
      background: rgba(14, 64, 24, 0.85);
      color: #eaffea;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
    }

    #settings-icon {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
      cursor: pointer;
      background-color: rgba(0,0,0,0.7);
      transition: transform 0.3s ease, background-color 0.3s ease;
      z-index: 1100;
    }
    #settings-icon:hover {
      transform: rotate(90deg);
      background-color: rgba(0,0,0,0.9);
    }

    #menu {
      position: fixed;
      top: 60px;
      right: -300px;
      width: 270px;
      background: rgba(0,0,0,0.85);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      transition: right 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      color: #fff;
      overflow-y: auto;
      max-height: calc(100vh - 80px);
      z-index: 2000;
    }
    #menu.show {
      right: 10px;
      opacity: 1;
    }
    #menu h2 {
      margin: 0 0 12px;
      color: #00bfff;
      font-size: 20px;
      font-weight: 500;
      text-align: center;
    }
    #menu label {
      display: flex;
      flex-direction: column;
      margin: 18px 0;
      font-size: 13px;
    }
    #menu label:hover { color: #00bfff; }
    #menu input[type="range"] { margin-top: 6px; }
  </style>
</head>

<body>
  <button id="langToggle" title="Changer de langue / Change language">EN</button>
  <div id="settings-icon" title="Settings" class="translate" data-fr="⚙️" data-en="⚙️" data-ja="⚙️">⚙️</div>
  <div id="menu">
    <h2 class="translate" data-fr="Options" data-en="Options" data-ja="オプション">Options</h2>

    <label>
      <span class="translate" data-fr="Délai entre appuis" data-en="Press delay" data-ja="押下間隔">Press delay</span>
      <span id="tapDelayVal">500</span>
      <input type="range" id="tapDelaySlider" min="100" max="5000" value="500">
    </label>

    <label>
      <span class="translate" data-fr="Volume sons" data-en="Sound volume" data-ja="効果音の音量">Sound volume</span>
      <span id="sfxVolVal">50</span>
      <input type="range" id="sfxVol" min="0" max="100" value="50">
    </label>

    <label>
      <span class="translate" data-fr="Volume musique" data-en="Music volume" data-ja="音楽の音量">Music volume</span>
      <span id="musicVolVal">30</span>
      <input type="range" id="musicVol" min="0" max="100" value="30">
    </label>
  </div>

  <div id="overlay" role="dialog" aria-modal="true">
    <div id="panel">
      <h1 class="translate"
          data-fr="Mini-jeux Saint-Patrick"
          data-en="Saint Patrick Mini Games"
          data-ja="セント・パトリック ミニゲーム">Saint Patrick Mini Games</h1>
      <p class="translate"
         data-fr="Mode standard&nbsp;: effets progressifs en plusieurs appuis.<br>Mode un appui&nbsp;: plus d'effets d'un coup."
         data-en="Standard mode: build effects over several presses.<br>One-press mode: more effects in one press."
         data-ja="標準モード：複数回の押下で効果が積み上がります。<br>ワンプレスモード：1回でより多くの効果が出ます。">
        Standard mode: build effects over several presses.
        One-press mode: more effects in one press.
      </p>
      <div class="modes">
        <button class="modeBtn active translate" data-mode="manual" type="button"
                data-fr="Mode standard"
                data-en="Standard mode"
                data-ja="標準モード">Standard mode</button>
        <button class="modeBtn translate" data-mode="single" type="button"
                data-fr="Mode un appui"
                data-en="One-press mode"
                data-ja="ワンプレスモード">One-press mode</button>
      </div>
      <div class="btnrow">
        <button id="startBtn" class="translate" type="button"
                data-fr="Commencer"
                data-en="Start"
                data-ja="開始">Start</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>

  <script>
    /******************************************************************
     * New requests applied:
     * - First game: fewer clovers, a bit bigger
     * - First game: when popping, ALWAYS pop the LOWEST clover(s)
     * - Pop animation: more impactful (more particles + streaks)
     ******************************************************************/

    // ===== CONFIG =====
    const CFG = {
      cloverImgPath: "../../images/stpatrick/clover.png",
      chestImgPath: "../../images/stpatrick/chest.png",
      leprechaunImgPath: "../../images/stpatrick/leprechaun.png",

      transitionSfxPath: "../../sounds/cartoon/transition1.mp3",

      // >>> First game tuning (fewer clovers overall)
      cloverCount: 9,          // was 14
      spawnRatePerSec: 1.2,    // was 2.0
      maxClovers: 18,          // was 26

      // >>> clovers a bit bigger (still ~2x vs original, slightly larger than previous)
      minScale: 0.52,          // was 0.44
      maxScale: 1.18,          // was 1.04

      fallSpeedMin: 1.0,
      fallSpeedMax: 2.8,
      driftMax: 0.55,
      spinMax: 0.018,
      hitRadiusBoost: 1.25,

      flashSeconds: 0.35,
      rippleSeconds: 1.15,

      // >>> stronger pop burst
      particlesPerPop: 110,    // was 46

      rainbowTarget: 7,
      cloverTarget: 16,
      coinTarget: 14,
      coinDropSeconds: 1.6,
      reduceMotion: false,

      coinRainbowScale: 1.5,

      rainbowSilhouetteAlpha: 0.06,
      rainbowSilhouetteSatMul: 0.55,
      rainbowSilhouetteBriMul: 0.90
    };

    const PHASES = [
      { key: 'clover', title: { fr: 'Pluie de trèfles', en: 'Clover Shower', ja: 'クローバーシャワー' }, target: CFG.cloverTarget },
      { key: 'rainbow', title: { fr: 'Arc-en-ciel', en: 'Rainbow Builder', ja: 'レインボービルダー' }, target: CFG.rainbowTarget },
      { key: 'coin', title: { fr: 'Ruée vers l\'or', en: 'Gold Coin Rush', ja: 'ゴールドコインラッシュ' }, target: CFG.coinTarget }
    ];

    const SFX_PATHS = {
      clover: '../../sounds/clovers.mp3',
      rainbow: '../../sounds/rainbow.mp3',
      coin: '../../sounds/coins.mp3',
      leprechaun: '../../sounds/easter/easterbunny1.mp3'
    };

    const MUSIC_PLAYLIST = [
      '../../songs/saintpatrick1.mp3',
      '../../songs/saintpatrick2.mp3',
      '../../songs/saintpatrick3.mp3'
    ];

    const LS_LANG_KEY = 'siteLanguage';
    const SUPPORTED_LANGS = ['en', 'ja', 'fr'];
    let currentLang = 'en';
    const BASE_SFX_VOLUME = 0.45;
    const BASE_TRANSITION_VOLUME = 0.55;
    const BASE_POP_GAIN = 0.24;

    // ===== AUDIO =====
    let audioCtx=null, masterGain=null, audioEnabled=false;

    function applyAudioSettings(){
      if (musicPlayer) musicPlayer.volume = musicVolume;
      Object.values(sfxPlayers).forEach((audio) => {
        audio.volume = BASE_SFX_VOLUME * sfxVolume;
      });
      if (transitionSfx) transitionSfx.volume = BASE_TRANSITION_VOLUME * sfxVolume;
      if (masterGain) masterGain.gain.value = BASE_POP_GAIN * sfxVolume;
    }

    function ensureAudio(){
      if (audioEnabled) return true;
      try{
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = BASE_POP_GAIN * sfxVolume;
        masterGain.connect(audioCtx.destination);
        audioEnabled = true;
        return true;
      }catch(e){ audioEnabled=false; return false; }
    }

    function playPopSound(intensity=1){
      if (!audioEnabled || !audioCtx) return;
      const t0 = audioCtx.currentTime;
      const dur = 0.10 + 0.05*intensity;

      const osc1 = audioCtx.createOscillator(); osc1.type="sine";
      const osc2 = audioCtx.createOscillator(); osc2.type="triangle";
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.17*intensity, t0+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);

      const base = 560 + Math.random()*320;
      osc1.frequency.setValueAtTime(base, t0);
      osc1.frequency.exponentialRampToValueAtTime(base*0.55, t0+dur);
      osc2.frequency.setValueAtTime(base*0.78, t0);
      osc2.frequency.exponentialRampToValueAtTime(base*0.45, t0+dur);

      osc1.connect(g); osc2.connect(g); g.connect(masterGain);

      const noiseDur=0.03;
      const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate*noiseDur));
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
      const noise = audioCtx.createBufferSource(); noise.buffer = buffer;

      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.001, t0);
      ng.gain.exponentialRampToValueAtTime(0.07*intensity, t0+0.002);
      ng.gain.exponentialRampToValueAtTime(0.0001, t0+noiseDur);
      noise.connect(ng); ng.connect(masterGain);

      osc1.start(t0); osc2.start(t0); noise.start(t0);
      osc1.stop(t0+dur+0.02);
      osc2.stop(t0+dur+0.02);
      noise.stop(t0+noiseDur+0.01);
    }

    function setupPlaceholderAudio(){
      for (const [name, path] of Object.entries(SFX_PATHS)){
        const audio = new Audio(path);
        audio.preload = 'auto';
        audio.volume = BASE_SFX_VOLUME * sfxVolume;
        sfxPlayers[name] = audio;
      }
      if (!transitionSfx){
        transitionSfx = new Audio(CFG.transitionSfxPath);
        transitionSfx.preload = 'auto';
        transitionSfx.volume = BASE_TRANSITION_VOLUME * sfxVolume;
      }
      if (!musicPlayer){
        musicPlayer = new Audio(MUSIC_PLAYLIST[musicIndex]);
        musicPlayer.preload = 'auto';
        musicPlayer.volume = musicVolume;
        musicPlayer.addEventListener('ended', ()=>{
          musicIndex = (musicIndex + 1) % MUSIC_PLAYLIST.length;
          musicPlayer.src = MUSIC_PLAYLIST[musicIndex];
          musicPlayer.play().catch(()=>{});
        });
      }
      applyAudioSettings();
    }

    function playSfx(name){
      const sfx = sfxPlayers[name];
      if (!sfx) return;
      sfx.currentTime = 0;
      sfx.play().catch(()=>{});
    }

    function playTransitionSfx(){
      if (!transitionSfx) return;
      transitionSfx.currentTime = 0;
      transitionSfx.play().catch(()=>{});
    }

    function startPlaylistLoop(){
      if (!musicPlayer) return;
      musicPlayer.play().catch(()=>{});
    }

    function clearAutoTimers(){
      for (const id of autoTimers) clearTimeout(id);
      autoTimers = [];
      modePressCount = 0;
    }

    // ===== STATE =====
    let cloverImg=null, chestImg=null, leprechaunImg=null;
    let started=false;
    let phaseIndex=0;
    let phaseScore=0;
    let rainbowProgress=0;
    let chestScale=2;
    let leprechaunJump=0;
    let phaseTransitionPending=false;
    let phaseTimer=null;
    let transitionAlpha=0;
    let transitionPhase='idle';
    let transitionHoldSec=0;
    let onTransitionMiddle=null;

    let sfxPlayers={};
    let transitionSfx=null;
    let musicPlayer=null;
    let musicIndex=0;
    let playMode='manual';
    let modePressCount=0;
    let autoTimers=[];
    let phaseInputUnlockAt=0;
    let tapDelay=500;
    let sfxVolume=0.5;
    let musicVolume=0.3;

    let tokens=[], particles=[], ripples=[], streaks=[];
    let coinDrops=[];
    let rainDrops=[];
    let flashHue=120, flashT=10;
    let pointerX=0, pointerY=0;

    let lastMs=0, spawnAcc=0;

    let bgGfx=null;
    let bgSeed=Math.random()*10000;

    let coinLepAnchor = null;

    // ===== ENTITIES =====
    class FallingToken{
      constructor(x,y,s,vy,vx,rot,rv,type){ this.x=x; this.y=y; this.s=s; this.vy=vy; this.vx=vx; this.rot=rot; this.rv=rv; this.type=type; this.wob=Math.random()*1000; }
      radius(){ return min(width,height)*0.12*this.s; }
      update(dt){
        const sp = CFG.reduceMotion ? 0.6 : 1.0;
        const t = millis()*0.001;
        const wob = Math.sin(t*1.2 + this.wob) * 0.35 * sp;
        this.x += (this.vx + wob) * dt;
        this.y += this.vy * dt * sp;
        this.rot += this.rv * dt * sp;

        const r=this.radius();
        if (this.y - r > height + 60){
          this.y = -r - 60;
          this.x = random(r, width-r);
          this.vy = random(CFG.fallSpeedMin, CFG.fallSpeedMax);
          this.vx = random(-CFG.driftMax, CFG.driftMax);
          this.rv = random(-CFG.spinMax, CFG.spinMax);
        }
        if (this.x < -r) this.x = width + r;
        if (this.x > width + r) this.x = -r;
      }
      draw(){
        push();
        translate(this.x,this.y);
        rotate(this.rot);

        noStroke();
        const rr=this.radius();
        fill(120, 55, 85, 0.10);
        ellipse(0,0, rr*2.6, rr*2.1);

        const sz = rr*2.0;
        if (cloverImg){
          imageMode(CENTER);
          image(cloverImg, 0,0, sz,sz);
        }
        pop();
      }
    }

    class Particle{
      constructor(x,y,hue){
        this.x=x; this.y=y;
        const a=Math.random()*TWO_PI;
        const sp=3 + Math.random()*10.5;
        this.vx=Math.cos(a)*sp;
        this.vy=Math.sin(a)*sp;
        this.life=1;
        this.hue=hue;
        this.size=2.2+Math.random()*7.8;
      }
      update(dt){
        const sp = CFG.reduceMotion ? 0.7 : 1.0;
        this.x += this.vx*dt*0.95*sp;
        this.y += this.vy*dt*0.95*sp;
        this.vx *= 0.98; this.vy *= 0.98;
        this.vy += 0.05*dt;
        this.life -= 0.018*dt;
      }
      draw(){
        if (this.life<=0) return;
        noStroke();
        fill(this.hue, 62, 100, constrain(this.life,0,1)*0.95);
        ellipse(this.x,this.y,this.size,this.size);
      }
    }

    // >>> extra “streak” particles for a punchier pop
    class Streak{
      constructor(x,y,hue){
        this.x=x; this.y=y;
        const a=Math.random()*TWO_PI;
        const sp=8 + Math.random()*20;
        this.vx=Math.cos(a)*sp;
        this.vy=Math.sin(a)*sp;
        this.life=1;
        this.hue=hue;
        this.len=8 + Math.random()*18;
      }
      update(dt){
        const sp = CFG.reduceMotion ? 0.75 : 1.0;
        this.x += this.vx*dt*0.90*sp;
        this.y += this.vy*dt*0.90*sp;
        this.vx *= 0.965; this.vy *= 0.965;
        this.vy += 0.03*dt;
        this.life -= 0.03*dt;
      }
      draw(){
        if (this.life<=0) return;
        const a = constrain(this.life,0,1)*0.75;
        stroke(this.hue, 55, 100, a);
        strokeWeight(2);
        line(this.x, this.y, this.x - this.vx*0.35, this.y - this.vy*0.35);
        noStroke();
      }
    }

    class Ripple{
      constructor(x,y,hue){ this.x=x; this.y=y; this.hue=hue; this.t=0; }
      update(dt){ this.t += dt/60; }
      draw(){
        const p=constrain(this.t/CFG.rippleSeconds,0,1);
        if (p>=1) return;
        const rr=lerp(0, max(width,height)*0.85, p);
        const a=(1-p)*0.55;
        noFill();
        stroke(this.hue, 45, 100, a);
        strokeWeight(7*(1-p)+1);
        ellipse(this.x,this.y, rr*2, rr*2);
      }
      done(){ return this.t>=CFG.rippleSeconds; }
    }

    // ===== p5 preload/setup =====
    function preload(){
      cloverImg = loadImage(CFG.cloverImgPath);
      chestImg = loadImage(CFG.chestImgPath);
      leprechaunImg = loadImage(CFG.leprechaunImgPath);
    }

    function setup(){
      createCanvas(window.innerWidth, window.innerHeight);
      colorMode(HSB, 360, 100, 100, 1);
      cursor();

      buildCleanSceneBackground();
      resetTokens();
      updateHud();

      pointerX = width*0.5;
      pointerY = height*0.6;
      lastMs = millis();
    }

    function windowResized(){
      resizeCanvas(window.innerWidth, window.innerHeight);
      buildCleanSceneBackground();
      resetTokens();
      updateHud();
    }

    // ===== BACKGROUND =====
    function smoothArray(arr, passes=2){
      const out = arr.slice();
      for (let p=0;p<passes;p++){
        for (let i=1;i<out.length-1;i++){
          out[i] = (out[i-1] + out[i] + out[i+1]) / 3;
        }
      }
      return out;
    }

    function buildCleanSceneBackground(){
      const w=width, h=height;
      bgGfx = createGraphics(w, h);
      bgGfx.colorMode(HSB, 360, 100, 100, 1);
      bgGfx.noStroke();

      for (let y=0;y<h;y++){
        const t = y/h;
        const hue = lerp(210, 165, pow(t, 0.9));
        const sat = lerp(72, 42, t);
        const bri = lerp(62, 100, pow(t, 1.08));
        bgGfx.stroke(hue, sat, bri, 1);
        bgGfx.line(0, y, w, y);
      }
      bgGfx.noStroke();

      const sunX = w*0.78, sunY = h*0.18;
      bgGfx.fill(52, 30, 100, 1);
      bgGfx.ellipse(sunX, sunY, w*0.075, w*0.075);
      for (let i=0;i<28;i++){
        const r = i/28;
        const a = 0.16*(1-r);
        bgGfx.fill(50, 25, 100, a);
        bgGfx.ellipse(sunX, sunY, r*w*0.36, r*w*0.36);
      }

      function drawCloud(cx, cy, s){
        bgGfx.push();
        bgGfx.translate(cx, cy);
        bgGfx.scale(s);

        bgGfx.noStroke();
        bgGfx.fill(0, 0, 100, 0.95);
        bgGfx.ellipse(0, 0, 230, 86);
        bgGfx.ellipse(-78, -18, 130, 98);
        bgGfx.ellipse(  6, -40, 150, 118);
        bgGfx.ellipse( 92, -14, 132, 100);

        bgGfx.fill(45, 8, 96, 0.55);
        bgGfx.ellipse(0, 12, 220, 66);

        bgGfx.pop();
      }

      const clouds = [
        {x:w*0.20, y:h*0.18, s:0.78},
        {x:w*0.44, y:h*0.12, s:0.62},
        {x:w*0.60, y:h*0.22, s:0.84},
        {x:w*0.84, y:h*0.14, s:0.70}
      ];
      for (const c of clouds) drawCloud(c.x, c.y, c.s);

      function drawHillLayer(opts){
        const { baseY, amp, freq, hue, sat, bri, step, texDensity, texBriJitter, smoothPasses } = opts;

        const xs = [];
        const ys = [];
        for (let x=0; x<=w; x+=step){
          xs.push(x);
          const n = noise(bgSeed + x*freq, baseY*0.01);
          const yy = baseY - (n-0.5)*2*amp;
          ys.push(yy);
        }

        const ysSmooth = smoothArray(ys, smoothPasses);

        bgGfx.noStroke();
        bgGfx.fill(hue, sat, bri, 1);
        bgGfx.beginShape();
        bgGfx.vertex(0, h);
        for (let i=0;i<xs.length;i++) bgGfx.vertex(xs[i], ysSmooth[i]);
        bgGfx.vertex(w, h);
        bgGfx.endShape(CLOSE);

        bgGfx.stroke(hue, max(0, sat-25), min(100, bri+16), 0.35);
        bgGfx.strokeWeight(2);
        bgGfx.noFill();
        bgGfx.beginShape();
        for (let i=0;i<xs.length;i++) bgGfx.vertex(xs[i], ysSmooth[i] + 1.5);
        bgGfx.endShape();
        bgGfx.noStroke();

        const texCount = Math.floor(w*h*texDensity);
        for (let i=0;i<texCount;i++){
          const x = random(w);
          const idx = Math.floor((x / w) * (ysSmooth.length-1));
          const ridgeY = ysSmooth[idx];
          const y = random(ridgeY + 6, h);
          const t = (y - ridgeY) / (h - ridgeY + 0.0001);
          const dotSize = random(1.0, 2.2) * (0.55 + 0.75*t);
          const localBri = bri - (5 + random()*texBriJitter) * t;
          bgGfx.fill(hue + random(-2,2), sat + random(-5,4), localBri, 0.24);
          bgGfx.ellipse(x, y, dotSize, dotSize);
        }

        const swaths = 9;
        for (let i=0;i<swaths;i++){
          const x = random(w);
          const idx = Math.floor((x / w) * (ysSmooth.length-1));
          const ridgeY = ysSmooth[idx];
          const y = random(ridgeY + 22, h);
          const ww = random(w*0.14, w*0.30);
          const hh = random(h*0.03, h*0.085);
          bgGfx.fill(hue, sat, bri - random(3,7), 0.10);
          bgGfx.ellipse(x, y, ww, hh);
        }
      }

      drawHillLayer({
        baseY: h*0.55, amp: h*0.055, freq: 0.0016,
        hue: 135, sat: 28, bri: 58,
        step: 14, texDensity: 0.000010, texBriJitter: 10,
        smoothPasses: 4
      });

      drawHillLayer({
        baseY: h*0.67, amp: h*0.095, freq: 0.0022,
        hue: 122, sat: 48, bri: 52,
        step: 12, texDensity: 0.000016, texBriJitter: 12,
        smoothPasses: 4
      });

      drawHillLayer({
        baseY: h*0.83, amp: h*0.155, freq: 0.0028,
        hue: 112, sat: 72, bri: 48,
        step: 10, texDensity: 0.000020, texBriJitter: 14,
        smoothPasses: 5
      });

      bgGfx.stroke(112, 55, 58, 0.16);
      bgGfx.strokeWeight(1);
      const blades = Math.floor(w*h*0.00022);
      for (let i=0;i<blades;i++){
        const x = random(w);
        const y = random(h*0.72, h);
        const t = (y - h*0.72)/(h*0.28);
        const len = (8 + random()*22) * (0.5 + t);
        bgGfx.line(x, y, x + random(-2,2), y - len);
      }
      bgGfx.noStroke();

      for (let i=0;i<38;i++){
        const x = random(w);
        const y = random(h*0.72, h*0.98);
        const size = random(6, 12);
        bgGfx.fill(random([330, 20, 55, 290]), 70, 100, 0.8);
        for (let p=0;p<5;p++){
          const a = (TWO_PI/5)*p;
          bgGfx.ellipse(x + Math.cos(a)*size*0.6, y + Math.sin(a)*size*0.6, size*0.7, size*0.7);
        }
        bgGfx.fill(52, 70, 100, 0.95);
        bgGfx.ellipse(x, y, size*0.45, size*0.45);
      }

      for (let i=0;i<9;i++){
        const r=i/9;
        bgGfx.fill(0,0,0, 0.04*r);
        const m = i*22;
        bgGfx.rect(m, m, w-m*2, h-m*2, 60);
      }
    }

    // ===== GAME LOGIC =====
    const hud = document.getElementById('hud');

    function getText(el, lang){
      for (const code of [lang, ...SUPPORTED_LANGS.filter(c => c !== lang)]){
        const val = el.getAttribute(`data-${code}`);
        if (val != null) return val;
      }
      return null;
    }

    function applyTranslations(lang){
      const safeLang = SUPPORTED_LANGS.includes(lang) ? lang : 'en';
      currentLang = safeLang;
      document.querySelectorAll('.translate').forEach(el => {
        const value = getText(el, safeLang);
        if (value == null) return;
        if (['P', 'BUTTON', 'DIV', 'H1', 'H2', 'H3', 'TITLE'].includes(el.tagName)) el.innerHTML = value;
        else el.textContent = value;
      });
      const titleEl = document.querySelector('title');
      if (titleEl){
        const nextTitle = getText(titleEl, safeLang);
        if (nextTitle){
          titleEl.textContent = nextTitle;
          document.title = nextTitle;
        }
      }
      document.documentElement.lang = safeLang;
      const langToggle = document.getElementById('langToggle');
      if (langToggle){
        const next = SUPPORTED_LANGS[(SUPPORTED_LANGS.indexOf(safeLang) + 1) % SUPPORTED_LANGS.length];
        langToggle.textContent = next.toUpperCase();
      }
      updateHud();
    }

    function setLang(lang){
      const safeLang = SUPPORTED_LANGS.includes(lang) ? lang : 'en';
      try { localStorage.setItem(LS_LANG_KEY, safeLang); } catch (e) {}
      applyTranslations(safeLang);
    }

    function getInitialLang(){
      let initial = 'en';
      try {
        const stored = localStorage.getItem(LS_LANG_KEY);
        if (SUPPORTED_LANGS.includes(stored)) initial = stored;
      } catch (e) {}
      return initial;
    }

    function getPhase(){ return PHASES[phaseIndex]; }

    function updateHud(){
      const phase = getPhase();
      const total = phase.target;
      const done = phase.key === 'rainbow' ? rainbowProgress : phaseScore;
      const phaseTitle = phase.title?.[currentLang] || phase.title?.en || String(phase.title);
      if (hud) hud.textContent = `${phaseTitle} · ${done}/${total}`;
    }

    function nextPhase(){
      if (transitionPhase !== 'idle') return;

      playTransitionSfx();

      transitionPhase = 'fadeOut';
      transitionAlpha = 0;
      transitionHoldSec = 0;
      onTransitionMiddle = () => {
        clearAutoTimers();
        phaseTransitionPending = false;
        if (phaseTimer){ clearTimeout(phaseTimer); phaseTimer = null; }
        const wasCoinPhase = getPhase().key === 'coin';
        if (wasCoinPhase){
          startNewCycle();
        } else {
          phaseIndex = (phaseIndex + 1) % PHASES.length;
          phaseScore = 0;
          rainbowProgress = 0;
          resetTokens();
          updateHud();
        }
      };
    }

    function startNewCycle(){
      clearAutoTimers();
      phaseTransitionPending = false;
      if (phaseTimer){ clearTimeout(phaseTimer); phaseTimer = null; }
      resizeCanvas(window.innerWidth, window.innerHeight);
      buildCleanSceneBackground();
      phaseIndex = 0;
      phaseScore = 0;
      rainbowProgress = 0;
      chestScale = 2;
      leprechaunJump = 0;
      tokens = [];
      particles = [];
      ripples = [];
      streaks = [];
      coinDrops = [];
      rainDrops = [];
      flashT = 10;
      spawnAcc = 0;
      pointerX = width * 0.5;
      pointerY = height * 0.6;

      coinLepAnchor = null;

      resetTokens();
      updateHud();
    }

    function computeCoinLayoutRaw(){
      const chestW = min(width, height) * 0.23 * chestScale;
      const chestH = chestW * 0.72;
      const chestX = width * 0.42;
      const chestY = height * 0.80;

      const edgeRadius = min(width, height) * 0.50 * CFG.coinRainbowScale;

      return { chestX, chestY, chestW, chestH, edgeRadius };
    }

    function ensureCoinLepAnchor(){
      if (coinLepAnchor) return;
      const raw = computeCoinLayoutRaw();
      coinLepAnchor = {
        x: raw.chestX + raw.chestW * 0.95,
        y: raw.chestY + raw.chestH * 0.04
      };
    }

    function resetTokens(){
      modePressCount = 0;
      phaseInputUnlockAt = millis() + 350;
      phaseTransitionPending = false;
      tokens=[];
      particles=[];
      ripples=[];
      streaks=[];
      coinDrops=[];
      flashT=10;
      spawnAcc=0;

      const phase = getPhase();

      if (phase.key === 'rainbow'){
        rainDrops = Array.from({length:42}, () => ({ x: random(width), y: random(height), sp: random(3, 6), len: random(8, 14) }));
        return;
      }
      if (phase.key === 'coin'){
        chestScale = 2;
        leprechaunJump = 0;
        coinLepAnchor = null;
        ensureCoinLepAnchor();
        return;
      }

      for (let i=0;i<CFG.cloverCount;i++) tokens.push(makeToken(phase.key, random(-height, 0)));
    }

    function getCoinLayout(){
      const raw = computeCoinLayoutRaw();
      ensureCoinLepAnchor();
      return {
        chestX: raw.chestX,
        chestY: raw.chestY,
        chestW: raw.chestW,
        chestH: raw.chestH,
        lepX: coinLepAnchor.x,
        lepY: coinLepAnchor.y,
        rainbowX: -raw.edgeRadius * 0.05,
        rainbowY: raw.chestY,
        rainbowR: raw.edgeRadius
      };
    }

    function spawnCoinDrop(){
      const L = getCoinLayout();
      const startX = random(width * 0.08, width * 0.72);
      const coinSize = min(width, height) * 0.216;
      coinDrops.push({
        x: startX,
        y: -coinSize,
        targetX: L.chestX + random(-26, 26),
        size: coinSize,
        vy: max(3.2, (L.chestY + 40) / (CFG.coinDropSeconds * 60)),
        done: false
      });
    }

    function drawChest(){
      const L = getCoinLayout();
      push();
      if (chestImg){
        imageMode(CENTER);
        image(chestImg, L.chestX, L.chestY, L.chestW, L.chestH);
      }else{
        noStroke();
        fill(30, 65, 45, 1);
        rectMode(CENTER);
        rect(L.chestX, L.chestY, L.chestW, L.chestH, 18);
      }
      pop();
    }

    function drawLeprechaun(dt){
      const L = getCoinLayout();

      if (leprechaunJump > 0) leprechaunJump = max(0, leprechaunJump - dt * 0.06);
      const jumpY = Math.sin(leprechaunJump * Math.PI) * min(width, height) * 0.08;

      const w = min(width, height) * 0.22 * 4.0 * 0.75;
      const h = w * 0.95;

      push();
      imageMode(CENTER);
      if (leprechaunImg) image(leprechaunImg, L.lepX, L.lepY - jumpY, w, h);
      else {
        noStroke();
        fill(120, 40, 90, 0.95);
        rectMode(CENTER);
        rect(L.lepX, L.lepY - jumpY, w*0.75, h*0.8, 20);
      }
      pop();
    }

    function updateCoinDrops(dt){
      const L = getCoinLayout();
      for (const coin of coinDrops){
        if (coin.done) continue;
        coin.x = lerp(coin.x, coin.targetX, 0.035 * dt);
        coin.y += coin.vy * dt;
        if (coin.y >= L.chestY - coin.size*0.55){
          coin.done = true;
          phaseScore += 1;
          chestScale = 2 + phaseScore * 0.16;
          leprechaunJump = 1;
          playSfx('leprechaun');

          flashHue = 46;
          flashT = 0;
          for (let i=0;i<22;i++) particles.push(new Particle(L.chestX, L.chestY - 10, 48 + random(-4, 5)));
          for (let i=0;i<10;i++) streaks.push(new Streak(L.chestX, L.chestY - 10, 48 + random(-5, 6)));

          if (phaseScore >= getPhase().target && !phaseTransitionPending){
            phaseTransitionPending = true;
            coinDrops = [];
            phaseTimer = setTimeout(nextPhase, 450);
          }
          updateHud();
        }
      }
      coinDrops = coinDrops.filter(c => !c.done);
    }

    function drawCoinDrops(){
      for (const coin of coinDrops){
        const s = coin.size;
        noStroke();
        fill(44, 70, 40, 0.28);
        ellipse(coin.x + s*0.08, coin.y + s*0.15, s*0.95, s*0.95);

        fill(49, 78, 100, 1);
        ellipse(coin.x, coin.y, s, s);

        stroke(42, 80, 74, 0.95);
        strokeWeight(max(2, s*0.08));
        noFill();
        ellipse(coin.x, coin.y, s*0.85, s*0.85);

        noStroke();
        fill(50, 18, 100, 0.5);
        ellipse(coin.x - s*0.17, coin.y - s*0.2, s*0.27, s*0.19);
      }
    }

    function drawRainbowRain(dt){
      stroke(205, 35, 100, 0.35);
      strokeWeight(2);
      for (const d of rainDrops){
        line(d.x, d.y, d.x - 4, d.y + d.len);
        d.y += d.sp * dt;
        d.x -= 0.4 * dt;
        if (d.y > height + 10){
          d.y = random(-60, -10);
          d.x = random(width);
        }
      }
      noStroke();
    }

    function makeToken(type, yOverride=null){
      const s = random(CFG.minScale, CFG.maxScale);
      const vy = random(CFG.fallSpeedMin, CFG.fallSpeedMax);
      const vx = random(-CFG.driftMax, CFG.driftMax);
      const rot = random(TWO_PI);
      const rv  = random(-CFG.spinMax, CFG.spinMax);
      const r = min(width,height)*0.12*s;
      const x = random(r, width-r);
      const y = (yOverride!==null) ? yOverride : random(-height, -60);
      return new FallingToken(x,y,s,vy,vx,rot,rv,type);
    }

    // >>> Always pop the lowest clover(s)
    function pickLowestToken(){
      if (!tokens.length) return null;
      let best = tokens[0];
      for (const t of tokens){
        if (t.y > best.y) best = t; // largest y = lowest on screen
      }
      return best;
    }
    function popLowestClovers(count){
      for (let i=0;i<count;i++){
        if (getPhase().key !== 'clover' || !tokens.length) break;
        const t = pickLowestToken();
        if (!t) break;
        popToken(t);
      }
    }

    function popToken(c){
      if (!c) return;
      const idx=tokens.indexOf(c);
      if (idx>=0) tokens.splice(idx,1);

      flashHue = 115;
      flashT = 0;

      // stronger ripple stack
      ripples.push(new Ripple(c.x, c.y, 120));
      if (!CFG.reduceMotion) ripples.push(new Ripple(c.x, c.y, 112));

      // >>> better pop animation: bigger burst + streaks
      const baseHue = 112 + random(-10,10);
      const n = CFG.reduceMotion ? Math.floor(CFG.particlesPerPop*0.55) : CFG.particlesPerPop;
      for (let i=0;i<n;i++) particles.push(new Particle(c.x,c.y, baseHue + random(-8,8)));

      const streakN = CFG.reduceMotion ? 10 : 22;
      for (let i=0;i<streakN;i++) streaks.push(new Streak(c.x, c.y, baseHue + random(-12,12)));

      // tiny glitter
      const glitter = CFG.reduceMotion ? 14 : 34;
      for (let i=0;i<glitter;i++){
        const p = new Particle(c.x, c.y, 52 + random(-6,6));
        p.size *= 0.55;
        particles.push(p);
      }

      const intensity = constrain(map(c.s, CFG.minScale, CFG.maxScale, 0.95, 1.25), 0.85, 1.35);
      playPopSound(intensity);
      playSfx('clover');

      // keep the field from getting too dense, but refill gradually
      if (tokens.length < CFG.maxClovers){
        setTimeout(()=>tokens.push(makeToken(getPhase().key, random(-240,-60))), 140);
      }

      phaseScore += 1;
      if (phaseScore >= getPhase().target) nextPhase();
      else updateHud();
    }

    function drawRainbowChallenge(){
      const arcColors = [
        [292, 62, 98],
        [238, 64, 100],
        [198, 70, 96],
        [112, 65, 92],
        [52, 80, 100],
        [28, 82, 100],
        [0, 85, 98]
      ];
      const cx = width * 0.5;
      const cy = height * 1.02;
      const outerR = min(width * 0.48, height * 0.95);
      const thick = max(10, outerR * 0.09);
      const step = thick * 0.88;
      const innerR = outerR - step * (arcColors.length - 1);
      const start = PI;
      const end = TWO_PI;

      for (let i = 0; i < arcColors.length; i++){
        const active = i < rainbowProgress;
        const [h,s,b] = arcColors[i];

        if (active){
          stroke(h, s, b, 0.95);
        } else {
          stroke(
            h,
            s * CFG.rainbowSilhouetteSatMul,
            min(100, b * CFG.rainbowSilhouetteBriMul),
            CFG.rainbowSilhouetteAlpha
          );
        }

        strokeWeight(thick);
        noFill();
        const r = innerR + i * step;
        arc(cx, cy, r*2, r*2, start, end);
      }
    }

    function drawCoinBackground(){
      const L = getCoinLayout();
      const cols = [
        [292, 62, 98], [238, 64, 100], [198, 70, 96], [112, 65, 92], [52, 80, 100], [28, 82, 100], [0, 85, 98]
      ];
      const band = max(8, min(width, height) * 0.024);
      for (let i=0;i<cols.length;i++){
        const [h,s,b] = cols[i];
        stroke(h,s,b,0.95);
        strokeWeight(band);
        noFill();
        const rr = L.rainbowR - i*band*0.9;
        arc(L.rainbowX, L.rainbowY, rr*2, rr*2, -HALF_PI, 0);
      }
      noStroke();
    }

    function handleAction(){
      if (phaseTransitionPending || transitionPhase !== 'idle') return;
      if (millis() < phaseInputUnlockAt) return;
      const phase = getPhase();

      function completePhaseSoon(){
        if (!phaseTransitionPending){
          phaseTransitionPending = true;
          phaseTimer = setTimeout(nextPhase, 350);
        }
      }

      function spawnCoinsBurst(count){
        for (let i=0;i<count;i++){
          if (getPhase().key !== 'coin') break;
          spawnCoinDrop();
          playSfx('coin');
        }
      }

      if (playMode === 'single'){
        if (phase.key === 'clover'){
          // pop all needed, always lowest first
          popLowestClovers(phase.target);
          return;
        }

        if (phase.key === 'rainbow'){
          const tick = () => {
            if (getPhase().key !== 'rainbow') return;
            if (rainbowProgress < phase.target){
              rainbowProgress += 1;
              playSfx('rainbow');
              flashHue = random(0, 360);
              flashT = 0;
              updateHud();
              if (rainbowProgress < phase.target){
                autoTimers.push(setTimeout(tick, 500));
              } else {
                completePhaseSoon();
              }
            }
          };
          tick();
          return;
        }

        if (phase.key === 'coin'){
          const total = phase.target - phaseScore;
          for (let i=0;i<total;i++){
            autoTimers.push(setTimeout(()=>{ 
              if (getPhase().key !== 'coin') return;
              spawnCoinDrop();
              playSfx('coin');
            }, i*300));
          }
          return;
        }
      }

      if (playMode === 'manual'){
        if (modePressCount >= 7) return;
        modePressCount += 1;

        if (phase.key === 'clover'){
          const remaining = max(0, phase.target - phaseScore);
          const remainingPresses = max(1, 8 - modePressCount);
          const n = max(1, Math.ceil(remaining / remainingPresses));
          popLowestClovers(n);
          return;
        }

        if (phase.key === 'rainbow'){
          if (rainbowProgress < phase.target){
            rainbowProgress += 1;
            flashHue = random(0, 360);
            flashT = 0;
            playPopSound(1);
            playSfx('rainbow');
            for (let i=0;i<28;i++) particles.push(new Particle(width*0.5, height*0.55, random(0, 360)));
            if (rainbowProgress >= phase.target) completePhaseSoon();
            updateHud();
          }
          return;
        }

        if (phase.key === 'coin'){
          const remaining = max(0, phase.target - phaseScore);
          const remainingPresses = max(1, 8 - modePressCount);
          const burst = min(remaining, max(1, Math.ceil(remaining / remainingPresses)));
          spawnCoinsBurst(burst);
          return;
        }
      }

      // fallback behavior
      if (phase.key === 'clover'){
        popLowestClovers(1);
        return;
      }
      if (phase.key === 'rainbow'){
        if (rainbowProgress < CFG.rainbowTarget){
          rainbowProgress += 1;
          flashHue = random(0, 360);
          flashT = 0;
          playPopSound(1);
          playSfx('rainbow');
          for (let i=0;i<28;i++) particles.push(new Particle(width*0.5, height*0.55, random(0, 360)));
          if (rainbowProgress >= phase.target && !phaseTransitionPending){
            phaseTransitionPending = true;
            phaseTimer = setTimeout(nextPhase, 350);
          }
          updateHud();
        }
        return;
      }
      if (phase.key === 'coin'){
        spawnCoinDrop();
        playPopSound(0.9);
        playSfx('coin');
        return;
      }
    }

    // ===== DRAW LOOP =====
    function draw(){
      const now=millis();
      let dt = (now-lastMs)/(1000/60);
      lastMs=now;
      dt = constrain(dt, 0.5, 2.5);

      imageMode(CORNER);
      image(bgGfx, 0, 0, width, height);

      if (getPhase().key === 'rainbow'){
        drawRainbowChallenge();
        drawRainbowRain(dt);
      }else if (getPhase().key === 'coin'){
        drawCoinBackground();
        drawChest();
        drawLeprechaun(dt);
        updateCoinDrops(dt);
        drawCoinDrops();
      }else{
        spawnAcc += (dt/60) * CFG.spawnRatePerSec;
        if (spawnAcc >= 1){
          const k = floor(spawnAcc);
          spawnAcc -= k;
          for (let i=0;i<k;i++){
            if (tokens.length < CFG.maxClovers) tokens.push(makeToken(getPhase().key));
          }
        }
        for (const c of tokens) c.update(dt);
        for (const c of tokens) c.draw();
      }

      for (const r of ripples) r.update(dt);
      for (const r of ripples) r.draw();
      ripples = ripples.filter(r => !r.done());

      for (const s of streaks) s.update(dt);
      for (const s of streaks) s.draw();
      streaks = streaks.filter(s => s.life > 0);

      for (const p of particles) p.update(dt);
      for (const p of particles) p.draw();
      particles = particles.filter(p => p.life > 0);

      drawFlash(dt);
      drawSceneFade(dt);

      noFill();
      stroke(120, 40, 100, started ? 0.10 : 0.06);
      strokeWeight(2);
      ellipse(pointerX, pointerY, 30, 30);
    }

    function drawFlash(dt){
      const p = constrain(flashT/CFG.flashSeconds, 0, 1);
      if (p>=1) return;
      const a = (1-p)*0.24;
      noStroke();
      fill(flashHue, 55, 95, a);
      rect(0,0,width,height);
      flashT += dt/60;
    }

    function drawSceneFade(dt){
      if (transitionPhase === 'fadeOut'){
        transitionAlpha = min(1, transitionAlpha + dt/120);
        if (transitionAlpha >= 1){
          transitionPhase = 'hold';
          transitionHoldSec = 0;
          if (onTransitionMiddle){
            const fn = onTransitionMiddle;
            onTransitionMiddle = null;
            fn();
          }
        }
      }else if (transitionPhase === 'hold'){
        transitionHoldSec += dt/60;
        transitionAlpha = 1;
        if (transitionHoldSec >= 5){
          transitionPhase = 'fadeIn';
        }
      }else if (transitionPhase === 'fadeIn'){
        transitionAlpha = max(0, transitionAlpha - dt/120);
        if (transitionAlpha <= 0){
          transitionPhase = 'idle';
        }
      }

      if (transitionPhase !== 'idle' || transitionAlpha > 0){
        noStroke();
        fill(0, 0, 0, transitionAlpha);
        rect(0, 0, width, height);

        if (transitionPhase === 'hold' && cloverImg){
          push();
          imageMode(CENTER);
          translate(width*0.5, height*0.5);
          rotate(millis()*0.0035);
          const size = min(width,height) * 0.23;
          image(cloverImg, 0, 0, size, size);
          pop();
        }
      }
    }

    // ===== INPUT =====
    let lastActionPressTime = 0;

    function runActionWithDelay(){
      const now = millis();
      if (now - lastActionPressTime < tapDelay) return;
      lastActionPressTime = now;

      if (!audioEnabled) ensureAudio();
      handleAction();
    }

    function keyPressed(){
      if (!started && (key===' ' || keyCode===ENTER)){
        startGame();
        return false;
      }
      if (key===' '){
        runActionWithDelay();
        return false;
      }
    }
    function isSettingsInteraction(evt){
      const target = evt?.target;
      return !!(target && ((menu && menu.contains(target)) || (settingsIcon && settingsIcon.contains(target))));
    }

    function mouseMoved(){ pointerX=mouseX; pointerY=mouseY; }
    function mouseDragged(){ pointerX=mouseX; pointerY=mouseY; }
    function mousePressed(event){
      if (isSettingsInteraction(event)) return true;
      pointerX=mouseX; pointerY=mouseY;
      if (started) runActionWithDelay();
      return false;
    }
    function touchStarted(event){
      if (isSettingsInteraction(event)) return true;
      if (touches && touches[0]){ pointerX=touches[0].x; pointerY=touches[0].y; }
      if (started) runActionWithDelay();
      return false;
    }
    function touchMoved(event){
      if (isSettingsInteraction(event)) return true;
      if (touches && touches[0]){ pointerX=touches[0].x; pointerY=touches[0].y; }
      return false;
    }

    // ===== OVERLAY =====
    const overlay=document.getElementById('overlay');
    const startBtn=document.getElementById('startBtn');
    const modeBtns=[...document.querySelectorAll('.modeBtn')];
    const langToggle=document.getElementById('langToggle');
    const settingsIcon=document.getElementById('settings-icon');
    const menu=document.getElementById('menu');
    const tapDelaySlider=document.getElementById('tapDelaySlider');
    const tapDelayVal=document.getElementById('tapDelayVal');
    const sfxVol=document.getElementById('sfxVol');
    const sfxVolVal=document.getElementById('sfxVolVal');
    const musicVol=document.getElementById('musicVol');
    const musicVolVal=document.getElementById('musicVolVal');

    langToggle?.addEventListener('click', ()=>{ 
      const idx = SUPPORTED_LANGS.indexOf(currentLang);
      const nextLang = SUPPORTED_LANGS[(idx + 1) % SUPPORTED_LANGS.length];
      setLang(nextLang);
    });

    setLang(getInitialLang());

    tapDelaySlider?.addEventListener('input', (e) => {
      tapDelay = parseInt(e.target.value, 10);
      tapDelayVal.textContent = e.target.value;
    });

    sfxVol?.addEventListener('input', (e) => {
      sfxVolume = Number(e.target.value) / 100;
      sfxVolVal.textContent = e.target.value;
      applyAudioSettings();
    });

    musicVol?.addEventListener('input', (e) => {
      musicVolume = Number(e.target.value) / 100;
      musicVolVal.textContent = e.target.value;
      applyAudioSettings();
    });

    settingsIcon?.addEventListener('click', (e) => {
      e.stopPropagation();
      menu.classList.toggle('show');
    });

    menu?.addEventListener('click', (e) => e.stopPropagation());
    document.addEventListener('click', () => menu?.classList.remove('show'));

    modeBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        playMode = btn.dataset.mode || 'manual';
        modeBtns.forEach(b=>b.classList.toggle('active', b===btn));
      });
    });

    function startGame(){
      ensureAudio();
      setupPlaceholderAudio();
      startPlaylistLoop();
      overlay.style.display='none';
      started=true;
      pointerX=width*0.5; pointerY=height*0.6;
      updateHud();

      if (langToggle) langToggle.remove();
      if (settingsIcon) settingsIcon.style.display = 'flex';
    }

    async function requestFullscreen(){
      const el=document.documentElement;
      try{
        if (!document.fullscreenElement && el.requestFullscreen) await el.requestFullscreen();
      }catch(_){}
    }

    startBtn.addEventListener('click', ()=>{ startGame(); requestFullscreen(); });
    overlay.addEventListener('pointerdown', (e)=>{
      if (e.target.tagName.toLowerCase()==='button') return;
      startGame(); requestFullscreen();
    }, {passive:true});

    // expose p5 hooks
    window.preload=preload;
    window.setup=setup;
    window.draw=draw;
    window.windowResized=windowResized;
    window.keyPressed=keyPressed;
    window.mouseMoved=mouseMoved;
    window.mouseDragged=mouseDragged;
    window.mousePressed=mousePressed;
    window.touchStarted=touchStarted;
    window.touchMoved=touchMoved;
  </script>
</body>
</html>
