<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title class="translate" data-fr="Mario Movie : actions" data-en="Mario Movie: Actions" data-ja="マリオムービー：アクション">Mario Movie: Actions</title>
    <link rel="stylesheet" href="../../css/control-panel.css">
    <link rel="stylesheet" href="../../css/games.css">
    <link rel="stylesheet" href="../../css/gaming.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/videogamesmenu-dynamic.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <style>
      #language-toggle{
        position:fixed; top:10px; right:10px; z-index:99999;
        padding:6px 10px; border-radius:10px; border:2px solid #009688;
        background:#fff; color:#009688; font-weight:700; cursor:pointer;
        user-select:none;
      }
      .video-container{
        position: fixed;
        inset: 0;
        background: #000;
      }
      .video-player{
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }
    </style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-B45TJG4GBJ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);} 
  gtag('js', new Date());
  gtag('config', 'G-B45TJG4GBJ');
</script>
</head>
<body
    style="--menu-backdrop-image: url('../../images/mariocard.png'); --menu-side-image: url('../../images/mariocard.png');"
    data-video-source="../../videos/mariomovie.mp4"
>
    <button id="language-toggle" title="Changer de langue / Change language">FR / EN</button>

    <div id="control-panel">
        <div id="control-panel-options" class="control-panel-options dynamic-control-panel">
            <div class="game-menu-layout">
                <div class="game-menu-main">
                    <div id="options-title-bar">
                        <h2 id="options-main-title" class="translate" data-fr="Mario Movie : actions" data-en="Mario Movie: Actions" data-ja="マリオムービー：アクション">Mario Movie: Actions</h2>
                    </div>
                    <p id="control-panel-instructions" class="control-panel-instructions translate"
                       data-fr="Le film s'arrête à des moments précis. Une image d'action apparaît : appuyez sur la switch ou sur la barre d'espace pour continuer."
                       data-en="The movie stops at specific moments. An action image appears: press the switch or the space bar to continue."
                       data-ja="ムービーが決まったタイミングで止まり、アクション画像が表示されます。再開するにはスイッチまたはスペースキーを押してください。">
                    </p>
                    <div id="mode-divider"></div>
                    <div class="dynamic-summary-card">
                        <div class="dynamic-summary-preview">
                            <img src="../../images/gaminganimation/jump.png" alt="Jump action prompt preview">
                        </div>
                        <div class="dynamic-summary-copy">
                            <h3 class="translate" data-fr="Indices d'action dynamiques" data-en="Dynamic action prompts" data-ja="動的なアクション提示">Dynamic action prompts</h3>
                            <p class="translate"
                               data-fr="À chaque pause, le jeu affiche automatiquement l'image et le mot correspondants, selon la langue choisie."
                               data-en="At each pause, the game automatically shows the matching image and word in the selected language."
                               data-ja="一時停止ごとに、選択中の言語に合わせた画像と単語が自動表示されます。">
                            </p>
                        </div>
                    </div>
                    <div id="button-container" class="button-container dynamic-button-container">
                        <a id="control-panel-download-button" class="button translate" data-fr="Télécharger la vidéo" data-en="Download video" data-ja="動画をダウンロード" href="../../videos/mariomovie.mp4" download="mariomovie.mp4">Download video</a>
                        <div id="control-panel-loading-bar-container" class="loading-bar-container"><div id="control-panel-loading-bar" class="loading-bar"></div></div>
                        <button id="control-panel-start-button" class="button translate" data-fr="Commencer" data-en="Start" data-ja="開始">Commencer</button>
                    </div>
                </div>
                <aside class="game-menu-art" aria-hidden="true">
                    <div class="game-menu-art-card dynamic-art-card">
                        <div class="game-menu-art-image"></div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <div id="overlay-screen" class="overlay-screen hidden">
        <div class="dynamic-prompt-card">
            <img id="dynamic-prompt-image" class="dynamic-prompt-image" src="" alt="">
            <p id="dynamic-prompt-text" class="dynamic-prompt-text"></p>
            <p class="dynamic-prompt-hint translate" data-fr="Appuyez pour continuer" data-en="Press to continue" data-ja="押して続ける">Press to continue</p>
        </div>
    </div>

    <div id="video-container" class="video-container hidden">
        <video id="video-player" class="video-player" preload="auto" playsinline>
            <source id="video-source" src="../../videos/mariomovie.mp4" type="video/mp4">
            Votre navigateur ne supporte pas la balise vidéo.
        </video>
    </div>

    <div id="results-screen" class="hidden">
        <div class="results-panel">
            <h2 class="translate" data-fr="Partie terminée" data-en="Session complete" data-ja="セッション完了">PARTIE TERMINÉE</h2>
            <p id="completed-prompts" class="translate" data-fr="Actions complétées : 0 / 0" data-en="Completed prompts: 0 / 0" data-ja="完了したアクション：0 / 0">Completed prompts: 0 / 0</p>
            <p id="wrong-presses" class="translate" data-fr="Appuis hors pause : 0" data-en="Presses outside pauses: 0" data-ja="停止以外での入力：0">Presses outside pauses: 0</p>
            <button id="continue-button" class="translate" data-fr="Rejouer" data-en="Play again" data-ja="もう一度">RESTART</button>
        </div>
    </div>

    <script src="../../js/translationmain.js"></script>
    <script>
      document.getElementById('language-toggle')?.addEventListener('pointerup', toggleLanguage);
    </script>
    <script src="../../js/config-dynamic-stop.js"></script>
    <script src="../../js/gamecontroller-dynamic-stop.js"></script>
</body>
</html>
