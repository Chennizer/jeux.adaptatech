<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title class="translate" data-fr="MarioMovie" data-en="MarioMovie" data-ja="マリオムービー">MarioMovie</title>
    <link rel="stylesheet" href="../../css/control-panel.css">
    <link rel="stylesheet" href="../../css/games.css">
    <link rel="stylesheet" href="../../css/gaming.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/video-stop-action.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B45TJG4GBJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B45TJG4GBJ');
    </script>
</head>
<body
    class="video-stop-action-page"
    style="--menu-backdrop-image: url('../../images/arcade/mariomoviecover.png'); --menu-side-image: url('../../images/arcade/mariomoviecover.png');"
    data-video-source="https://bucket.adaptatech.org/mariomovie.mp4"
    data-pre-pause-duration="0.2"
    data-prompt-sound="../../sounds/pageturn.mp3"
    data-success-sound="../../sounds/success3.mp3"
    data-hard-time-limit="10"
    data-hard-timeout-sound="../../sounds/error.mp3"
    data-hard-restart-sound="../../sounds/pagestart.mp3"
    data-hard-shrink-duration="5"
    data-menu-music="../../songs/marioarcademusic.mp3"
    data-wait-music="../../sounds/arcade/promptloop.mp3"
    data-wait-music-delay-ms="500"
    data-score-game="mariomovie"
    data-score-api-base="https://score-api-2.gui98789.workers.dev"
    data-score-top-limit="5"
    data-action-events='[
      {"time":5.0,"action":"jump"},
      {"time":10.0,"action":"dodge"},
      {"time":15.0,"action":"crouch"},
      {"time":20.2,"action":"jump"},
      {"time":25.5,"action":"land"},
      {"time":30.4,"action":"kick"},
      {"time":36.3,"action":"jump"}
    ]'
>
    <button id="language-toggle" title="Changer de langue / Change language">FR / EN</button>

    <div id="control-panel">
        <div id="control-panel-options" class="control-panel-options">
            <div class="game-menu-layout stop-action-menu-layout">
                <div class="game-menu-main">
                    <div id="options-title-bar">
                        <h2 id="options-main-title" class="translate" data-fr="MarioMovie" data-en="MarioMovie" data-ja="マリオムービー">MarioMovie</h2>
                    </div>

                    <p id="control-panel-instructions" class="control-panel-instructions translate"
                       data-fr="Regarde la vidéo, puis exécute l'action demandée à chaque pause avant de reprendre."
                       data-en="Watch the video, then perform the requested action at each pause before continuing."
                       data-ja="動画を見て、停止したら表示された動きをしてから再開してください。">
                    </p>

                    <div id="mode-divider"></div>

                    <div id="options-inline-container" class="stop-action-options-inline-container">
                        <div class="option-item stop-action-mode-card">
                            <div id="stop-action-mode-segmented-control" role="tablist" aria-label="Mode selector">
                                <button type="button" class="stop-action-mode-btn selected translate" data-mode="easy" data-fr="Facile" data-en="Easy" data-ja="かんたん" aria-pressed="true">Easy</button>
                                <button type="button" class="stop-action-mode-btn translate" data-mode="hard" data-fr="Difficile" data-en="Hard" data-ja="ハード" aria-pressed="false">Difficile</button>
                                <button type="button" class="stop-action-mode-btn translate" data-mode="competitive" data-fr="Compétitif" data-en="Competitive" data-ja="対戦" aria-pressed="false">Compétitif</button>
                            </div>
                            <p id="stop-action-mode-description" class="stop-action-mode-description"></p>
                        </div>
                    </div>

                    <div id="mode-divider"></div>

                    <div id="button-container" class="button-container stop-action-button-container">
                        <div id="control-panel-loading-bar-container" class="loading-bar-container" data-status="Loading game..."><div id="control-panel-loading-bar" class="loading-bar"></div></div>
                        <button id="control-panel-start-button" class="button translate" data-fr="Commencer" data-en="Start" data-ja="開始">Commencer</button>
                    </div>
                </div>

                <aside class="game-menu-art" aria-hidden="true">
                    <div class="game-menu-art-card">
                        <div class="game-menu-art-image"></div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <div id="video-container" class="video-container hidden" aria-live="off">
        <video id="video-player" class="video-player" preload="auto" playsinline>
            <source id="video-source" src="https://bucket.adaptatech.org/mariomovie.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div id="overlay-screen" class="overlay-screen hidden" aria-live="assertive">
        <img id="action-prompt-image" class="action-prompt-image" src="" alt="">
        <p id="action-prompt-label" class="action-prompt-label"></p>
    </div>

    <div id="results-screen" class="hidden">
        <div class="results-panel stop-action-results-panel">
            <h2 class="translate" data-fr="Partie terminée" data-en="Game complete" data-ja="ゲーム終了">Partie terminée</h2>
            <p id="results-score" class="stop-action-results-metric"></p>
            <p id="results-average-delay" class="stop-action-results-metric"></p>
            <p id="results-false-positives" class="stop-action-results-metric"></p>
            <div id="score-register-panel" class="score-register-panel hidden" aria-live="polite">
                <p id="score-register-question" class="stop-action-results-metric"></p>
                <div id="score-register-actions" class="score-register-actions">
                    <button id="score-register-yes" type="button" class="button"></button>
                    <button id="score-register-no" type="button" class="button"></button>
                </div>
                <div id="score-register-form" class="score-register-form hidden">
                    <label id="score-player-name-label" for="score-player-name" class="score-player-name-label"></label>
                    <input id="score-player-name" class="score-player-name-input" type="text" maxlength="20" autocomplete="name" />
                    <button id="score-submit" type="button" class="button"></button>
                </div>
                <p id="score-register-status" class="score-register-status" role="status"></p>
            </div>
            <div id="leaderboard-panel" class="leaderboard-panel hidden" aria-live="polite">
                <h3 id="leaderboard-title" class="leaderboard-title"></h3>
                <ol id="leaderboard-list" class="leaderboard-list"></ol>
            </div>
            <button id="continue-button" class="button translate" data-fr="Recommencer" data-en="Restart" data-ja="もう一度">Recommencer</button>
        </div>
    </div>

    <audio id="intro-jingle" src="../../sounds/spacewalk.mp3" preload="auto"></audio>

    <script src="../../js/translationmain.js"></script>
    <script>
      document.getElementById('language-toggle')?.addEventListener('pointerup', toggleLanguage);
    </script>
    <script src="../../js/video-stop-action.js"></script>
</body>
</html>
