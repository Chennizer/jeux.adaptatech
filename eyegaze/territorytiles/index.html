<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Territory Capture Duel (Eye gaze)</title>

  <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

  <style>
    :root{
      --teal:#009688;
      --teal-light:#4dd2ff;
      --panel-bg: rgba(0,0,0,0.72);
      --panel-border: rgba(255,255,255,0.12);
      --text:#ffffff;
      --muted: rgba(255,255,255,0.82);
      --tile-neutral:#1a1a1a;
      --tile-a:#12b76a;
      --tile-b:#3b82f6;
      --tile-stroke: rgba(255,255,255,0.14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      position: relative;
    }

    #game-options {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(0,150,136,0.20), rgba(0,0,0,0.72) 35%, rgba(0,0,0,0.9) 100%);
      backdrop-filter: blur(8px);
    }

    .menu-card {
      width: min(560px, 100%);
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 22px;
      padding: 28px 26px 24px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .menu-card h1 {
      margin: 0 0 10px;
      font-size: clamp(1.7rem, 3.2vw, 2.3rem);
      line-height: 1.15;
    }

    .menu-card p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
    }

    .simple-options {
      display: grid;
      gap: 14px;
      margin-bottom: 22px;
      text-align: left;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 0.98rem;
      font-weight: 700;
      color: #fff;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 54px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: #fff;
      padding: 0 16px;
      font-size: 1rem;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--teal-light);
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    #startButton {
      width: 100%;
      min-height: 58px;
      border: 0;
      border-radius: 999px;
      background: #fff;
      color: var(--teal);
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    #startButton:hover,
    #startButton:focus-visible {
      background: #eafdfb;
      transform: scale(1.01);
      outline: none;
    }

    .menu-note {
      margin-top: 14px;
      font-size: 0.92rem;
      color: rgba(255,255,255,0.72);
      line-height: 1.4;
    }

    #gameContainer {
      position: fixed;
      inset: 0;
      display: none;
      background:
        radial-gradient(circle at top, rgba(0,150,136,0.12), transparent 35%),
        #000;
    }

    #topBar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
    }

    .score-card {
      background: rgba(0,0,0,0.45);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 12px 16px;
      min-height: 82px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .score-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1rem;
    }

    .score-number {
      font-size: 1.25rem;
      font-weight: 800;
    }

    .meter {
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.12);
    }

    .meter-fill {
      width: 0%;
      height: 100%;
      transition: width 0.15s ease;
    }

    #fillA { background: var(--tile-a); }
    #fillB { background: var(--tile-b); }

    #centerInfo {
      min-width: 170px;
      background: rgba(0,0,0,0.45);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 12px 16px;
      text-align: center;
    }

    #timer {
      font-size: 2rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
    }

    #roundState {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.78);
    }

    #hudButtons {
      position: absolute;
      top: 116px;
      right: 16px;
      z-index: 20;
      display: flex;
      gap: 10px;
    }

    .hud-btn {
      border: 2px solid rgba(255,255,255,0.22);
      background: rgba(0,0,0,0.52);
      color: #fff;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .hud-btn:hover,
    .hud-btn:focus-visible {
      border-color: rgba(77,210,255,0.85);
      outline: none;
    }

    #grid {
      position: absolute;
      inset: 126px 20px 20px 20px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 14px;
    }

    .tile {
      position: relative;
      border-radius: 24px;
      border: 2px solid var(--tile-stroke);
      background: var(--tile-neutral);
      overflow: hidden;
      user-select: none;
      touch-action: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .tile.a {
      background: linear-gradient(180deg, rgba(18,183,106,0.95), rgba(10,90,55,0.95));
      border-color: rgba(255,255,255,0.22);
    }

    .tile.b {
      background: linear-gradient(180deg, rgba(59,130,246,0.95), rgba(26,64,133,0.95));
      border-color: rgba(255,255,255,0.22);
    }

    .tile-label {
      position: absolute;
      left: 12px;
      top: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    .dwell-ring {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.26);
      background: rgba(0,0,0,0.26);
      overflow: hidden;
      pointer-events: none;
    }

    .dwell-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0%;
      background: rgba(255,255,255,0.34);
    }

    #resultOverlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0,0,0,0.56);
      backdrop-filter: blur(6px);
    }

    #resultCard {
      width: min(480px, 100%);
      background: rgba(0,0,0,0.82);
      border: 2px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      padding: 28px 24px;
      text-align: center;
    }

    #resultTitle {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    #resultText {
      margin: 0;
      color: rgba(255,255,255,0.86);
      font-size: 1rem;
      line-height: 1.4;
    }

    #resultBig {
      margin: 18px 0 0;
      font-size: 2rem;
      font-weight: 900;
    }

    @media (max-width: 900px) {
      #topBar {
        grid-template-columns: 1fr;
      }

      #hudButtons {
        top: auto;
        bottom: 18px;
        right: 16px;
      }

      #grid {
        inset: 250px 14px 72px 14px;
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 640px) {
      .row-2 {
        grid-template-columns: 1fr;
      }

      .menu-card {
        padding: 22px 18px 18px;
      }

      #grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>

  <div id="game-options">
    <div class="menu-card">
      <h1>Territory Capture Duel</h1>
      <p>Look at a neutral tile to capture it. Each learner uses their own computer. The game syncs through Ably.</p>

      <div class="simple-options">
        <div class="field">
          <label for="roomInput">Room code</label>
          <input id="roomInput" type="text" value="pmlD-01" />
        </div>

        <div class="row-2">
          <div class="field">
            <label for="playerSelect">Player</label>
            <select id="playerSelect">
              <option value="A">Player A (green)</option>
              <option value="B">Player B (blue)</option>
            </select>
          </div>

          <div class="field">
            <label for="roundTimeInput">Round time (seconds)</label>
            <input id="roundTimeInput" type="number" min="5" max="180" value="45" />
          </div>
        </div>

        <div class="row-2">
          <div class="field">
            <label for="dwellInput">Dwell time (ms)</label>
            <input id="dwellInput" type="number" min="150" max="5000" value="900" />
          </div>

          <div class="field">
            <label for="hostSelect">Start button role</label>
            <select id="hostSelect">
              <option value="any">Any device can start</option>
              <option value="A">Player A starts</option>
              <option value="B">Player B starts</option>
            </select>
          </div>
        </div>
      </div>

      <button id="startButton">Start</button>
      <div class="menu-note">Fullscreen will start automatically when pressing Start.</div>
    </div>
  </div>

  <div id="gameContainer" aria-live="polite">
    <div id="topBar">
      <div class="score-card">
        <div class="score-top">
          <span>Player A</span>
          <span class="score-number" id="scoreA">0</span>
        </div>
        <div class="meter">
          <div class="meter-fill" id="fillA"></div>
        </div>
      </div>

      <div id="centerInfo">
        <div id="timer">45s</div>
        <div id="roundState">Ready</div>
      </div>

      <div class="score-card">
        <div class="score-top">
          <span>Player B</span>
          <span class="score-number" id="scoreB">0</span>
        </div>
        <div class="meter">
          <div class="meter-fill" id="fillB"></div>
        </div>
      </div>
    </div>

    <div id="hudButtons">
      <button class="hud-btn" id="newRoundButton">New round</button>
      <button class="hud-btn" id="resetButton">Reset</button>
    </div>

    <div id="grid"></div>
  </div>

  <div id="resultOverlay">
    <div id="resultCard">
      <h2 id="resultTitle">Round over</h2>
      <p id="resultText"></p>
      <div id="resultBig"></div>
    </div>
  </div>

  <script>
    /***************************************************************
     * Territory Capture Duel
     * Simplified menu + fullscreen on start
     ***************************************************************/

    const ABLY_API_KEY = "NfI_Ag.iKHbVg:db4lFlhkK4fUaaG_z7q3SS6Vr0WiHa9o-24L1OUgKrs";
    const GRID_COLS = 6;
    const GRID_ROWS = 4;
    const TILE_COUNT = GRID_COLS * GRID_ROWS;

    const gameOptions = document.getElementById('game-options');
    const gameContainer = document.getElementById('gameContainer');
    const roomInput = document.getElementById('roomInput');
    const playerSelect = document.getElementById('playerSelect');
    const roundTimeInput = document.getElementById('roundTimeInput');
    const dwellInput = document.getElementById('dwellInput');
    const hostSelect = document.getElementById('hostSelect');
    const startButton = document.getElementById('startButton');
    const newRoundButton = document.getElementById('newRoundButton');
    const resetButton = document.getElementById('resetButton');

    const scoreAEl = document.getElementById('scoreA');
    const scoreBEl = document.getElementById('scoreB');
    const fillAEl = document.getElementById('fillA');
    const fillBEl = document.getElementById('fillB');
    const timerEl = document.getElementById('timer');
    const roundStateEl = document.getElementById('roundState');
    const gridEl = document.getElementById('grid');

    const resultOverlay = document.getElementById('resultOverlay');
    const resultText = document.getElementById('resultText');
    const resultBig = document.getElementById('resultBig');

    let ably = null;
    let channel = null;
    let started = false;
    let roundActive = false;
    let roundEndsAt = 0;
    let timerInterval = null;

    let tiles = Array.from({ length: TILE_COUNT }, () => ({ owner: null }));

    function requestFullscreenSafe() {
      const el = document.documentElement;
      if (document.fullscreenElement) return;
      if (el.requestFullscreen) {
        el.requestFullscreen().catch(() => {});
      } else if (el.webkitRequestFullscreen) {
        el.webkitRequestFullscreen();
      } else if (el.msRequestFullscreen) {
        el.msRequestFullscreen();
      }
    }

    function nowMs() {
      return Date.now();
    }

    function localPlayer() {
      return playerSelect.value === 'B' ? 'B' : 'A';
    }

    function safeInt(value, fallback) {
      const n = parseInt(String(value), 10);
      return Number.isFinite(n) ? n : fallback;
    }

    function canThisDeviceStart() {
      const starter = hostSelect.value;
      if (starter === 'any') return true;
      return localPlayer() === starter;
    }

    function buildGrid() {
      gridEl.innerHTML = '';

      for (let i = 0; i < TILE_COUNT; i++) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.dataset.index = String(i);
        tile.tabIndex = 0;

        const label = document.createElement('div');
        label.className = 'tile-label';
        label.textContent = 'Neutral';

        const ring = document.createElement('div');
        ring.className = 'dwell-ring';

        const fill = document.createElement('div');
        fill.className = 'dwell-fill';

        ring.appendChild(fill);
        tile.appendChild(label);
        tile.appendChild(ring);

        setupTileDwell(tile, i, fill);
        gridEl.appendChild(tile);
      }
    }

    function setupTileDwell(tile, index, fillEl) {
      let dwellStart = null;
      let rafId = null;

      function clearDwell() {
        dwellStart = null;
        if (rafId) cancelAnimationFrame(rafId);
        rafId = null;
        fillEl.style.height = '0%';
      }

      function tick() {
        if (dwellStart === null) return;

        if (!roundActive || tiles[index].owner !== null) {
          clearDwell();
          return;
        }

        const dwellMs = Math.max(150, Math.min(5000, safeInt(dwellInput.value, 900)));
        const elapsed = nowMs() - dwellStart;
        const progress = Math.min(1, elapsed / dwellMs);
        fillEl.style.height = `${progress * 100}%`;

        if (progress >= 1) {
          clearDwell();
          captureTile(index, localPlayer(), true);
          return;
        }

        rafId = requestAnimationFrame(tick);
      }

      function arm() {
        if (!roundActive) return;
        if (tiles[index].owner !== null) return;
        dwellStart = nowMs();
        tick();
      }

      tile.addEventListener('pointerenter', arm);
      tile.addEventListener('pointerleave', clearDwell);
      tile.addEventListener('focus', arm);
      tile.addEventListener('blur', clearDwell);
      tile.addEventListener('pointerdown', event => event.preventDefault());
    }

    function renderTile(index) {
      const tile = gridEl.children[index];
      const label = tile.querySelector('.tile-label');
      const owner = tiles[index].owner;

      tile.classList.remove('a', 'b');

      if (owner === 'A') {
        tile.classList.add('a');
        label.textContent = 'A';
      } else if (owner === 'B') {
        tile.classList.add('b');
        label.textContent = 'B';
      } else {
        label.textContent = 'Neutral';
      }
    }

    function renderBoard() {
      for (let i = 0; i < TILE_COUNT; i++) {
        renderTile(i);
      }
      renderScores();
    }

    function renderScores() {
      let a = 0;
      let b = 0;

      for (const tile of tiles) {
        if (tile.owner === 'A') a++;
        if (tile.owner === 'B') b++;
      }

      scoreAEl.textContent = a;
      scoreBEl.textContent = b;

      fillAEl.style.width = `${(a / TILE_COUNT) * 100}%`;
      fillBEl.style.width = `${(b / TILE_COUNT) * 100}%`;
    }

    function captureTile(index, player, publishEvent = false) {
      if (!roundActive) return;
      if (tiles[index].owner !== null) return;

      tiles[index].owner = player;
      renderTile(index);
      renderScores();

      if (publishEvent && channel) {
        channel.publish('tileCapture', {
          index,
          player
        });
      }

      const claimedCount = tiles.filter(tile => tile.owner !== null).length;
      if (claimedCount >= TILE_COUNT) {
        endRound(true);
      }
    }

    function resetBoard() {
      tiles = Array.from({ length: TILE_COUNT }, () => ({ owner: null }));
      renderBoard();
    }

    function updateTimerDisplay() {
      if (!roundActive) return;
      const remainingMs = Math.max(0, roundEndsAt - nowMs());
      const seconds = Math.ceil(remainingMs / 1000);
      timerEl.textContent = `${seconds}s`;

      if (remainingMs <= 0) {
        endRound(true);
      }
    }

    function startTimerLoop() {
      stopTimerLoop();
      updateTimerDisplay();
      timerInterval = setInterval(updateTimerDisplay, 120);
    }

    function stopTimerLoop() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function startRound(durationSec, startAtMs = null, publishEvent = false) {
      const duration = Math.max(5, Math.min(180, safeInt(durationSec, 45)));
      const actualStartAt = startAtMs || (nowMs() + 800);

      resultOverlay.style.display = 'none';
      roundStateEl.textContent = 'Starting...';

      roundActive = true;
      roundEndsAt = actualStartAt + duration * 1000;

      if (publishEvent && channel) {
        channel.publish('roundStart', {
          duration,
          startAt: actualStartAt
        });
      }

      const waitUntilStart = () => {
        const diff = actualStartAt - nowMs();

        if (diff > 0) {
          timerEl.textContent = `${Math.ceil(diff / 1000)}...`;
          requestAnimationFrame(waitUntilStart);
          return;
        }

        roundStateEl.textContent = 'Round active';
        startTimerLoop();
      };

      requestAnimationFrame(waitUntilStart);
    }

    function endRound(publishEvent = false) {
      if (!roundActive) return;

      roundActive = false;
      stopTimerLoop();
      roundStateEl.textContent = 'Round over';

      let a = 0;
      let b = 0;
      for (const tile of tiles) {
        if (tile.owner === 'A') a++;
        if (tile.owner === 'B') b++;
      }

      let winnerText = 'Tie';
      if (a > b) winnerText = 'Player A wins';
      if (b > a) winnerText = 'Player B wins';

      resultText.textContent = `Score — A: ${a} • B: ${b}`;
      resultBig.textContent = winnerText;
      resultOverlay.style.display = 'flex';

      if (publishEvent && channel) {
        channel.publish('roundEnd', { a, b });
      }
    }

    function connectToAbly() {
      return new Promise((resolve, reject) => {
        try {
          ably = new Ably.Realtime({ key: ABLY_API_KEY });

          ably.connection.once('connected', () => {
            const roomCode = roomInput.value.trim() || 'pmlD-01';
            channel = ably.channels.get(`territory-duel:${roomCode}`);

            channel.subscribe(message => {
              const name = message.name;
              const data = message.data || {};

              if (name === 'tileCapture') {
                captureTile(data.index, data.player, false);
              }

              if (name === 'roundStart') {
                startRound(data.duration, data.startAt, false);
              }

              if (name === 'roundEnd') {
                if (roundActive) {
                  roundActive = false;
                  stopTimerLoop();
                }
                roundStateEl.textContent = 'Round over';
                resultText.textContent = `Score — A: ${data.a} • B: ${data.b}`;

                let winnerText = 'Tie';
                if (data.a > data.b) winnerText = 'Player A wins';
                if (data.b > data.a) winnerText = 'Player B wins';

                resultBig.textContent = winnerText;
                resultOverlay.style.display = 'flex';
              }

              if (name === 'resetBoard') {
                roundActive = false;
                stopTimerLoop();
                roundStateEl.textContent = 'Ready';
                timerEl.textContent = `${Math.max(5, Math.min(180, safeInt(roundTimeInput.value, 45)))}s`;
                resultOverlay.style.display = 'none';
                resetBoard();
              }
            });

            resolve();
          });

          ably.connection.once('failed', reject);
        } catch (error) {
          reject(error);
        }
      });
    }

    async function startGame() {
      if (started) return;

      startButton.disabled = true;
      startButton.textContent = 'Starting...';

      try {
        await connectToAbly();

        started = true;
        gameOptions.style.display = 'none';
        gameContainer.style.display = 'block';
        requestFullscreenSafe();

        resetBoard();
        timerEl.textContent = `${Math.max(5, Math.min(180, safeInt(roundTimeInput.value, 45)))}s`;
        roundStateEl.textContent = 'Ready';

        if (canThisDeviceStart()) {
          const duration = Math.max(5, Math.min(180, safeInt(roundTimeInput.value, 45)));
          startRound(duration, nowMs() + 1200, true);
        }
      } catch (error) {
        console.error(error);
        startButton.disabled = false;
        startButton.textContent = 'Start';
        alert('Unable to connect to Ably.');
      }
    }

    startButton.addEventListener('click', startGame);

    newRoundButton.addEventListener('click', () => {
      if (!channel) return;
      if (!canThisDeviceStart()) return;

      resetBoard();
      resultOverlay.style.display = 'none';

      const duration = Math.max(5, Math.min(180, safeInt(roundTimeInput.value, 45)));
      startRound(duration, nowMs() + 800, true);
    });

    resetButton.addEventListener('click', () => {
      if (!channel) return;
      if (!canThisDeviceStart()) return;

      roundActive = false;
      stopTimerLoop();
      roundStateEl.textContent = 'Ready';
      timerEl.textContent = `${Math.max(5, Math.min(180, safeInt(roundTimeInput.value, 45)))}s`;
      resultOverlay.style.display = 'none';
      resetBoard();
      channel.publish('resetBoard', {});
    });

    resultOverlay.addEventListener('click', () => {
      resultOverlay.style.display = 'none';
    });

    buildGrid();
    resetBoard();
    timerEl.textContent = `${Math.max(5, Math.min(180, safeInt(roundTimeInput.value, 45)))}s`;
  </script>
</body>
</html>
